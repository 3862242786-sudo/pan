<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新标签页 - LimeBrowser</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0e1a;
            --bg2: #111827;
            --surface: #1e293b;
            --surface2: #0f172a;
            --primary: #22c55e;
            --primary-light: #4ade80;
            --text: #f1f5f9;
            --text2: #94a3b8;
            --text3: #64748b;
            --border: #334155;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background-image:
                radial-gradient(circle at 20% 50%, rgba(34,197,94,0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(34,197,94,0.03) 0%, transparent 50%);
        }

        /* Clock */
        .clock-section {
            text-align: center;
            margin-bottom: 40px;
        }
        .time {
            font-size: 72px;
            font-weight: 200;
            letter-spacing: 4px;
            line-height: 1;
            background: linear-gradient(135deg, #fff 0%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .date {
            font-size: 16px;
            color: var(--text2);
            margin-top: 8px;
            letter-spacing: 2px;
        }

        /* Search */
        .search-box {
            width: 100%;
            max-width: 600px;
            position: relative;
            margin-bottom: 48px;
        }
        .search-input {
            width: 100%;
            height: 56px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 0 56px 0 24px;
            font-size: 16px;
            color: var(--text);
            outline: none;
            transition: all 0.3s;
        }
        .search-input::placeholder { color: var(--text3); }
        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(34,197,94,0.15), 0 8px 32px rgba(0,0,0,0.3);
        }
        .search-btn {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark, #16a34a));
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        .search-btn:hover { transform: translateY(-50%) scale(1.05); }
        .search-btn svg { fill: #fff; }

        /* Engine selector */
        .engine-selector {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .engine-btn {
            padding: 6px 16px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text2);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .engine-btn.active {
            background: rgba(34,197,94,0.15);
            border-color: var(--primary);
            color: var(--primary);
        }
        .engine-btn:hover:not(.active) {
            border-color: var(--text3);
            color: var(--text);
        }

        /* Shortcuts */
        .shortcuts-title {
            font-size: 14px;
            color: var(--text3);
            margin-bottom: 16px;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .shortcuts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 16px;
            width: 100%;
            max-width: 600px;
        }
        .shortcut {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 16px 8px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            position: relative;
        }
        .shortcut:hover {
            border-color: rgba(34,197,94,0.3);
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        .shortcut .icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--bg2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            overflow: hidden;
        }
        .shortcut .icon img {
            width: 24px;
            height: 24px;
            object-fit: contain;
        }
        .shortcut .name {
            font-size: 12px;
            color: var(--text2);
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .shortcut .remove {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 18px;
            height: 18px;
            background: rgba(239,68,68,0.8);
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #fff;
            cursor: pointer;
        }
        .shortcut:hover .remove { display: flex; }

        /* Add shortcut */
        .shortcut.add {
            border-style: dashed;
            background: transparent;
        }
        .shortcut.add:hover {
            border-color: var(--primary);
            background: rgba(34,197,94,0.05);
        }
        .shortcut.add .icon {
            background: transparent;
            border: 2px dashed var(--border);
            font-size: 24px;
            color: var(--text3);
        }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 16px;
            font-size: 12px;
            color: var(--text3);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            width: 100%;
            max-width: 400px;
        }
        .modal h3 {
            font-size: 20px;
            margin-bottom: 20px;
        }
        .modal input {
            width: 100%;
            height: 44px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0 14px;
            font-size: 14px;
            color: var(--text);
            margin-bottom: 12px;
            outline: none;
        }
        .modal input:focus { border-color: var(--primary); }
        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        .modal-buttons button {
            flex: 1;
            height: 44px;
            border-radius: 10px;
            border: none;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .modal-buttons .confirm {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark, #16a34a));
            color: #fff;
        }
        .modal-buttons .cancel {
            background: var(--bg2);
            color: var(--text2);
            border: 1px solid var(--border);
        }

        @media (max-width: 480px) {
            .time { font-size: 48px; }
            .shortcuts-grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>
    <div class="clock-section">
        <div class="time" id="clock">00:00</div>
        <div class="date" id="date">加载中...</div>
    </div>

    <div class="engine-selector">
        <button class="engine-btn active" data-engine="bing">Bing</button>
        <button class="engine-btn" data-engine="google">Google</button>
        <button class="engine-btn" data-engine="baidu">百度</button>
    </div>

    <div class="search-box">
        <input type="text" class="search-input" id="searchInput" placeholder="搜索或输入网址" autofocus>
        <button class="search-btn" id="searchBtn">
            <svg width="20" height="20" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        </button>
    </div>

    <div class="shortcuts-title">快捷网站</div>
    <div class="shortcuts-grid" id="shortcutsGrid"></div>

    <div class="footer">LimeBrowser Start Page</div>

    <!-- Add shortcut modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h3>添加快捷网站</h3>
            <input type="text" id="modalName" placeholder="名称 (如: GitHub)">
            <input type="text" id="modalUrl" placeholder="网址 (如: https://github.com)">
            <div class="modal-buttons">
                <button class="cancel" onclick="closeModal()">取消</button>
                <button class="confirm" onclick="addShortcut()">添加</button>
            </div>
        </div>
    </div>

<script>
const ENGINES = {
    bing: 'https://www.bing.com/search?q=',
    google: 'https://www.google.com/search?q=',
    baidu: 'https://www.baidu.com/s?wd='
};

let currentEngine = localStorage.getItem('lb_engine') || 'bing';
let shortcuts = JSON.parse(localStorage.getItem('lb_shortcuts') || 'null');

const DEFAULT_SHORTCUTS = [
    { name: 'Bing', url: 'https://www.bing.com', icon: '🔍' },
    { name: '百度', url: 'https://www.baidu.com', icon: '百' },
    { name: 'GitHub', url: 'https://github.com', icon: 'G' },
    { name: 'Bilibili', url: 'https://www.bilibili.com', icon: 'B' },
    { name: '知乎', url: 'https://www.zhihu.com', icon: '知' },
    { name: 'YouTube', url: 'https://www.youtube.com', icon: 'Y' },
    { name: '淘宝', url: 'https://www.taobao.com', icon: '淘' },
];

if (!shortcuts) shortcuts = DEFAULT_SHORTCUTS;

function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('clock').textContent = h + ':' + m;

    const weekDays = ['周日','周一','周二','周三','周四','周五','周六'];
    const y = now.getFullYear();
    const mon = now.getMonth() + 1;
    const d = now.getDate();
    document.getElementById('date').textContent = `${y}年${mon}月${d}日 ${weekDays[now.getDay()]}`;
}
setInterval(updateClock, 1000);
updateClock();

function setEngine(name) {
    currentEngine = name;
    localStorage.setItem('lb_engine', name);
    document.querySelectorAll('.engine-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.engine === name);
    });
}

document.querySelectorAll('.engine-btn').forEach(btn => {
    btn.addEventListener('click', () => setEngine(btn.dataset.engine));
});
setEngine(currentEngine);

function doSearch() {
    const query = document.getElementById('searchInput').value.trim();
    if (!query) return;
    if (query.includes('.') && !query.includes(' ') && !query.startsWith('http')) {
        window.location.href = 'https://' + query;
    } else if (query.startsWith('http://') || query.startsWith('https://')) {
        window.location.href = query;
    } else {
        window.location.href = ENGINES[currentEngine] + encodeURIComponent(query);
    }
}

document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
});
document.getElementById('searchBtn').addEventListener('click', doSearch);

function renderShortcuts() {
    const grid = document.getElementById('shortcutsGrid');
    grid.innerHTML = '';
    shortcuts.forEach((s, i) => {
        const el = document.createElement('a');
        el.className = 'shortcut';
        el.href = s.url;
        el.innerHTML = `
            <span class="remove" onclick="event.preventDefault(); removeShortcut(${i})">×</span>
            <div class="icon">${s.icon || s.name[0]}</div>
            <div class="name">${s.name}</div>
        `;
        grid.appendChild(el);
    });

    const addBtn = document.createElement('div');
    addBtn.className = 'shortcut add';
    addBtn.innerHTML = `
        <div class="icon">+</div>
        <div class="name">添加</div>
    `;
    addBtn.addEventListener('click', () => {
        document.getElementById('modal').classList.add('show');
        document.getElementById('modalName').focus();
    });
    grid.appendChild(addBtn);
}

function removeShortcut(index) {
    shortcuts.splice(index, 1);
    localStorage.setItem('lb_shortcuts', JSON.stringify(shortcuts));
    renderShortcuts();
}

function addShortcut() {
    const name = document.getElementById('modalName').value.trim();
    let url = document.getElementById('modalUrl').value.trim();
    if (!name || !url) return;
    if (!url.startsWith('http')) url = 'https://' + url;
    shortcuts.push({ name, url, icon: name[0] });
    localStorage.setItem('lb_shortcuts', JSON.stringify(shortcuts));
    closeModal();
    renderShortcuts();
}

function closeModal() {
    document.getElementById('modal').classList.remove('show');
    document.getElementById('modalName').value = '';
    document.getElementById('modalUrl').value = '';
}

document.getElementById('modal').addEventListener('click', e => {
    if (e.target.id === 'modal') closeModal();
});

renderShortcuts();
</script>
</body>
</html>
