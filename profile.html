<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的主页 - 青柠社区</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2322c55e' stroke-width='2'%3E%3Cpath d='M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z'/%3E%3C/svg%3E">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #0f172a; color: #e2e8f0; line-height: 1.6;
        }

        /* ===== 导航栏 ===== */
        .nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid #334155;
            padding: 0 40px; height: 64px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .nav-logo {
            display: flex; align-items: center; gap: 10px;
            font-size: 20px; font-weight: 700; color: #22c55e;
            text-decoration: none;
        }
        .nav-logo svg { width: 28px; height: 28px; }
        .nav-links { display: flex; gap: 24px; align-items: center; }
        .nav-links a {
            color: #94a3b8; text-decoration: none; font-size: 15px;
            transition: color 0.3s; white-space: nowrap;
        }
        .nav-links a:hover { color: #22c55e; }
        .nav-right {
            display: flex; align-items: center; gap: 16px;
        }
        .nav-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 700; font-size: 16px;
            cursor: pointer; transition: box-shadow 0.3s;
            overflow: hidden; flex-shrink: 0;
        }
        .nav-avatar:hover { box-shadow: 0 0 0 3px rgba(34,197,94,0.3); }
        .nav-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .nav-profile-link {
            color: #94a3b8; text-decoration: none; font-size: 14px;
            transition: color 0.3s; white-space: nowrap;
        }
        .nav-profile-link:hover { color: #22c55e; }

        /* ===== 主容器 ===== */
        .profile-container {
            max-width: 960px; margin: 0 auto; padding: 80px 20px 40px;
        }

        /* ===== 背景图区域 ===== */
        .profile-banner {
            width: 100%; height: 280px; border-radius: 16px;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 40%, #0f172a 100%);
            background-size: cover; background-position: center;
            position: relative; overflow: hidden; cursor: default;
            border: 1px solid #334155;
        }
        .profile-banner.editable { cursor: pointer; }
        .profile-banner.editable:hover::after {
            content: '点击更换背景';
            position: absolute; inset: 0; background: rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 16px; font-weight: 600;
        }
        .profile-banner .banner-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(15,23,42,0.8) 0%, transparent 50%);
        }

        /* ===== 头像 ===== */
        .profile-avatar-wrap {
            display: flex; justify-content: center;
            margin-top: -40px; position: relative; z-index: 2;
        }
        .profile-avatar {
            width: 80px; height: 80px; border-radius: 50%;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 700; font-size: 32px;
            border: 4px solid #0f172a; cursor: default;
            overflow: hidden; transition: box-shadow 0.3s;
        }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .profile-avatar.editable { cursor: pointer; }
        .profile-avatar.editable:hover {
            box-shadow: 0 0 0 4px rgba(34,197,94,0.4);
        }
        .profile-avatar.editable:hover::after {
            content: ''; position: absolute; inset: 0;
            background: rgba(0,0,0,0.4); border-radius: 50%;
        }

        /* ===== 用户信息 ===== */
        .profile-info {
            text-align: center; margin-top: 16px; padding: 0 20px;
        }
        .profile-name-row {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            flex-wrap: wrap;
        }
        .profile-name {
            font-size: 28px; font-weight: 800;
            background: linear-gradient(135deg, #fff, #22c55e);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .profile-name-input {
            font-size: 28px; font-weight: 800; text-align: center;
            background: #1e293b; color: #e2e8f0; border: 1px solid #334155;
            border-radius: 8px; padding: 4px 12px; outline: none;
            display: none; width: 300px; max-width: 100%;
        }
        .profile-name-input:focus { border-color: #22c55e; }

        /* ===== 认证标识 ===== */
        .badge-verified, .badge-admin {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 12px; font-weight: 600; padding: 2px 8px;
            border-radius: 4px;
        }
        .badge-verified {
            background: rgba(34,197,94,0.15); color: #22c55e;
        }
        .badge-verified svg { width: 14px; height: 14px; }
        .badge-admin {
            background: rgba(245,158,11,0.15); color: #f59e0b;
        }
        .badge-admin svg { width: 14px; height: 14px; }

        /* ===== 个人简介 ===== */
        .profile-bio {
            margin-top: 12px; font-size: 15px; color: #94a3b8;
            max-width: 500px; margin-left: auto; margin-right: auto;
            min-height: 24px; word-break: break-word;
        }
        .profile-bio-input {
            margin-top: 12px; font-size: 15px; color: #e2e8f0;
            background: #1e293b; border: 1px solid #334155;
            border-radius: 8px; padding: 8px 12px; outline: none;
            width: 100%; max-width: 500px; display: none;
            resize: vertical; min-height: 60px;
            margin-left: auto; margin-right: auto;
        }
        .profile-bio-input:focus { border-color: #22c55e; }

        /* ===== 操作按钮 ===== */
        .profile-actions {
            display: flex; gap: 12px; justify-content: center;
            margin-top: 20px; flex-wrap: wrap;
        }
        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 10px 20px; border-radius: 10px; font-size: 14px;
            font-weight: 600; text-decoration: none; transition: all 0.3s;
            cursor: pointer; border: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #22c55e, #16a34a); color: #fff;
        }
        .btn-primary:hover { box-shadow: 0 4px 16px rgba(34,197,94,0.3); }
        .btn-secondary {
            background: #334155; color: #94a3b8;
        }
        .btn-secondary:hover { background: #475569; color: #e2e8f0; }
        .btn-danger {
            background: rgba(239,68,68,0.15); color: #ef4444;
            border: 1px solid rgba(239,68,68,0.3);
        }
        .btn-danger:hover { background: rgba(239,68,68,0.25); }

        /* ===== 收藏隐私切换 ===== */
        .privacy-toggle {
            display: flex; align-items: center; gap: 8px;
            justify-content: center; margin-top: 8px;
            font-size: 13px; color: #64748b;
        }
        .toggle-switch {
            position: relative; width: 40px; height: 22px;
            background: #334155; border-radius: 11px; cursor: pointer;
            transition: background 0.3s;
        }
        .toggle-switch.active { background: #22c55e; }
        .toggle-switch::after {
            content: ''; position: absolute; top: 3px; left: 3px;
            width: 16px; height: 16px; border-radius: 50%;
            background: #fff; transition: transform 0.3s;
        }
        .toggle-switch.active::after { transform: translateX(18px); }

        /* ===== 标签页 ===== */
        .profile-tabs {
            display: flex; gap: 0; margin-top: 32px;
            border-bottom: 1px solid #334155;
        }
        .profile-tab {
            padding: 12px 24px; font-size: 15px; font-weight: 600;
            color: #64748b; cursor: pointer; transition: all 0.3s;
            border-bottom: 2px solid transparent; background: none; border-top: none;
            border-left: none; border-right: none;
        }
        .profile-tab:hover { color: #94a3b8; }
        .profile-tab.active {
            color: #22c55e; border-bottom-color: #22c55e;
        }

        /* ===== 作品网格 ===== */
        .works-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 20px; margin-top: 24px;
        }
        .work-card {
            background: #1e293b; border-radius: 12px;
            border: 1px solid #334155; overflow: hidden;
            transition: all 0.3s; cursor: pointer;
        }
        .work-card:hover {
            border-color: #22c55e; transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(34,197,94,0.1);
        }
        .work-card-thumb {
            width: 100%; height: 160px;
            background: linear-gradient(135deg, #0f172a, #1e3a5f);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .work-card-thumb img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .work-card-thumb svg {
            width: 48px; height: 48px; stroke: #334155; fill: none; stroke-width: 1.5;
        }
        .work-card-body { padding: 16px; }
        .work-card-title {
            font-size: 15px; font-weight: 600; color: #e2e8f0;
            margin-bottom: 6px; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis;
        }
        .work-card-date { font-size: 12px; color: #64748b; }

        /* ===== 收藏列表 ===== */
        .favorites-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 20px; margin-top: 24px;
        }
        .fav-card {
            background: #1e293b; border-radius: 12px;
            border: 1px solid #334155; overflow: hidden;
            transition: all 0.3s; cursor: pointer;
        }
        .fav-card:hover {
            border-color: #22c55e; transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(34,197,94,0.1);
        }
        .fav-card-thumb {
            width: 100%; height: 120px;
            background: linear-gradient(135deg, #1e293b, #334155);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .fav-card-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .fav-card-thumb svg { width: 36px; height: 36px; stroke: #475569; fill: none; stroke-width: 1.5; }
        .fav-card-body { padding: 14px; }
        .fav-card-title {
            font-size: 14px; font-weight: 600; color: #e2e8f0;
            margin-bottom: 4px; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis;
        }
        .fav-card-author { font-size: 12px; color: #64748b; }

        /* ===== 空状态 ===== */
        .empty-state {
            text-align: center; padding: 60px 20px; color: #64748b;
        }
        .empty-state svg {
            width: 64px; height: 64px; stroke: #334155; fill: none;
            stroke-width: 1.5; margin-bottom: 16px;
        }
        .empty-state p { font-size: 15px; }

        /* ===== 收藏私密提示 ===== */
        .favorites-private {
            text-align: center; padding: 60px 20px; color: #64748b;
        }
        .favorites-private svg {
            width: 48px; height: 48px; stroke: #334155; fill: none;
            stroke-width: 1.5; margin-bottom: 16px;
        }
        .favorites-private p { font-size: 15px; }

        /* ===== 隐藏的文件输入 ===== */
        .hidden-input { display: none; }

        /* ===== Toast 消息 ===== */
        .toast-container {
            position: fixed; top: 80px; right: 20px; z-index: 200;
            display: flex; flex-direction: column; gap: 8px;
        }
        .toast {
            padding: 12px 20px; border-radius: 10px; font-size: 14px;
            font-weight: 500; animation: toastIn 0.3s ease-out;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        .toast.success { background: rgba(34,197,94,0.9); color: #fff; }
        .toast.error { background: rgba(239,68,68,0.9); color: #fff; }
        .toast.info { background: rgba(59,130,246,0.9); color: #fff; }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* ===== 页脚 ===== */
        .footer {
            padding: 40px 20px; text-align: center;
            border-top: 1px solid #334155; color: #64748b;
            margin-top: 60px; font-size: 13px;
        }
        .footer a { color: #22c55e; text-decoration: none; }

        /* ===== 加载状态 ===== */
        .loading-spinner {
            display: flex; align-items: center; justify-content: center;
            padding: 60px 20px;
        }
        .spinner {
            width: 40px; height: 40px; border: 3px solid #334155;
            border-top-color: #22c55e; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .nav { padding: 0 16px; height: 56px; }
            .nav-links { gap: 12px; }
            .nav-links a { font-size: 13px; }
            .nav-profile-link { display: none; }
            .profile-container { padding: 68px 12px 20px; }
            .profile-banner { height: 200px; border-radius: 12px; }
            .profile-avatar { width: 64px; height: 64px; font-size: 26px; }
            .profile-avatar-wrap { margin-top: -32px; }
            .profile-name { font-size: 22px; }
            .profile-name-input { font-size: 22px; width: 240px; }
            .works-grid, .favorites-grid {
                grid-template-columns: repeat(2, 1fr); gap: 12px;
            }
            .work-card-thumb { height: 120px; }
            .fav-card-thumb { height: 90px; }
            .profile-tab { padding: 10px 16px; font-size: 14px; }
        }
        @media (max-width: 480px) {
            .nav-links { gap: 8px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
            .nav-links a { font-size: 12px; white-space: nowrap; }
            .works-grid, .favorites-grid {
                grid-template-columns: 1fr; gap: 12px;
            }
            .profile-banner { height: 160px; }
        }

        /* ===== 动画 ===== */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .anim { animation: fadeInUp 0.5s ease-out forwards; opacity: 0; }
        .anim-delay-1 { animation-delay: 0.1s; }
        .anim-delay-2 { animation-delay: 0.2s; }
        .anim-delay-3 { animation-delay: 0.3s; }
    </style>
</head>
<body>
    <!-- Toast 容器 -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- 隐藏的文件输入 -->
    <input type="file" id="avatarInput" class="hidden-input" accept="image/*">
    <input type="file" id="bannerInput" class="hidden-input" accept="image/*">

    <!-- 导航栏 -->
    <nav class="nav">
        <a href="index.html" class="nav-logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>
            青柠社区
        </a>
        <div class="nav-links">
            <a href="index.html">青柠网盘</a>
            <a href="antivirus-app.html">青柠杀毒</a>
            <a href="qingning-desktop.html">青柠桌面</a>
            <a href="qingning-store.html">应用商店</a>
            <a href="qingning-guide.html">使用教程</a>
            <a href="qingning-os.html">青柠OS</a>
        </div>
        <div class="nav-right">
            <a href="profile.html" class="nav-profile-link">我的主页</a>
            <div class="nav-avatar" id="navAvatar" title="用户头像"></div>
        </div>
    </nav>

    <!-- 主内容 -->
    <div class="profile-container">
        <!-- 背景图 -->
        <div class="profile-banner" id="profileBanner">
            <div class="banner-overlay"></div>
        </div>

        <!-- 头像 -->
        <div class="profile-avatar-wrap">
            <div class="profile-avatar" id="profileAvatar"></div>
        </div>

        <!-- 用户信息 -->
        <div class="profile-info">
            <div class="profile-name-row">
                <span class="profile-name" id="profileName">加载中...</span>
                <input type="text" class="profile-name-input" id="profileNameInput" maxlength="20" placeholder="输入用户名">
                <span class="badge-verified" id="badgeVerified" style="display:none;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 16.8l-6.2 4.5 2.4-7.4L2 9.4h7.6z"/></svg>
                    认证用户
                </span>
                <span class="badge-admin" id="badgeAdmin" style="display:none;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                    系统管理
                </span>
            </div>
            <p class="profile-bio" id="profileBio">这个人很懒，什么都没写~</p>
            <textarea class="profile-bio-input" id="profileBioInput" maxlength="200" placeholder="写点什么介绍一下自己吧..."></textarea>

            <!-- 操作按钮 -->
            <div class="profile-actions" id="profileActions">
                <button class="btn btn-primary" id="editBtn" onclick="toggleEdit()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    编辑资料
                </button>
                <button class="btn btn-secondary" id="saveBtn" style="display:none;" onclick="saveProfile()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                    保存
                </button>
                <button class="btn btn-secondary" id="cancelBtn" style="display:none;" onclick="cancelEdit()">
                    取消
                </button>
            </div>

            <!-- 收藏隐私切换（仅自己的主页显示） -->
            <div class="privacy-toggle" id="privacyToggle" style="display:none;">
                <span>收藏列表</span>
                <div class="toggle-switch" id="favToggle" onclick="toggleFavoritesPrivacy()"></div>
                <span id="favPrivacyLabel">私密</span>
            </div>
        </div>

        <!-- 标签页 -->
        <div class="profile-tabs">
            <button class="profile-tab active" data-tab="works" onclick="switchTab('works')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;margin-right:4px;"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                作品
            </button>
            <button class="profile-tab" data-tab="favorites" onclick="switchTab('favorites')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;margin-right:4px;"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                收藏
            </button>
        </div>

        <!-- 作品列表 -->
        <div class="tab-content" id="tabWorks">
            <div class="loading-spinner" id="worksLoading">
                <div class="spinner"></div>
            </div>
            <div class="works-grid" id="worksGrid" style="display:none;"></div>
            <div class="empty-state" id="worksEmpty" style="display:none;">
                <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                <p>还没有发布作品</p>
            </div>
        </div>

        <!-- 收藏列表 -->
        <div class="tab-content" id="tabFavorites" style="display:none;">
            <div class="favorites-private" id="favPrivate" style="display:none;">
                <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <p>该用户的收藏为私密状态</p>
            </div>
            <div class="loading-spinner" id="favLoading">
                <div class="spinner"></div>
            </div>
            <div class="favorites-grid" id="favGrid" style="display:none;"></div>
            <div class="empty-state" id="favEmpty" style="display:none;">
                <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                <p>还没有收藏内容</p>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <div class="footer">
        <p>&copy; 2024-2026 青柠社区 - <a href="index.html">青柠网盘</a></p>
    </div>

    <!-- 个人主页逻辑（纯前端，不依赖后端） -->
    <script src="profile.js"></script>
</body>
</html>
