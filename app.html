<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, target-densitydpi=device-dpi">
    <meta name="theme-color" content="#3b82f6">
    <title>青柠网盘 APP</title>
    <link rel="stylesheet" href="app-styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 状态栏占位 -->
    <div class="status-bar"></div>
    
    <!-- 顶部导航 -->
    <header class="app-header">
        <div class="app-header-content">
            <div class="app-logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>
                </svg>
                <span>青柠网盘</span>
            </div>
            <div class="app-version" id="versionDisplay">v1.1.0</div>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="app-main">
        <!-- 搜索栏 -->
        <div class="app-search-section">
            <div class="app-search-box">
                <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="m21 21-4.35-4.35"/>
                </svg>
                <input type="text" id="searchInput" placeholder="搜索文件...">
            </div>
        </div>

        <!-- 功能卡片 -->
        <div class="app-cards">
            <a href="upload.html" class="app-card app-card-primary">
                <div class="app-card-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                </div>
                <div class="app-card-text">
                    <span class="app-card-title">上传文件</span>
                    <span class="app-card-desc">快速分享</span>
                </div>
            </a>
            
            <a href="#files" class="app-card app-card-secondary" onclick="switchTab('files')">
                <div class="app-card-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                        <polyline points="10 9 9 9 8 9"/>
                    </svg>
                </div>
                <div class="app-card-text">
                    <span class="app-card-title">文件列表</span>
                    <span class="app-card-desc">浏览下载</span>
                </div>
            </a>
        </div>

        <!-- 标签页切换 -->
        <div class="app-tabs">
            <button class="app-tab active" data-tab="files" onclick="switchTab('files')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                </svg>
                <span>文件</span>
            </button>
            <button class="app-tab" data-tab="history" onclick="switchTab('history')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                </svg>
                <span>下载记录</span>
            </button>
            <button class="app-tab" data-tab="me" onclick="switchTab('me')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
                <span>我的</span>
            </button>
        </div>

        <!-- 文件列表页 -->
        <div id="filesTab" class="app-tab-content active">
            <div class="app-section-title">
                <span>全部文件</span>
                <span class="file-count" id="fileCount">0 个文件</span>
            </div>
            <div id="fileList" class="app-file-list">
                <div class="app-loading">
                    <div class="app-spinner"></div>
                    <span>加载中...</span>
                </div>
            </div>
        </div>

        <!-- 下载记录页 -->
        <div id="historyTab" class="app-tab-content">
            <div class="app-section-title">
                <span>下载记录</span>
                <button class="app-text-btn" onclick="clearHistory()">清空</button>
            </div>
            <div id="historyList" class="app-file-list">
                <div class="app-empty">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 16 14"/>
                    </svg>
                    <p>暂无下载记录</p>
                </div>
            </div>
        </div>

        <!-- 我的页面 -->
        <div id="meTab" class="app-tab-content">
            <div class="app-profile">
                <div class="app-avatar">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                </div>
                <div class="app-profile-info">
                    <span class="app-profile-name">青柠用户</span>
                    <span class="app-profile-id" id="userId">ID: --</span>
                </div>
            </div>
            
            <div class="app-menu-list">
                <a href="index.html" class="app-menu-item">
                    <div class="app-menu-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                            <polyline points="9 22 9 12 15 12 15 22"/>
                        </svg>
                    </div>
                    <span>访问网页版</span>
                    <svg class="app-menu-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"/>
                    </svg>
                </a>
                
                <a href="about.html" class="app-menu-item">
                    <div class="app-menu-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="12" y1="16" x2="12" y2="12"/>
                            <line x1="12" y1="8" x2="12.01" y2="8"/>
                        </svg>
                    </div>
                    <span>关于我们</span>
                    <svg class="app-menu-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"/>
                    </svg>
                </a>
                
                <div class="app-menu-item" onclick="checkUpdate()">
                    <div class="app-menu-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
                            <polyline points="21 3 21 9 15 9"/>
                            <line x1="12" y1="16" x2="12" y2="12"/>
                            <line x1="8" y1="12" x2="16" y2="12"/>
                        </svg>
                    </div>
                    <span>检查更新</span>
                    <span class="app-version-tag" id="updateBadge">v1.1.0</span>
                </div>
            </div>
        </div>
    </main>

    <!-- 底部安全区占位 -->
    <div class="safe-area-bottom"></div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
