name: Build LimeOS ROM

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'ROM version'
        required: true
        default: '1.0.0-beta1'

env:
  ROM_VERSION: ${{ github.event.inputs.version || '1.0.0-beta1' }}

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download Android 11 GSI
      run: |
        echo "========================================"
        echo "  LimeOS ROM Build"
        echo "  Version: ${{ env.ROM_VERSION }}"
        echo "========================================"
        echo

        mkdir -p ~/rom-work
        cd ~/rom-work

        echo "[1/5] Downloading Android 11 GSI..."
        GSI_URL="https://github.com/phhusson/treble_experimentations/releases/download/v313/system-roar-arm64-ab-vndklite-vanilla.img.xz"
        curl -L -o system.img.xz "$GSI_URL" || {
          echo "Primary source failed, trying backup..."
          curl -L -o system.img.xz "https://sourceforge.net/projects/androgsis/files/LineageOS-18.1/lineage-18.1-20220115-UNOFFICIAL-treble_arm64_bvS.img.xz/download"
        }

        echo "Extracting image..."
        xz -d system.img.xz || unxz system.img.xz || {
          echo "Trying uncompressed download..."
          curl -L -o system.img "https://github.com/phhusson/treble_experimentations/releases/download/v313/system-roar-arm64-ab-vndklite-vanilla.img"
        }

        ls -lh system.img
        echo "GSI download complete"

    - name: Mount and customize GSI
      run: |
        cd ~/rom-work
        echo "[2/5] Mounting and customizing GSI..."

        mkdir -p gsi-mount

        sudo mount -o loop system.img gsi-mount || {
          echo "Loop mount failed, trying guestmount..."
          sudo apt-get update -qq
          sudo apt-get install -y libguestfs-tools
          sudo guestmount -a system.img -m /dev/sda1 gsi-mount || {
            echo "guestmount also failed, using direct modification"
            cp system.img system-modified.img
          }
        }

        if [ -d "gsi-mount/system" ] || [ -d "gsi-mount/framework" ]; then
          echo "Mounted successfully, customizing..."

          if [ -f gsi-mount/system/build.prop ]; then
            sudo sed -i 's/ro.product.name=.*/ro.product.name=limeos_rom/' gsi-mount/system/build.prop
            sudo sed -i 's/ro.product.brand=.*/ro.product.brand=LimeOS/' gsi-mount/system/build.prop
            sudo sed -i 's/ro.product.model=.*/ro.product.model=LimeOS for Virtual Master/' gsi-mount/system/build.prop
            sudo sed -i 's/ro.product.manufacturer=.*/ro.product.manufacturer=LimeOS/' gsi-mount/system/build.prop
            echo "ro.limeos.version=${{ env.ROM_VERSION }}" | sudo tee -a gsi-mount/system/build.prop
            echo "ro.vmos.supported=true" | sudo tee -a gsi-mount/system/build.prop
          fi

          sudo mkdir -p gsi-mount/system/etc/limeos
          printf '%s\n' '<?xml version="1.0" encoding="utf-8"?>' '<limeos-config>' "  <property name=\"version\" value=\"${{ env.ROM_VERSION }}\" />" '  <property name="vmos_compat" value="true" />' '  <property name="root_enabled" value="true" />' '</limeos-config>' | sudo tee gsi-mount/system/etc/limeos/config.xml > /dev/null

          sudo umount gsi-mount || sudo guestunmount gsi-mount

          mv system.img system-original.img
          cp system-modified.img system.img 2>/dev/null || true
        fi

        echo "Customization complete"

    - name: Create ROM package
      run: |
        cd ~/rom-work
        echo "[3/5] Creating ROM package..."

        BUILD_DATE=$(date +%Y%m%d_%H%M)
        PACKAGE_NAME="LimeOS-${{ env.ROM_VERSION }}-${BUILD_DATE}"

        mkdir -p "$PACKAGE_NAME"
        cp system.img "$PACKAGE_NAME/"

        printf '%s\n' '{' '  "name": "LimeOS",' "  \"version\": \"${{ env.ROM_VERSION }}\"," "  \"build_date\": \"$BUILD_DATE\"," '  "android_version": "11",' '  "api_level": 30,' '  "architecture": "arm64-v8a",' '  "build_type": "beta",' '  "based_on": "phh'"'"'s Android 11 GSI",' '  "features": [' '    "VMOS compatibility",' '    "System optimization",' '    "Root support",' '    "Dark theme"' '  ]' '}' > "$PACKAGE_NAME/rom_config.json"

        printf '%s\n' "LimeOS ${{ env.ROM_VERSION }}" "Build Date: $BUILD_DATE" "" "Based on: phh's Android 11 GSI (Treble)" "" "Import Method (Virtual Master / VMOS Pro):" "  1. Copy ZIP file to phone" "  2. Open Virtual Master app" '  3. Click "Add Custom ROM"' "  4. Select ZIP file" "  5. Wait for import" "  6. Start virtual machine" "" "Recommended:" "  - RAM: 2GB+" "  - Storage: 4GB+" "" "Note:" "  - First boot may take 3-5 minutes" "  - This is a Beta test version" "" "Support: https://3862242786-sudo.github.io/pan/qingning-rom.html" > "$PACKAGE_NAME/README.txt"

        printf '%s\n' "LimeOS ${{ env.ROM_VERSION }} Changelog" "========================" "" "Build Date: $BUILD_DATE" "" "[Based On]" "- phh's Android 11 GSI v313" "- Treble arm64 A/B" "" "[Features]" "- VMOS Virtual Master compatibility" "- System property optimization" "- Root support (via Magisk patch)" "- Dark theme base" "" "[Known Issues]" "- Some hardware features limited" "- First boot slower" "- Camera may not work" > "$PACKAGE_NAME/changelog.txt"

        zip -r "${PACKAGE_NAME}.zip" "$PACKAGE_NAME"

        echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV
        echo "ROM package created: ${PACKAGE_NAME}.zip"
        ls -lh "${PACKAGE_NAME}.zip"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: LimeOS-ROM
        path: ~/rom-work/${{ env.PACKAGE_NAME }}.zip
        retention-days: 30

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ env.ROM_VERSION }}
        name: LimeOS ${{ env.ROM_VERSION }}
        body: |
          ## LimeOS ${{ env.ROM_VERSION }}

          Custom ROM based on Android 11 GSI

          ### Features
          - Virtual Master (VMOS) compatibility
          - System optimization
          - Root support
          - Dark theme

          ### Import Method
          1. Download ZIP file
          2. Import in Virtual Master
          3. Start virtual machine

          ### Note
          This is a Beta test version, for development testing only.
        files: |
          ~/rom-work/${{ env.PACKAGE_NAME }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Build summary
      run: |
        echo "========================================"
        echo "  LimeOS ROM Build Complete!"
        echo "========================================"
        echo "Version: ${{ env.ROM_VERSION }}"
        echo "Package: ${{ env.PACKAGE_NAME }}"
        echo "Download: ~/rom-work/${{ env.PACKAGE_NAME }}.zip"
        ls -lh ~/rom-work/*.zip
