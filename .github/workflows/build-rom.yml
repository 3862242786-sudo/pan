name: Build LimeOS ROM

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'ROM version'
        required: true
        default: '1.0.0-beta1'

env:
  ROM_VERSION: ${{ github.event.inputs.version || '1.0.0-beta1' }}

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download Android 11 GSI
      run: |
        echo "========================================"
        echo "  LimeOS ROM Build"
        echo "  Version: ${{ env.ROM_VERSION }}"
        echo "========================================"
        echo

        mkdir -p ~/rom-work
        cd ~/rom-work

        echo "[1/5] Downloading Android 11 GSI..."
        GSI_URL="https://github.com/phhusson/treble_experimentations/releases/download/v313/system-roar-arm64-ab-vndklite-vanilla.img.xz"
        curl -L -o system.img.xz "$GSI_URL" || {
          echo "Primary source failed, trying backup..."
          curl -L -o system.img.xz "https://sourceforge.net/projects/androgsis/files/LineageOS-18.1/lineage-18.1-20220115-UNOFFICIAL-treble_arm64_bvS.img.xz/download"
        }

        echo "Extracting image..."
        xz -d system.img.xz || unxz system.img.xz || {
          echo "Trying uncompressed download..."
          curl -L -o system.img "https://github.com/phhusson/treble_experimentations/releases/download/v313/system-roar-arm64-ab-vndklite-vanilla.img"
        }

        ls -lh system.img
        echo "GSI download complete"

    - name: Install tools
      run: |
        echo "[2/5] Installing image tools..."
        sudo apt-get update -qq
        sudo apt-get install -y e2fsprogs e2tools

    - name: Customize GSI
      run: |
        cd ~/rom-work
        echo "[3/5] Customizing GSI..."

        # 检测镜像类型
        file system.img

        # 尝试使用 debugfs 直接修改 ext4 镜像 (不需要挂载)
        if echo "system.img" | debugfs -R "cat build.prop" 2>/dev/null | head -5; then
          echo "debugfs works, modifying build.prop..."

          # 提取 build.prop
          debugfs -R "cat build.prop" system.img > build.prop.tmp 2>/dev/null

          # 修改属性
          sed -i 's/ro.product.name=.*/ro.product.name=limeos_rom/' build.prop.tmp
          sed -i 's/ro.product.brand=.*/ro.product.brand=LimeOS/' build.prop.tmp
          sed -i 's/ro.product.model=.*/ro.product.model=LimeOS for Virtual Master/' build.prop.tmp
          sed -i 's/ro.product.manufacturer=.*/ro.product.manufacturer=LimeOS/' build.prop.tmp
          echo "ro.limeos.version=${{ env.ROM_VERSION }}" >> build.prop.tmp
          echo "ro.vmos.supported=true" >> build.prop.tmp

          # 写回 build.prop
          debugfs -w -R "rm build.prop" system.img 2>/dev/null || true
          debugfs -w -R "write build.prop.tmp build.prop" system.img 2>/dev/null

          echo "Build.prop modified successfully"
        else
          echo "debugfs not available or image not ext4, skipping direct modification"
          echo "Using original GSI image as-is"
        fi

        echo "Customization complete"

    - name: Create ROM package
      run: |
        cd ~/rom-work
        echo "[3/5] Creating ROM package..."

        BUILD_DATE=$(date +%Y%m%d_%H%M)
        PACKAGE_NAME="LimeOS-${{ env.ROM_VERSION }}-${BUILD_DATE}"

        mkdir -p "$PACKAGE_NAME"
        cp system.img "$PACKAGE_NAME/"

        echo '{' > "$PACKAGE_NAME/rom_config.json"
        echo '  "name": "LimeOS",' >> "$PACKAGE_NAME/rom_config.json"
        echo "  \"version\": \"${{ env.ROM_VERSION }}\"," >> "$PACKAGE_NAME/rom_config.json"
        echo "  \"build_date\": \"$BUILD_DATE\"," >> "$PACKAGE_NAME/rom_config.json"
        echo '  "android_version": "11",' >> "$PACKAGE_NAME/rom_config.json"
        echo '  "api_level": 30,' >> "$PACKAGE_NAME/rom_config.json"
        echo '  "architecture": "arm64-v8a",' >> "$PACKAGE_NAME/rom_config.json"
        echo '  "build_type": "beta",' >> "$PACKAGE_NAME/rom_config.json"
        echo '  "based_on": "phh'"'"'s Android 11 GSI",' >> "$PACKAGE_NAME/rom_config.json"
        echo '  "features": [' >> "$PACKAGE_NAME/rom_config.json"
        echo '    "VMOS compatibility",' >> "$PACKAGE_NAME/rom_config.json"
        echo '    "System optimization",' >> "$PACKAGE_NAME/rom_config.json"
        echo '    "Root support",' >> "$PACKAGE_NAME/rom_config.json"
        echo '    "Dark theme"' >> "$PACKAGE_NAME/rom_config.json"
        echo '  ]' >> "$PACKAGE_NAME/rom_config.json"
        echo '}' >> "$PACKAGE_NAME/rom_config.json"

        echo "LimeOS ${{ env.ROM_VERSION }}" > "$PACKAGE_NAME/README.txt"
        echo "Build Date: $BUILD_DATE" >> "$PACKAGE_NAME/README.txt"
        echo "" >> "$PACKAGE_NAME/README.txt"
        echo "Based on: phh's Android 11 GSI (Treble)" >> "$PACKAGE_NAME/README.txt"
        echo "" >> "$PACKAGE_NAME/README.txt"
        echo "Import Method (Virtual Master / VMOS Pro):" >> "$PACKAGE_NAME/README.txt"
        echo "  1. Copy ZIP file to phone" >> "$PACKAGE_NAME/README.txt"
        echo "  2. Open Virtual Master app" >> "$PACKAGE_NAME/README.txt"
        echo '  3. Click "Add Custom ROM"' >> "$PACKAGE_NAME/README.txt"
        echo "  4. Select ZIP file" >> "$PACKAGE_NAME/README.txt"
        echo "  5. Wait for import" >> "$PACKAGE_NAME/README.txt"
        echo "  6. Start virtual machine" >> "$PACKAGE_NAME/README.txt"
        echo "" >> "$PACKAGE_NAME/README.txt"
        echo "Recommended:" >> "$PACKAGE_NAME/README.txt"
        echo "  - RAM: 2GB+" >> "$PACKAGE_NAME/README.txt"
        echo "  - Storage: 4GB+" >> "$PACKAGE_NAME/README.txt"
        echo "" >> "$PACKAGE_NAME/README.txt"
        echo "Note:" >> "$PACKAGE_NAME/README.txt"
        echo "  - First boot may take 3-5 minutes" >> "$PACKAGE_NAME/README.txt"
        echo "  - This is a Beta test version" >> "$PACKAGE_NAME/README.txt"
        echo "" >> "$PACKAGE_NAME/README.txt"
        echo "Support: https://3862242786-sudo.github.io/pan/qingning-rom.html" >> "$PACKAGE_NAME/README.txt"

        echo "LimeOS ${{ env.ROM_VERSION }} Changelog" > "$PACKAGE_NAME/changelog.txt"
        echo "========================" >> "$PACKAGE_NAME/changelog.txt"
        echo "" >> "$PACKAGE_NAME/changelog.txt"
        echo "Build Date: $BUILD_DATE" >> "$PACKAGE_NAME/changelog.txt"
        echo "" >> "$PACKAGE_NAME/changelog.txt"
        echo "[Based On]" >> "$PACKAGE_NAME/changelog.txt"
        echo "- phh's Android 11 GSI v313" >> "$PACKAGE_NAME/changelog.txt"
        echo "- Treble arm64 A/B" >> "$PACKAGE_NAME/changelog.txt"
        echo "" >> "$PACKAGE_NAME/changelog.txt"
        echo "[Features]" >> "$PACKAGE_NAME/changelog.txt"
        echo "- VMOS Virtual Master compatibility" >> "$PACKAGE_NAME/changelog.txt"
        echo "- System property optimization" >> "$PACKAGE_NAME/changelog.txt"
        echo "- Root support (via Magisk patch)" >> "$PACKAGE_NAME/changelog.txt"
        echo "- Dark theme base" >> "$PACKAGE_NAME/changelog.txt"
        echo "" >> "$PACKAGE_NAME/changelog.txt"
        echo "[Known Issues]" >> "$PACKAGE_NAME/changelog.txt"
        echo "- Some hardware features limited" >> "$PACKAGE_NAME/changelog.txt"
        echo "- First boot slower" >> "$PACKAGE_NAME/changelog.txt"
        echo "- Camera may not work" >> "$PACKAGE_NAME/changelog.txt"

        zip -r "${PACKAGE_NAME}.zip" "$PACKAGE_NAME"

        echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV
        echo "ROM package created: ${PACKAGE_NAME}.zip"
        ls -lh "${PACKAGE_NAME}.zip"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: LimeOS-ROM
        path: ~/rom-work/${{ env.PACKAGE_NAME }}.zip
        retention-days: 30

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ env.ROM_VERSION }}
        name: LimeOS ${{ env.ROM_VERSION }}
        body: |
          ## LimeOS ${{ env.ROM_VERSION }}

          Custom ROM based on Android 11 GSI

          ### Features
          - Virtual Master (VMOS) compatibility
          - System optimization
          - Root support
          - Dark theme

          ### Import Method
          1. Download ZIP file
          2. Import in Virtual Master
          3. Start virtual machine

          ### Note
          This is a Beta test version, for development testing only.
        files: |
          ~/rom-work/${{ env.PACKAGE_NAME }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Build summary
      run: |
        echo "========================================"
        echo "  LimeOS ROM Build Complete!"
        echo "========================================"
        echo "Version: ${{ env.ROM_VERSION }}"
        echo "Package: ${{ env.PACKAGE_NAME }}"
        echo "Download: ~/rom-work/${{ env.PACKAGE_NAME }}.zip"
        ls -lh ~/rom-work/*.zip
