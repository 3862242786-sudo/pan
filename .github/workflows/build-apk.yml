name: Build LimeBrowser APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Build APK
      run: |
        cd lime-browser
        chmod +x gradlew 2>/dev/null || true
        ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: LimeBrowser-APK
        path: lime-browser/app/build/outputs/apk/debug/*.apk

    - name: Release APK
      uses: softprops/action-gh-release@v1
      with:
        tag_name: browser-v1.0.0
        name: LimeBrowser v1.0.0
        body: |
          LimeBrowser 青柠浏览器 APK
          - 基于 Chromium WebView
          - 支持 IE/Edge/Firefox 兼容模式
        files: lime-browser/app/build/outputs/apk/debug/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
