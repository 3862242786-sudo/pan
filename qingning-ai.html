<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>青柠AI助手</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-tertiary: #334155;
      --accent: #22c55e;
      --accent-hover: #16a34a;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border: #334155;
      --user-bubble: #22c55e;
      --user-bubble-text: #ffffff;
      --ai-bubble: #1e293b;
      --ai-bubble-text: #f1f5f9;
      --error: #ef4444;
      --warning: #f59e0b;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 4px 6px -1px rgba(0,0,0,0.3), 0 2px 4px -2px rgba(0,0,0,0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      z-index: 10;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo svg {
      width: 20px;
      height: 20px;
      fill: white;
    }

    .header-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .icon-btn:hover {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .icon-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    /* Main Layout */
    .main-container {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Settings Panel */
    .settings-panel {
      width: 320px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease;
      overflow-y: auto;
    }

    .settings-panel.hidden {
      transform: translateX(-100%);
      width: 0;
      border: none;
      overflow: hidden;
    }

    .settings-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .settings-header h2 {
      font-size: 16px;
      font-weight: 600;
    }

    .settings-body {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      flex: 1;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s ease;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--accent);
    }

    .form-group input[type="range"] {
      padding: 0;
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      background: var(--bg-tertiary);
      border-radius: 3px;
      outline: none;
    }

    .form-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    .range-value {
      font-size: 13px;
      color: var(--accent);
      font-weight: 500;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    .settings-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 10px 16px;
      border-radius: var(--radius-sm);
      border: none;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      flex: 1;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .btn-secondary {
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--border);
      color: var(--text-primary);
    }

    .security-notice {
      font-size: 11px;
      color: var(--warning);
      background: rgba(245, 158, 11, 0.1);
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(245, 158, 11, 0.2);
      line-height: 1.5;
    }

    /* Chat Area */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .welcome-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
      color: var(--text-muted);
      text-align: center;
      padding: 40px;
    }

    .welcome-screen .logo {
      width: 64px;
      height: 64px;
      border-radius: var(--radius);
    }

    .welcome-screen .logo svg {
      width: 36px;
      height: 36px;
    }

    .welcome-screen h2 {
      color: var(--text-primary);
      font-size: 22px;
    }

    .welcome-screen p {
      max-width: 400px;
      line-height: 1.6;
    }

    .message {
      display: flex;
      gap: 12px;
      max-width: 85%;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message.ai {
      align-self: flex-start;
    }

    .message-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .message.user .message-avatar {
      background: var(--accent);
    }

    .message.ai .message-avatar {
      background: var(--bg-tertiary);
    }

    .message-avatar svg {
      width: 18px;
      height: 18px;
      fill: white;
    }

    .message-content {
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.6;
      font-size: 14px;
      word-break: break-word;
    }

    .message.user .message-content {
      background: var(--user-bubble);
      color: var(--user-bubble-text);
      border-bottom-right-radius: 4px;
    }

    .message.ai .message-content {
      background: var(--ai-bubble);
      color: var(--ai-bubble-text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .message-content pre {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: var(--radius-sm);
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
      position: relative;
    }

    .message-content code {
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 13px;
    }

    .message-content pre code {
      background: none;
      padding: 0;
    }

    .message-content p code {
      background: rgba(255,255,255,0.1);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
    }

    .code-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 12px;
      background: #161b22;
      border: 1px solid #30363d;
      border-bottom: none;
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    .code-header + pre {
      margin-top: 0;
      border-radius: 0 0 var(--radius-sm) var(--radius-sm);
    }

    .copy-code-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 2px 6px;
      border-radius: 4px;
      transition: all 0.2s;
    }

    .copy-code-btn:hover {
      color: var(--text-primary);
      background: rgba(255,255,255,0.1);
    }

    .message-content ul, .message-content ol {
      margin: 8px 0;
      padding-left: 20px;
    }

    .message-content li {
      margin: 4px 0;
    }

    .message-content blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 12px;
      margin: 8px 0;
      color: var(--text-secondary);
    }

    .message-content table {
      border-collapse: collapse;
      margin: 8px 0;
      width: 100%;
    }

    .message-content th, .message-content td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
    }

    .message-content th {
      background: var(--bg-tertiary);
    }

    .message-content a {
      color: var(--accent);
      text-decoration: none;
    }

    .message-content a:hover {
      text-decoration: underline;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 4px 0;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: typingBounce 1.4s infinite ease-in-out both;
    }

    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

    @keyframes typingBounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    /* Input Area */
    .input-area {
      padding: 16px 20px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
    }

    .input-wrapper {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      max-width: 900px;
      margin: 0 auto;
    }

    .input-box {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 14px;
      resize: none;
      outline: none;
      max-height: 150px;
      min-height: 48px;
      line-height: 1.5;
    }

    .input-box:focus {
      border-color: var(--accent);
    }

    .input-box::placeholder {
      color: var(--text-muted);
    }

    .send-btn {
      width: 48px;
      height: 48px;
      border-radius: var(--radius);
      border: none;
      background: var(--accent);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    .send-btn:hover {
      background: var(--accent-hover);
    }

    .send-btn:disabled {
      background: var(--bg-tertiary);
      cursor: not-allowed;
    }

    .send-btn svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    .input-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 900px;
      margin: 8px auto 0;
      font-size: 12px;
      color: var(--text-muted);
    }

    .input-actions-left {
      display: flex;
      gap: 12px;
    }

    .action-link {
      color: var(--text-muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      transition: color 0.2s;
      background: none;
      border: none;
      font-family: inherit;
      font-size: 12px;
    }

    .action-link:hover {
      color: var(--accent);
    }

    .action-link svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }

    /* Error Toast */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--error);
      color: white;
      padding: 12px 20px;
      border-radius: var(--radius);
      font-size: 14px;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s ease;
      max-width: 90%;
      text-align: center;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Overlay for mobile */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 5;
      display: none;
    }

    .overlay.show {
      display: block;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .settings-panel {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 20;
        transform: translateX(-100%);
      }

      .settings-panel.open {
        transform: translateX(0);
      }

      .settings-panel.hidden {
        transform: translateX(-100%);
        width: 320px;
      }

      .message {
        max-width: 95%;
      }
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--bg-tertiary);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--border);
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="logo">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
      </div>
      <span class="header-title">青柠AI助手</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="btnNewChat" title="新建对话">
        <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      </button>
      <button class="icon-btn" id="btnExport" title="导出对话">
        <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
      </button>
      <button class="icon-btn" id="btnClear" title="清空对话">
        <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
      </button>
      <button class="icon-btn" id="btnSettings" title="设置">
        <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L3.16 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.58 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
      </button>
    </div>
  </header>

  <!-- Main Container -->
  <div class="main-container">
    <!-- Settings Panel -->
    <aside class="settings-panel" id="settingsPanel">
      <div class="settings-header">
        <h2>API 设置</h2>
        <button class="icon-btn" id="btnCloseSettings" style="width:28px;height:28px;">
          <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
      <div class="settings-body">
        <div class="form-group">
          <label>API 提供商</label>
          <select id="providerSelect">
            <option value="openai">OpenAI</option>
            <option value="gemini">Google Gemini</option>
            <option value="siliconflow">硅基流动 (Silicon Flow)</option>
            <option value="openrouter">OpenRouter</option>
            <option value="deepseek">DeepSeek</option>
            <option value="custom">自定义</option>
          </select>
        </div>

        <div class="form-group" id="customBaseUrlGroup" style="display:none;">
          <label>自定义 Base URL</label>
          <input type="text" id="customBaseUrl" placeholder="https://api.example.com/v1">
        </div>

        <div class="form-group" id="customEndpointGroup" style="display:none;">
          <label>自定义 Endpoint</label>
          <input type="text" id="customEndpoint" placeholder="/chat/completions">
        </div>

        <div class="form-group">
          <label>API Key</label>
          <input type="password" id="apiKey" placeholder="输入您的 API Key">
        </div>

        <div class="form-group">
          <label>模型</label>
          <select id="modelSelect"></select>
          <input type="text" id="customModel" placeholder="输入模型名称" style="display:none;margin-top:8px;">
        </div>

        <div class="form-group">
          <label>Temperature: <span class="range-value" id="tempValue">0.7</span></label>
          <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7">
        </div>

        <div class="form-group">
          <label>最大 Token 数</label>
          <input type="number" id="maxTokens" value="2048" min="1" max="8192">
        </div>

        <div class="form-group">
          <label>系统提示词 (System Prompt)</label>
          <textarea id="systemPrompt" placeholder="You are a helpful assistant">You are a helpful assistant</textarea>
        </div>

        <div class="security-notice">
          API Key 将保存在浏览器本地存储 (localStorage) 中。请勿在公共设备上使用此功能。
        </div>
      </div>
      <div class="settings-footer">
        <button class="btn btn-primary" id="btnSaveSettings">保存</button>
        <button class="btn btn-secondary" id="btnCancelSettings">取消</button>
      </div>
    </aside>

    <!-- Chat Container -->
    <div class="chat-container">
      <div class="messages-area" id="messagesArea">
        <div class="welcome-screen" id="welcomeScreen">
          <div class="logo">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
          </div>
          <h2>欢迎使用青柠AI助手</h2>
          <p>请在设置中配置您的 API Key，然后开始与 AI 对话。支持 OpenAI、Google Gemini、硅基流动、OpenRouter、DeepSeek 等多种服务商。</p>
        </div>
      </div>

      <div class="input-area">
        <div class="input-wrapper">
          <textarea class="input-box" id="messageInput" placeholder="输入消息..." rows="1"></textarea>
          <button class="send-btn" id="btnSend">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
        <div class="input-actions">
          <div class="input-actions-left">
            <button class="action-link" id="btnNewChat2">
              <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
              新建对话
            </button>
            <button class="action-link" id="btnExport2">
              <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
              导出
            </button>
          </div>
          <span id="statusText">就绪</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Overlay -->
  <div class="overlay" id="overlay"></div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ==================== Provider Configurations ====================
    const PROVIDERS = {
      openai: {
        name: 'OpenAI',
        baseUrl: 'https://api.openai.com/v1',
        endpoint: '/chat/completions',
        models: ['gpt-4o', 'gpt-4o-mini', 'gpt-4-turbo', 'gpt-3.5-turbo'],
        authType: 'bearer',
        supportsStream: true
      },
      gemini: {
        name: 'Google Gemini',
        baseUrl: 'https://generativelanguage.googleapis.com/v1beta',
        endpoint: '/models/{model}:generateContent',
        models: ['gemini-1.5-pro', 'gemini-1.5-flash', 'gemini-1.0-pro'],
        authType: 'query',
        supportsStream: false
      },
      siliconflow: {
        name: '硅基流动',
        baseUrl: 'https://api.siliconflow.cn/v1',
        endpoint: '/chat/completions',
        models: ['deepseek-ai/DeepSeek-V3', 'deepseek-ai/DeepSeek-R1', 'Qwen/Qwen2.5-72B-Instruct'],
        authType: 'bearer',
        supportsStream: true
      },
      openrouter: {
        name: 'OpenRouter',
        baseUrl: 'https://openrouter.ai/api/v1',
        endpoint: '/chat/completions',
        models: ['openai/gpt-4o', 'anthropic/claude-3.5-sonnet', 'google/gemini-pro'],
        authType: 'bearer',
        supportsStream: true,
        extraHeaders: {
          'HTTP-Referer': window.location.href,
          'X-Title': '青柠AI助手'
        }
      },
      deepseek: {
        name: 'DeepSeek',
        baseUrl: 'https://api.deepseek.com/v1',
        endpoint: '/chat/completions',
        models: ['deepseek-chat', 'deepseek-reasoner'],
        authType: 'bearer',
        supportsStream: true
      },
      custom: {
        name: '自定义',
        baseUrl: '',
        endpoint: '/chat/completions',
        models: [],
        authType: 'bearer',
        supportsStream: true
      }
    };

    // ==================== State ====================
    let messages = [];
    let isStreaming = false;
    let abortController = null;
    let currentSettings = loadSettings();

    // ==================== DOM Elements ====================
    const settingsPanel = document.getElementById('settingsPanel');
    const providerSelect = document.getElementById('providerSelect');
    const customBaseUrlGroup = document.getElementById('customBaseUrlGroup');
    const customBaseUrl = document.getElementById('customBaseUrl');
    const customEndpointGroup = document.getElementById('customEndpointGroup');
    const customEndpoint = document.getElementById('customEndpoint');
    const apiKeyInput = document.getElementById('apiKey');
    const modelSelect = document.getElementById('modelSelect');
    const customModel = document.getElementById('customModel');
    const temperatureInput = document.getElementById('temperature');
    const tempValue = document.getElementById('tempValue');
    const maxTokensInput = document.getElementById('maxTokens');
    const systemPromptInput = document.getElementById('systemPrompt');
    const messagesArea = document.getElementById('messagesArea');
    const welcomeScreen = document.getElementById('welcomeScreen');
    const messageInput = document.getElementById('messageInput');
    const btnSend = document.getElementById('btnSend');
    const statusText = document.getElementById('statusText');
    const toast = document.getElementById('toast');
    const overlay = document.getElementById('overlay');

    // ==================== Settings ====================
    function loadSettings() {
      const saved = localStorage.getItem('qingning_ai_settings');
      const defaults = {
        provider: 'openai',
        apiKey: '',
        model: 'gpt-4o-mini',
        temperature: 0.7,
        maxTokens: 2048,
        systemPrompt: 'You are a helpful assistant',
        customBaseUrl: '',
        customEndpoint: '/chat/completions',
        customModel: ''
      };
      return saved ? { ...defaults, ...JSON.parse(saved) } : defaults;
    }

    function saveSettingsToStorage() {
      localStorage.setItem('qingning_ai_settings', JSON.stringify(currentSettings));
    }

    function applySettingsToUI() {
      providerSelect.value = currentSettings.provider;
      apiKeyInput.value = currentSettings.apiKey;
      temperatureInput.value = currentSettings.temperature;
      tempValue.textContent = currentSettings.temperature;
      maxTokensInput.value = currentSettings.maxTokens;
      systemPromptInput.value = currentSettings.systemPrompt;
      customBaseUrl.value = currentSettings.customBaseUrl;
      customEndpoint.value = currentSettings.customEndpoint;
      customModel.value = currentSettings.customModel;
      updateModelOptions();
      if (currentSettings.provider === 'custom') {
        customBaseUrlGroup.style.display = 'flex';
        customEndpointGroup.style.display = 'flex';
      }
    }

    function updateModelOptions() {
      const provider = PROVIDERS[providerSelect.value];
      modelSelect.innerHTML = '';
      if (provider.models.length > 0) {
        provider.models.forEach(m => {
          const opt = document.createElement('option');
          opt.value = m;
          opt.textContent = m;
          modelSelect.appendChild(opt);
        });
        modelSelect.value = currentSettings.model;
        if (!modelSelect.value) modelSelect.value = provider.models[0];
        modelSelect.style.display = 'block';
        customModel.style.display = 'none';
      } else {
        modelSelect.style.display = 'none';
        customModel.style.display = 'block';
      }
    }

    function saveSettings() {
      currentSettings = {
        provider: providerSelect.value,
        apiKey: apiKeyInput.value.trim(),
        model: providerSelect.value === 'custom' ? customModel.value.trim() : modelSelect.value,
        temperature: parseFloat(temperatureInput.value),
        maxTokens: parseInt(maxTokensInput.value),
        systemPrompt: systemPromptInput.value,
        customBaseUrl: customBaseUrl.value.trim(),
        customEndpoint: customEndpoint.value.trim(),
        customModel: customModel.value.trim()
      };
      saveSettingsToStorage();
      hideSettings();
      showToast('设置已保存');
    }

    // ==================== UI Functions ====================
    function showSettings() {
      settingsPanel.classList.remove('hidden');
      if (window.innerWidth <= 768) {
        settingsPanel.classList.add('open');
        overlay.classList.add('show');
      }
    }

    function hideSettings() {
      settingsPanel.classList.add('hidden');
      settingsPanel.classList.remove('open');
      overlay.classList.remove('show');
    }

    function showToast(msg, duration = 3000) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), duration);
    }

    function updateStatus(text) {
      statusText.textContent = text;
    }

    // ==================== Message Handling ====================
    function renderMessages() {
      if (messages.length === 0) {
        welcomeScreen.style.display = 'flex';
        return;
      }
      welcomeScreen.style.display = 'none';
      messagesArea.innerHTML = '';
      messages.forEach((msg, index) => {
        const el = createMessageElement(msg, index);
        messagesArea.appendChild(el);
      });
      scrollToBottom();
    }

    function createMessageElement(msg, index) {
      const div = document.createElement('div');
      div.className = `message ${msg.role}`;
      div.dataset.index = index;

      const avatar = document.createElement('div');
      avatar.className = 'message-avatar';
      if (msg.role === 'user') {
        avatar.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>';
      } else {
        avatar.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>';
      }

      const content = document.createElement('div');
      content.className = 'message-content';
      content.innerHTML = msg.role === 'ai' || msg.role === 'assistant' ? renderMarkdown(msg.content) : escapeHtml(msg.content);

      div.appendChild(avatar);
      div.appendChild(content);
      return div;
    }

    function addMessage(role, content) {
      messages.push({ role, content, timestamp: Date.now() });
      saveMessages();
      if (messages.length === 1) welcomeScreen.style.display = 'none';
      const el = createMessageElement({ role, content }, messages.length - 1);
      messagesArea.appendChild(el);
      scrollToBottom();
    }

    function updateLastMessage(content) {
      if (messages.length === 0) return;
      messages[messages.length - 1].content = content;
      saveMessages();
      const msgEls = messagesArea.querySelectorAll('.message.ai');
      const lastEl = msgEls[msgEls.length - 1];
      if (lastEl) {
        lastEl.querySelector('.message-content').innerHTML = renderMarkdown(content);
        scrollToBottom();
      }
    }

    function scrollToBottom() {
      messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function saveMessages() {
      localStorage.setItem('qingning_ai_messages', JSON.stringify(messages));
    }

    function loadMessages() {
      const saved = localStorage.getItem('qingning_ai_messages');
      if (saved) {
        messages = JSON.parse(saved);
        renderMessages();
      }
    }

    function clearMessages() {
      messages = [];
      saveMessages();
      renderMessages();
      showToast('对话已清空');
    }

    function exportChat() {
      if (messages.length === 0) {
        showToast('没有可导出的对话');
        return;
      }
      let md = '# 青柠AI助手 对话记录\n\n';
      md += `导出时间: ${new Date().toLocaleString()}\n\n---\n\n`;
      messages.forEach(m => {
        const role = m.role === 'user' ? '用户' : 'AI';
        md += `## ${role}\n\n${m.content}\n\n---\n\n`;
      });
      const blob = new Blob([md], { type: 'text/markdown' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `qingning-chat-${Date.now()}.md`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('对话已导出');
    }

    // ==================== Markdown Renderer ====================
    function renderMarkdown(text) {
      if (!text) return '';
      let html = escapeHtml(text);

      // Code blocks with language
      html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
        const langDisplay = lang || 'code';
        return `<div class="code-header"><span>${langDisplay}</span><button class="copy-code-btn" onclick="copyCode(this)"><svg viewBox="0 0 24 24" width="14" height="14"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>复制</button></div><pre><code>${code.trim()}</code></pre>`;
      });

      // Inline code
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

      // Headers
      html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
      html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
      html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');

      // Bold and italic
      html = html.replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>');
      html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');

      // Links
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

      // Blockquote
      html = html.replace(/^&gt; (.*$)/gim, '<blockquote>$1</blockquote>');

      // Lists
      html = html.replace(/^\s*[-*+]\s+(.*$)/gim, '<li>$1</li>');
      html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
      html = html.replace(/<ul>(.*)<li>(.*)<\/li>(.*)<\/ul>/gs, (match) => match.replace(/<\/li>\n<li>/g, '</li><li>'));

      // Ordered lists
      html = html.replace(/^\s*\d+\.\s+(.*$)/gim, '<li>$1</li>');

      // Tables (simple)
      const tableRegex = /\|(.+)\|\n\|[-\s|]+\|\n((?:\|.+\|\n?)+)/g;
      html = html.replace(tableRegex, (match, header, rows) => {
        const headers = header.split('|').map(h => h.trim()).filter(h => h);
        const rowData = rows.trim().split('\n').map(r => r.split('|').map(c => c.trim()).filter(c => c));
        let table = '<table><thead><tr>';
        headers.forEach(h => table += `<th>${h}</th>`);
        table += '</tr></thead><tbody>';
        rowData.forEach(row => {
          table += '<tr>';
          row.forEach(c => table += `<td>${c}</td>`);
          table += '</tr>';
        });
        table += '</tbody></table>';
        return table;
      });

      // Horizontal rule
      html = html.replace(/^---$/gim, '<hr>');

      // Line breaks
      html = html.replace(/\n/g, '<br>');

      return html;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function copyCode(btn) {
      const pre = btn.parentElement.nextElementSibling;
      const code = pre.querySelector('code').textContent;
      navigator.clipboard.writeText(code).then(() => {
        btn.innerHTML = '<svg viewBox="0 0 24 24" width="14" height="14"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>已复制';
        setTimeout(() => {
          btn.innerHTML = '<svg viewBox="0 0 24 24" width="14" height="14"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>复制';
        }, 2000);
      });
    }

    // ==================== API Handling ====================
    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text || isStreaming) return;

      if (!currentSettings.apiKey && currentSettings.provider !== 'custom') {
        showToast('请先设置 API Key');
        showSettings();
        return;
      }

      messageInput.value = '';
      messageInput.style.height = 'auto';
      addMessage('user', text);
      addMessage('ai', '');

      const provider = PROVIDERS[currentSettings.provider];
      const model = currentSettings.model;

      isStreaming = true;
      btnSend.disabled = true;
      updateStatus('发送中...');

      try {
        if (currentSettings.provider === 'gemini') {
          await sendGeminiRequest(text, model);
        } else {
          await sendOpenAICompatibleRequest(text, provider, model);
        }
      } catch (err) {
        console.error(err);
        updateLastMessage('请求出错: ' + (err.message || '未知错误'));
        showToast('请求失败: ' + (err.message || '未知错误'));
      } finally {
        isStreaming = false;
        btnSend.disabled = false;
        updateStatus('就绪');
        if (abortController) {
          abortController = null;
        }
      }
    }

    async function sendOpenAICompatibleRequest(text, provider, model) {
      const baseUrl = currentSettings.provider === 'custom' ? currentSettings.customBaseUrl : provider.baseUrl;
      const endpoint = currentSettings.provider === 'custom' ? currentSettings.customEndpoint : provider.endpoint;
      const url = baseUrl.replace(/\/$/, '') + endpoint;

      const headers = {
        'Content-Type': 'application/json'
      };

      if (provider.authType === 'bearer') {
        headers['Authorization'] = `Bearer ${currentSettings.apiKey}`;
      }

      if (provider.extraHeaders) {
        Object.assign(headers, provider.extraHeaders);
      }

      const body = {
        model: model,
        messages: [
          { role: 'system', content: currentSettings.systemPrompt },
          ...messages.filter(m => m.role !== 'system').slice(0, -1).map(m => ({
            role: m.role === 'ai' ? 'assistant' : m.role,
            content: m.content
          })),
          { role: 'user', content: text }
        ],
        temperature: currentSettings.temperature,
        max_tokens: currentSettings.maxTokens
      };

      if (provider.supportsStream) {
        body.stream = true;
      }

      abortController = new AbortController();

      const response = await fetch(url, {
        method: 'POST',
        headers,
        body: JSON.stringify(body),
        signal: abortController.signal
      });

      if (!response.ok) {
        const errText = await response.text();
        throw new Error(`HTTP ${response.status}: ${errText}`);
      }

      if (provider.supportsStream && response.headers.get('content-type')?.includes('text/event-stream')) {
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let fullContent = '';

        updateStatus('接收中...');

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            const trimmed = line.trim();
            if (!trimmed || !trimmed.startsWith('data: ')) continue;
            const data = trimmed.slice(6);
            if (data === '[DONE]') continue;

            try {
              const json = JSON.parse(data);
              const delta = json.choices?.[0]?.delta?.content;
              if (delta) {
                fullContent += delta;
                updateLastMessage(fullContent);
              }
            } catch (e) {
              // ignore parse errors
            }
          }
        }
      } else {
        updateStatus('处理中...');
        const data = await response.json();
        const content = data.choices?.[0]?.message?.content || data.content || JSON.stringify(data);
        updateLastMessage(content);
      }
    }

    async function sendGeminiRequest(text, model) {
      const baseUrl = PROVIDERS.gemini.baseUrl;
      const endpoint = PROVIDERS.gemini.endpoint.replace('{model}', model);
      const url = `${baseUrl}${endpoint}?key=${currentSettings.apiKey}`;

      const history = messages.filter(m => m.role !== 'system').slice(0, -1);
      const contents = [];

      history.forEach(m => {
        contents.push({
          role: m.role === 'user' ? 'user' : 'model',
          parts: [{ text: m.content }]
        });
      });

      contents.push({
        role: 'user',
        parts: [{ text: text }]
      });

      const body = {
        contents,
        generationConfig: {
          temperature: currentSettings.temperature,
          maxOutputTokens: currentSettings.maxTokens
        },
        systemInstruction: {
          parts: [{ text: currentSettings.systemPrompt }]
        }
      };

      abortController = new AbortController();

      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
        signal: abortController.signal
      });

      if (!response.ok) {
        const errText = await response.text();
        throw new Error(`HTTP ${response.status}: ${errText}`);
      }

      const data = await response.json();
      const content = data.candidates?.[0]?.content?.parts?.[0]?.text || JSON.stringify(data);
      updateLastMessage(content);
    }

    // ==================== Event Listeners ====================
    document.getElementById('btnSettings').addEventListener('click', showSettings);
    document.getElementById('btnCloseSettings').addEventListener('click', hideSettings);
    document.getElementById('btnSaveSettings').addEventListener('click', saveSettings);
    document.getElementById('btnCancelSettings').addEventListener('click', hideSettings);
    overlay.addEventListener('click', hideSettings);

    providerSelect.addEventListener('change', () => {
      const isCustom = providerSelect.value === 'custom';
      customBaseUrlGroup.style.display = isCustom ? 'flex' : 'none';
      customEndpointGroup.style.display = isCustom ? 'flex' : 'none';
      updateModelOptions();
    });

    temperatureInput.addEventListener('input', () => {
      tempValue.textContent = temperatureInput.value;
    });

    btnSend.addEventListener('click', sendMessage);

    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    messageInput.addEventListener('input', () => {
      messageInput.style.height = 'auto';
      messageInput.style.height = Math.min(messageInput.scrollHeight, 150) + 'px';
    });

    document.getElementById('btnNewChat').addEventListener('click', clearMessages);
    document.getElementById('btnNewChat2').addEventListener('click', clearMessages);
    document.getElementById('btnClear').addEventListener('click', clearMessages);
    document.getElementById('btnExport').addEventListener('click', exportChat);
    document.getElementById('btnExport2').addEventListener('click', exportChat);

    // ==================== Init ====================
    applySettingsToUI();
    loadMessages();
  </script>
</body>
</html>
