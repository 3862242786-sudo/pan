<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网站维护中 - 青柠网盘</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            line-height: 1.6;
            color: #e2e8f0;
            background-color: #0f172a;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .container {
            max-width: 520px;
            width: 100%;
            text-align: center;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 图标 */
        .icon-wrapper {
            width: 100px; height: 100px;
            margin: 0 auto 32px;
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.15), rgba(59, 130, 246, 0.15));
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            animation: float 3s ease-in-out infinite;
        }
        .icon-wrapper svg {
            width: 48px; height: 48px; color: #22c55e;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* 标题 */
        h1 {
            font-size: 28px; font-weight: 700; color: #f1f5f9;
            margin-bottom: 16px;
        }

        /* 描述文字 */
        .description {
            font-size: 16px; color: #94a3b8; line-height: 1.8;
            margin-bottom: 32px;
            padding: 0 16px;
        }

        /* 激活码输入区 */
        .unlock-section {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.15);
            border-radius: 16px; padding: 28px;
            margin-bottom: 24px;
        }
        .unlock-title {
            font-size: 14px; color: #64748b; margin-bottom: 16px;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .unlock-form {
            display: flex; gap: 10px;
        }
        .unlock-input {
            flex: 1; padding: 14px 18px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 10px; color: #e2e8f0;
            font-size: 15px; outline: none;
            transition: all 0.2s;
        }
        .unlock-input:focus {
            border-color: #22c55e;
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1);
        }
        .unlock-input::placeholder { color: #475569; }
        .unlock-btn {
            padding: 14px 28px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: #fff; border: none; border-radius: 10px;
            font-size: 15px; font-weight: 600; cursor: pointer;
            transition: all 0.2s; white-space: nowrap;
        }
        .unlock-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.3);
        }
        .unlock-btn:disabled {
            background: #334155; color: #64748b;
            cursor: not-allowed; transform: none;
        }

        /* 消息提示 */
        .message {
            padding: 10px 16px; border-radius: 8px;
            font-size: 13px; margin-top: 12px;
            display: none;
        }
        .message.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171; display: block;
        }
        .message.success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            color: #4ade80; display: block;
        }

        /* 底部链接 */
        .footer-links {
            display: flex; gap: 16px; justify-content: center;
            flex-wrap: wrap;
        }
        .footer-link {
            font-size: 13px; color: #64748b;
            text-decoration: none; transition: color 0.2s;
            display: flex; align-items: center; gap: 4px;
        }
        .footer-link:hover { color: #22c55e; }

        /* 版权 */
        .copyright {
            margin-top: 48px; font-size: 12px; color: #475569;
        }

        /* 响应式 */
        @media (max-width: 480px) {
            h1 { font-size: 22px; }
            .unlock-form { flex-direction: column; }
            .unlock-btn { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 图标 -->
        <div class="icon-wrapper">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
        </div>

        <!-- 标题 -->
        <h1 id="closedTitle">网站暂时关闭</h1>

        <!-- 描述 -->
        <p class="description" id="closedDesc">
            网站正在进行维护或更新，暂时无法访问。<br>请稍后再试，感谢你的理解与支持。
        </p>

        <!-- 激活码解锁 -->
        <div class="unlock-section">
            <div class="unlock-title">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                管理员或持有激活码可解锁
            </div>
            <div class="unlock-form">
                <input type="text" class="unlock-input" id="unlockCode" placeholder="输入激活码..." autocomplete="off">
                <button class="unlock-btn" id="unlockBtn" onclick="handleUnlock()">解锁</button>
            </div>
            <div class="message" id="unlockMsg"></div>
        </div>

        <!-- 底部链接 -->
        <div class="footer-links">
            <a href="auth.html" class="footer-link">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                站长登录
            </a>
            <a href="mailto:3862242786@qq.com" class="footer-link">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                联系站长
            </a>
        </div>

        <!-- 版权 -->
        <div class="copyright">
            &copy; 2024-2026 青柠网盘 · 王梓豪制作
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.js"></script>
    <script src="auth2.js"></script>
    <script>
        // 页面加载时读取关闭设置
        (function() {
            // 从 URL 参数获取自定义文字
            var params = new URLSearchParams(window.location.search);
            var title = params.get('title');
            var desc = params.get('desc');

            if (title) document.getElementById('closedTitle').textContent = decodeURIComponent(title);
            if (desc) document.getElementById('closedDesc').innerHTML = decodeURIComponent(desc).replace(/\\n/g, '<br>');

            // 检查是否已登录站长账户
            var isLoggedIn = localStorage.getItem('qn_logged_in');
            var isAdmin = localStorage.getItem('qn_is_admin');
            if (isLoggedIn === 'true' && isAdmin === 'true') {
                // 站长已登录，直接跳转首页
                window.location.href = 'index.html';
                return;
            }

            // 检查是否已解锁
            if (sessionStorage.getItem('qn_site_unlocked') === 'true') {
                window.location.href = 'index.html';
                return;
            }
        })();

        // 解锁处理
        function handleUnlock() {
            var code = document.getElementById('unlockCode').value.trim();
            var msgEl = document.getElementById('unlockMsg');
            var btn = document.getElementById('unlockBtn');

            if (!code) {
                showMsg(msgEl, '请输入激活码', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = '验证中...';

            // 检查激活码是否正确（从云端 site_settings.json 读取）
            setTimeout(function() {
                try {
                    var { data } = supabaseClient.storage.from('files').getPublicUrl('site_settings.json');
                    fetch(data.publicUrl + '?t=' + Date.now())
                        .then(function(resp) { return resp.json(); })
                        .then(function(settings) {
                            var validCodes = settings.unlockCodes || [];
                            // 也支持站长激活码前缀
                            if (code.startsWith('xt') || validCodes.indexOf(code) !== -1 || code === settings.adminUnlockCode) {
                                sessionStorage.setItem('qn_site_unlocked', 'true');
                                showMsg(msgEl, '解锁成功！正在跳转...', 'success');
                                setTimeout(function() {
                                    window.location.href = 'index.html';
                                }, 1000);
                            } else {
                                showMsg(msgEl, '激活码无效', 'error');
                                btn.disabled = false;
                                btn.textContent = '解锁';
                            }
                        })
                        .catch(function() {
                            // 网络错误时，检查本地存储的激活码
                            var localCodes = JSON.parse(localStorage.getItem('qn_unlock_codes') || '[]');
                            if (code.startsWith('xt') || localCodes.indexOf(code) !== -1) {
                                sessionStorage.setItem('qn_site_unlocked', 'true');
                                showMsg(msgEl, '解锁成功！正在跳转...', 'success');
                                setTimeout(function() {
                                    window.location.href = 'index.html';
                                }, 1000);
                            } else {
                                showMsg(msgEl, '激活码无效', 'error');
                                btn.disabled = false;
                                btn.textContent = '解锁';
                            }
                        });
                } catch(e) {
                    showMsg(msgEl, '验证失败，请稍后重试', 'error');
                    btn.disabled = false;
                    btn.textContent = '解锁';
                }
            }, 300);
        }

        // 回车触发
        document.getElementById('unlockCode').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') handleUnlock();
        });

        function showMsg(el, text, type) {
            el.textContent = text;
            el.className = 'message ' + type;
        }
    </script>
</body>
</html>
