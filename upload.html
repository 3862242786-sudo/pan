<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上传文件 - 青柠网盘</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* 验证徽章样式 */
        .verify-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: #fff;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 12px;
            margin-left: 8px;
            cursor: help;
        }
        /* 政策提示样式 */
        .policy-notice {
            background: linear-gradient(135deg, #f0fdf4, #dcfce7);
            border: 1px solid #bbf7d0;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 24px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        .policy-notice-icon {
            width: 40px;
            height: 40px;
            background: #22c55e;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .policy-notice-icon svg {
            width: 24px;
            height: 24px;
            stroke: #fff;
        }
        .policy-notice-content h4 {
            font-size: 15px;
            font-weight: 600;
            color: #166534;
            margin: 0 0 4px 0;
        }
        .policy-notice-content p {
            font-size: 13px;
            color: #15803d;
            margin: 0;
            line-height: 1.5;
        }
        .policy-notice-content a {
            color: #16a34a;
            text-decoration: underline;
            font-weight: 500;
        }
        /* 文件列表样式 */
        .uploaded-files {
            margin-top: 32px;
        }
        .uploaded-files h2 {
            font-size: 18px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .uploaded-files h2 svg {
            width: 20px; height: 20px; stroke: #3b82f6;
        }
        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            margin-bottom: 8px;
            gap: 12px;
        }
        .file-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }
        .file-icon {
            font-size: 24px;
            flex-shrink: 0;
        }
        .file-detail {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }
        .file-name {
            font-size: 14px;
            font-weight: 500;
            color: #1e293b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }
        .file-meta {
            font-size: 12px;
            color: #94a3b8;
        }
        .file-download-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 8px 16px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .file-download-btn:active {
            opacity: 0.8;
        }
        .file-download-btn svg {
            width: 16px; height: 16px;
        }
        /* 上传结果样式 */
        .upload-summary {
            font-size: 14px;
            color: #1e293b;
            margin-bottom: 12px;
        }
        .result-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 6px;
            font-size: 13px;
        }
        .result-item.success {
            background: #f0fdf4;
            color: #166534;
        }
        .result-item.fail {
            background: #fef2f2;
            color: #991b1b;
        }
        .result-item .download-link {
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
        }
        .loading-text {
            text-align: center;
            color: #94a3b8;
            padding: 24px;
            font-size: 14px;
        }
        .empty-text {
            text-align: center;
            color: #94a3b8;
            padding: 40px 20px;
            font-size: 14px;
        }
        .empty-text svg {
            width: 48px; height: 48px;
            stroke: #cbd5e1;
            margin-bottom: 12px;
        }
        /* 待上传文件样式 */
        .pending-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            margin-bottom: 6px;
            font-size: 13px;
        }
        .pending-name {
            color: #1e293b;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .pending-size {
            color: #94a3b8;
            margin: 0 12px;
            flex-shrink: 0;
        }
        .pending-remove {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 16px;
            padding: 2px 6px;
            flex-shrink: 0;
        }
    </style>
    <script src="site-check.js"></script>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo"><svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg> 青柠网盘</a>
            <ul class="nav-links">
                <li><a href="index.html#files">文件列表</a></li>
                <li><a href="about.html">关于</a></li>
                <li><a href="upload.html" class="nav-login-btn">上传文件</a></li>
            </ul>
            <button class="mobile-menu-btn" aria-label="菜单">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- 上传页面 -->
    <section class="upload-page">
        <div class="container">
            <div class="upload-header">
                <h1><svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg> 上传文件</h1>
                <p>未登录用户限制 20MB，登录后可上传 50MB</p>
            </div>

            <!-- 文件保护政策提示 -->
            <div class="policy-notice">
                <div class="policy-notice-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>
                </div>
                <div class="policy-notice-content">
                    <h4>📋 青柠网盘文件保护政策</h4>
                    <p>为防止文件被误删，每个上传的文件都会自动生成专属确认文件（.qn-verify）。<br>确认文件包含原始文件信息和验证数据，可用于文件恢复。<a href="upload-policy.html" target="_blank">查看详细政策</a></p>
                </div>
            </div>

            <!-- 上传区域 -->
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon"><svg class="icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg></div>
                <p>点击或拖拽文件到此处上传</p>
                <input type="file" id="fileInput" multiple style="display:none" onchange="handleFileSelect(event)">
                <button class="upload-select-btn" onclick="document.getElementById('fileInput').click()">选择文件</button>
            </div>

            <!-- 文件列表（待上传） -->
            <div id="pendingFiles" class="pending-files" style="display:none">
                <h3>待上传文件</h3>
                <div id="pendingList"></div>
                <button class="auth-submit-btn" onclick="uploadAllFiles()" id="uploadBtn">开始上传</button>
            </div>

            <!-- 上传进度 -->
            <div id="uploadProgress" class="upload-progress" style="display:none">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p id="progressText">上传中...</p>
            </div>

            <!-- 上传结果 -->
            <div id="uploadResult" class="upload-result" style="display:none">
                <h3>上传结果</h3>
                <div id="resultList"></div>
                <a href="index.html#files" class="back-to-login"><svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg> 查看所有文件</a>
            </div>

            <!-- 已上传文件列表 -->
            <div class="uploaded-files">
                <h2><svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg> 已上传文件</h2>
                <div id="fileList" class="file-list">
                    <div class="loading-text">加载中...</div>
                </div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024-2026 青柠网盘. All rights reserved.</p>
            <p class="credit">王梓豪制作</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.js"></script>
    <script src="auth2.js"></script>
    <script src="upload3.js"></script>
    <script>
        // 登录状态同步：检查并恢复 Supabase Session
        (async function() {
            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (session) {
                    localStorage.setItem('qn_logged_in', 'true');
                    localStorage.setItem('qn_user_email', session.user.email);
                    localStorage.setItem('qn_user_name', session.user.user_metadata?.name || session.user.email.split('@')[0]);
                    if (session.user.email === '3862242786@qq.com') {
                        localStorage.setItem('qn_is_admin', 'true');
                    }
                } else {
                    // Session 过期，清除登录状态
                    localStorage.removeItem('qn_logged_in');
                    localStorage.removeItem('qn_is_admin');
                }
            } catch(e) {}
        })();
    </script>
</body>
</html>
