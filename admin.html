<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 青柠网盘</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">🍋 青柠网盘</a>
            <ul class="nav-links">
                <li><a href="index.html#files">文件列表</a></li>
                <li><a href="about.html">关于</a></li>
                <li><a href="admin.html" class="nav-login-btn">管理后台</a></li>
                <li><a href="javascript:void(0)" onclick="handleLogout()">退出</a></li>
            </ul>
            <button class="mobile-menu-btn" aria-label="菜单">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- 管理后台 -->
    <section class="admin-page">
        <div class="container">
            <div class="admin-header">
                <h1>🛡️ 站长管理后台</h1>
                <p id="adminEmail">管理员：加载中...</p>
            </div>

            <!-- 统计卡片 -->
            <div class="admin-stats">
                <div class="admin-stat-card">
                    <div class="stat-icon">👥</div>
                    <div class="stat-info">
                        <span class="stat-number" id="totalUsers">0</span>
                        <span class="stat-label">注册用户</span>
                    </div>
                </div>
                <div class="admin-stat-card">
                    <div class="stat-icon">📂</div>
                    <div class="stat-info">
                        <span class="stat-number" id="totalFiles">0</span>
                        <span class="stat-label">文件数量</span>
                    </div>
                </div>
                <div class="admin-stat-card">
                    <div class="stat-icon">📊</div>
                    <div class="stat-info">
                        <span class="stat-number" id="todayVisits">--</span>
                        <span class="stat-label">今日访问</span>
                    </div>
                </div>
            </div>

            <!-- 管理功能 -->
            <div class="admin-sections">
                <!-- 文件管理 -->
                <div class="admin-section">
                    <h2>📂 文件管理</h2>
                    <div class="admin-card">
                        <div class="admin-toolbar">
                            <input type="text" id="fileSearch" placeholder="搜索文件名..." oninput="searchAdminFiles()">
                            <button class="admin-btn" onclick="loadAdminFiles()">🔄 刷新列表</button>
                            <button class="admin-btn" style="background:#f59e0b" onclick="document.getElementById('adminFileInput').click()">📤 上传文件</button>
                            <input type="file" id="adminFileInput" multiple style="display:none" onchange="adminUploadFiles(event)">
                        </div>
                        <div id="adminUploadProgress" style="display:none;margin-bottom:16px;">
                            <div class="progress-bar">
                                <div class="progress-fill" id="adminProgressFill"></div>
                            </div>
                            <p id="adminProgressText" style="text-align:center;color:#666;font-size:0.9rem;">上传中...</p>
                        </div>
                        <div class="user-list" id="adminFileList">
                            <div class="loading-text">加载中...</div>
                        </div>
                    </div>
                </div>

                <!-- 用户管理 -->
                <div class="admin-section">
                    <h2>👥 用户管理</h2>
                    <div class="admin-card">
                        <div class="admin-toolbar">
                            <input type="text" id="userSearch" placeholder="搜索用户邮箱..." oninput="searchUsers()">
                            <button class="admin-btn" onclick="loadUsers()">🔄 刷新列表</button>
                        </div>
                        <div class="user-list" id="userList">
                            <div class="loading-text">加载中...</div>
                        </div>
                    </div>
                </div>

                <!-- 网站公告 -->
                <div class="admin-section">
                    <h2>📢 网站公告</h2>
                    <div class="admin-card">
                        <textarea id="announcement" placeholder="输入网站公告内容..." rows="3"></textarea>
                        <button class="admin-btn" onclick="saveAnnouncement()">💾 保存公告</button>
                        <div id="announcementMsg" class="admin-msg"></div>
                    </div>
                </div>

                <!-- 网站设置 -->
                <div class="admin-section">
                    <h2>⚙️ 网站设置</h2>
                    <div class="admin-card">
                        <div class="setting-item">
                            <label>是否开放注册</label>
                            <select id="allowRegister" onchange="saveSetting('allowRegister')">
                                <option value="true">✅ 开放</option>
                                <option value="false">❌ 关闭</option>
                            </select>
                        </div>
                        <div class="setting-item">
                            <label>站长联系邮箱</label>
                            <input type="email" id="adminContact" placeholder="设置联系邮箱" onchange="saveSetting('contact')">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 青柠网盘. All rights reserved.</p>
            <p class="credit">王梓豪制作</p>
        </div>
    </footer>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="auth2.js"></script>
    <script src="admin3.js"></script>
</body>
</html>
