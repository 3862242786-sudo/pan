<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>青柠网盘</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#f5f5f5;--card:#fff;--text:#333;--text2:#666;--primary:#3b82f6;--border:#e0e0e0;--shadow:0 2px 8px rgba(0,0,0,0.08)}
        body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:16px;padding-bottom:80px}
        .header{background:var(--card);padding:16px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow);position:sticky;top:0;z-index:100;margin:-16px -16px 16px}
        .logo{display:flex;align-items:center;gap:8px;font-weight:600;font-size:16px}
        .logo svg{width:28px;height:28px}
        .btn{padding:10px 16px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer}
        .btn:active{opacity:0.8}
        .card{background:var(--card);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
        .upload-area{border:2px dashed var(--border);border-radius:12px;padding:30px;text-align:center;cursor:pointer;transition:all 0.2s}
        .upload-area:active{background:var(--bg)}
        .upload-area svg{width:40px;height:40px;margin-bottom:8px;stroke:var(--primary);fill:none;stroke-width:1.5}
        .file-list{display:flex;flex-direction:column;gap:8px}
        .file-item{background:var(--card);padding:12px 16px;border-radius:10px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px;cursor:pointer}
        .file-item:active{background:var(--bg)}
        .file-icon{width:36px;height:36px;background:var(--bg);border-radius:8px;display:flex;align-items:center;justify-content:center}
        .file-icon svg{width:18px;height:18px;stroke:var(--primary);fill:none;stroke-width:2}
        .file-info{flex:1;min-width:0}
        .file-name{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .file-meta{font-size:12px;color:var(--text2);margin-top:2px}
        .empty{text-align:center;padding:40px;color:var(--text2);font-size:14px}
        .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;opacity:0;transition:opacity 0.3s;z-index:1000}
        .toast.show{opacity:1}
        .loading{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        input[type=file]{display:none}
    </style>
    <script src="site-check.js"></script>
</head>
<body>
    <div class="toast" id="toast"></div>
    
    <div class="header">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>
            青柠网盘 v4.2.0
        </div>
        <button class="btn" onclick="document.getElementById('fileInput').click()">上传</button>
    </div>

    <input type="file" id="fileInput" onchange="uploadFile(this.files[0])">

    <div class="card">
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <div style="color:var(--text2);font-size:14px">点击上传文件</div>
        </div>
    </div>

    <div class="card">
        <div style="font-weight:600;margin-bottom:12px">文件列表</div>
        <div class="file-list" id="fileList">
            <div class="empty">加载中...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.js"></script>
    <script>
        const SUPABASE_URL='https://jbmymvpydycurynmxgbr.supabase.co';
        const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpibXltdnB5ZHljdXJ5bm14Z2JyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNDA0NjYsImV4cCI6MjA5MzkxNjQ2Nn0.FpL-rWQHriqyuDA3l1vEiovZVcGhUbpOVCUS_X5h33E';
        const BUCKET='files';
        
        let supabase=null;
        
        function showToast(msg){
            const t=document.getElementById('toast');
            t.textContent=msg;
            t.classList.add('show');
            setTimeout(()=>t.classList.remove('show'),2000);
        }
        
        function formatSize(b){
            if(!b)return'0 B';
            const k=1024;
            const s=['B','KB','MB','GB'];
            const i=Math.floor(Math.log(b)/Math.log(k));
            return parseFloat((b/Math.pow(k,i)).toFixed(1))+' '+s[i];
        }
        
        function escapeHtml(t){
            const d=document.createElement('div');
            d.textContent=t;
            return d.innerHTML;
        }
        
        async function loadFiles(){
            if(!supabase){
                document.getElementById('fileList').innerHTML='<div class="empty">服务未加载，请刷新</div>';
                return;
            }
            
            try{
                const{data,error}=await supabase.storage.from(BUCKET).list('',{limit:100,sortBy:{column:'created_at',order:'desc'}});
                if(error)throw error;
                
                const files=data||[];
                const container=document.getElementById('fileList');
                
                if(files.length===0){
                    container.innerHTML='<div class="empty">暂无文件</div>';
                    return;
                }
                
                container.innerHTML=files.map(f=>{
                    const size=formatSize(f.metadata?.size||0);
                    const date=new Date(f.created_at).toLocaleDateString('zh-CN',{month:'short',day:'numeric'});
                    return`<div class="file-item" onclick="downloadFile('${escapeHtml(f.name)}')">
                        <div class="file-icon">
                            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                        </div>
                        <div class="file-info">
                            <div class="file-name">${escapeHtml(f.name)}</div>
                            <div class="file-meta">${size} · ${date}</div>
                        </div>
                    </div>`;
                }).join('');
            }catch(e){
                document.getElementById('fileList').innerHTML='<div class="empty">加载失败，点击重试</div>';
            }
        }
        
        async function uploadFile(file){
            if(!file)return;
            if(!supabase){showToast('服务未加载');return;}
            
            showToast('正在上传...');
            
            try{
                let fileName=file.name;
                let counter=1;
                const ext=file.name.includes('.')?file.name.split('.').pop():'';
                const baseName=ext?file.name.slice(0,-(ext.length+1)):file.name;
                
                // 检查重名
                const{data:existing}=await supabase.storage.from(BUCKET).list();
                while((existing||[]).some(f=>f.name===fileName)){
                    fileName=ext?`${baseName}(${counter}).${ext}`:`${baseName}(${counter})`;
                    counter++;
                }
                
                const{error}=await supabase.storage.from(BUCKET).upload(fileName,file,{cacheControl:'3600',upsert:false});
                if(error)throw error;
                
                showToast('上传成功');
                document.getElementById('fileInput').value='';
                loadFiles();
            }catch(e){
                showToast('上传失败: '+e.message);
            }
        }
        
        function downloadFile(name){
            if(!supabase){showToast('服务未加载');return;}
            try{
                const{data}=supabase.storage.from(BUCKET).getPublicUrl(name);
                // 在新窗口打开下载链接
                window.open(data.publicUrl,'_blank');
                showToast('正在下载...');
            }catch(e){
                showToast('下载失败');
            }
        }
        
        // 初始化
        if(typeof window.supabase!=='undefined'){
            supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
            loadFiles();
        }else{
            // CDN加载失败
            document.getElementById('fileList').innerHTML='<div class="empty">网络错误，请刷新重试</div>';
        }
    </script>
</body>
</html>
