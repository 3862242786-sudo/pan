<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>青柠网盘</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#f8fafc;--card:#fff;--text:#1e293b;--text2:#64748b;--primary:#3b82f6;--primary-light:#dbeafe;--border:#e2e8f0;--success:#22c55e;--error:#ef4444;--shadow:0 4px 20px rgba(0,0,0,0.08)}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:16px;padding-bottom:100px}
        .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
        .logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:18px}
        .logo-icon{width:40px;height:40px;background:var(--primary);border-radius:12px;display:flex;align-items:center;justify-content:center}
        .logo-icon svg{width:24px;height:24px;stroke:#fff;fill:none;stroke-width:2}
        .stats{display:flex;gap:12px;margin-bottom:20px}
        .stat{flex:1;background:var(--card);padding:16px;border-radius:16px;box-shadow:var(--shadow);text-align:center}
        .stat-val{font-size:28px;font-weight:700;color:var(--primary)}
        .stat-label{font-size:12px;color:var(--text2);margin-top:4px}
        .upload-area{background:var(--card);border-radius:16px;padding:40px 20px;text-align:center;box-shadow:var(--shadow);margin-bottom:20px;cursor:pointer;transition:all .2s;border:2px dashed var(--border)}
        .upload-area:active{transform:scale(.98)}
        .upload-area svg{width:48px;height:48px;stroke:var(--primary);fill:none;stroke-width:1.5;margin-bottom:12px}
        .upload-area p{color:var(--text2);font-size:14px}
        .upload-area .hint{color:var(--text2);font-size:12px;margin-top:6px;opacity:.7}
        .progress{display:none;margin-top:16px}
        .progress.show{display:block}
        .progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
        .progress-fill{height:100%;background:var(--primary);width:0%;transition:width .3s;border-radius:3px}
        .progress-text{font-size:12px;color:var(--text2);margin-top:8px;text-align:center}
        .section-title{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--text2)}
        .file-list{display:flex;flex-direction:column;gap:8px}
        .file-item{background:var(--card);padding:14px 16px;border-radius:12px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s}
        .file-item:active{transform:scale(.99);background:var(--primary-light)}
        .file-icon{width:40px;height:40px;background:var(--primary-light);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .file-icon svg{width:20px;height:20px;stroke:var(--primary);fill:none;stroke-width:2}
        .file-info{flex:1;min-width:0}
        .file-name{font-weight:500;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .file-meta{font-size:11px;color:var(--text2);margin-top:2px}
        .empty{text-align:center;padding:40px 20px;color:var(--text2);font-size:14px}
        .empty svg{width:48px;height:48px;stroke:var(--border);fill:none;stroke-width:1.5;margin-bottom:12px}
        .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--card);color:var(--text);padding:12px 20px;border-radius:10px;font-size:14px;opacity:0;pointer-events:none;transition:all .3s;z-index:1000;box-shadow:var(--shadow);border:1px solid var(--border);white-space:nowrap}
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
        .refresh{position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;background:var(--primary);border:none;box-shadow:0 4px 16px rgba(59,130,246,.4);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;z-index:100}
        .refresh:active{transform:scale(.9)}
        .refresh svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2}
        .refresh.spin svg{animation:spin 1s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        input[type=file]{display:none}
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>
    
    <div class="header">
        <div class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>
            </div>
            青柠网盘
        </div>
    </div>

    <div class="stats">
        <div class="stat">
            <div class="stat-val" id="statFiles">-</div>
            <div class="stat-label">文件总数</div>
        </div>
        <div class="stat">
            <div class="stat-val" id="statToday">-</div>
            <div class="stat-label">今日新增</div>
        </div>
    </div>

    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <p>点击上传文件</p>
        <p class="hint">支持任意文件类型</p>
        <div class="progress" id="progress">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="progress-text" id="progressText">准备上传...</div>
        </div>
    </div>

    <input type="file" id="fileInput" onchange="uploadFile(this.files[0])">

    <div class="section-title">文件列表</div>
    <div class="file-list" id="fileList">
        <div class="empty">
            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <p>加载中...</p>
        </div>
    </div>

    <button class="refresh" id="refreshBtn" onclick="loadFiles()">
        <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
    </button>

    <script src="https://unpkg.com/@supabase/supabase-js@2.49.4"></script>
    <script>
        const SUPABASE_URL='https://jbmymvpydycurynmxgbr.supabase.co';
        const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpibXltdnB5ZHljdXJ5bm14Z2JyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNDA0NjYsImV4cCI6MjA5MzkxNjQ2Nn0.FpL-rWQHriqyuDA3l1vEiovZVcGhUbpOVCUS_X5h33E';
        const BUCKET='files';
        
        let supabase=null;
        if(typeof window.supabase!=='undefined'){
            supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
        }
        
        let filesData=[];
        
        function showToast(msg){
            const t=document.getElementById('toast');
            t.textContent=msg;
            t.classList.add('show');
            setTimeout(()=>t.classList.remove('show'),2000);
        }
        
        function formatSize(b){
            if(!b)return'0 B';
            const k=1024,s=['B','KB','MB','GB'];
            const i=Math.floor(Math.log(b)/Math.log(k));
            return parseFloat((b/Math.pow(k,i)).toFixed(1))+' '+s[i];
        }
        
        function escapeHtml(t){
            const d=document.createElement('div');
            d.textContent=t;
            return d.innerHTML;
        }
        
        async function loadFiles(){
            if(!supabase){
                renderEmpty('服务未加载，请刷新重试');
                return;
            }
            
            const btn=document.getElementById('refreshBtn');
            btn.classList.add('spin');
            
            try{
                const{data,error}=await supabase.storage.from(BUCKET).list('',{
                    limit:100,sortBy:{column:'created_at',order:'desc'}
                });
                
                if(error)throw error;
                
                filesData=data||[];
                renderFiles(filesData);
                updateStats(filesData);
                
                if(filesData.length>0)showToast('已加载 '+filesData.length+' 个文件');
            }catch(e){
                showToast('加载失败: '+e.message);
                renderEmpty('加载失败，点击刷新重试');
            }finally{
                btn.classList.remove('spin');
            }
        }
        
        function renderFiles(files){
            const c=document.getElementById('fileList');
            if(!files||files.length===0){
                renderEmpty('暂无文件，点击上方上传');
                return;
            }
            
            c.innerHTML=files.map(f=>{
                const size=formatSize(f.metadata?.size||0);
                const date=new Date(f.created_at).toLocaleDateString('zh-CN',{month:'short',day:'numeric'});
                return`<div class="file-item" onclick="downloadFile('${escapeHtml(f.name)}')">
                    <div class="file-icon">
                        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                    </div>
                    <div class="file-info">
                        <div class="file-name">${escapeHtml(f.name)}</div>
                        <div class="file-meta">${size} · ${date}</div>
                    </div>
                </div>`;
            }).join('');
        }
        
        function renderEmpty(msg){
            document.getElementById('fileList').innerHTML=`<div class="empty">
                <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                <p>${msg}</p>
            </div>`;
        }
        
        function updateStats(files){
            document.getElementById('statFiles').textContent=files.length;
            const today=new Date().toDateString();
            document.getElementById('statToday').textContent=files.filter(f=>new Date(f.created_at).toDateString()===today).length;
        }
        
        async function uploadFile(file){
            if(!file)return;
            if(!supabase){showToast('服务未加载');return;}
            
            const progress=document.getElementById('progress');
            const fill=document.getElementById('progressFill');
            const text=document.getElementById('progressText');
            
            progress.classList.add('show');
            fill.style.width='10%';
            text.textContent='正在上传: '+file.name;
            
            try{
                // 检查重名
                const exists=filesData.some(f=>f.name===file.name);
                const fileName=exists?Date.now()+'_'+file.name:file.name;
                
                const{error}=await supabase.storage.from(BUCKET).upload(fileName,file,{
                    cacheControl:'3600',upsert:false
                });
                
                if(error)throw error;
                
                fill.style.width='100%';
                text.textContent='上传成功!';
                text.style.color='var(--success)';
                showToast('上传成功: '+file.name);
                
                setTimeout(()=>{
                    progress.classList.remove('show');
                    fill.style.width='0%';
                    text.style.color='';
                    document.getElementById('fileInput').value='';
                    loadFiles();
                },1500);
            }catch(e){
                fill.style.width='100%';
                fill.style.background='var(--error)';
                text.textContent='上传失败: '+e.message;
                text.style.color='var(--error)';
                showToast('上传失败');
                
                setTimeout(()=>{
                    progress.classList.remove('show');
                    fill.style.width='0%';
                    fill.style.background='';
                    text.style.color='';
                    document.getElementById('fileInput').value='';
                },2000);
            }
        }
        
        function downloadFile(name){
            if(!supabase){showToast('服务未加载');return;}
            try{
                const{data}=supabase.storage.from(BUCKET).getPublicUrl(name);
                const a=document.createElement('a');
                a.href=data.publicUrl;
                a.download=name;
                a.target='_blank';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                showToast('开始下载...');
            }catch(e){
                showToast('下载失败: '+e.message);
            }
        }
        
        // 版本检测
        const APP_VERSION = '4.0.0';
        const VERSION_URL = 'https://3862242786-sudo.github.io/pan/app-version.json';
        
        async function checkUpdate() {
            try {
                const resp = await fetch(VERSION_URL + '?t=' + Date.now());
                if (!resp.ok) return;
                const data = await resp.json();
                
                if (data.version && data.version !== APP_VERSION) {
                    const go = confirm(`发现新版本 v${data.version}\n\n当前: v${APP_VERSION}\n\n${data.updateLog || ''}\n\n是否更新?`);
                    if (go && data.downloadUrl) {
                        window.open(data.downloadUrl, '_blank');
                    }
                }
            } catch (e) {}
        }
        
        // 初始化
        loadFiles();
        checkUpdate();
    </script>
</body>
</html>
