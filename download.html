<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在下载...</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8fafc;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
        .box{background:#fff;border-radius:16px;padding:40px 32px;text-align:center;max-width:360px;width:100%;box-shadow:0 4px 20px rgba(0,0,0,.08)}
        .icon{width:64px;height:64px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);border-radius:18px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center}
        .icon svg{width:32px;height:32px;stroke:#fff;fill:none;stroke-width:2}
        h2{font-size:18px;margin-bottom:8px}
        p{color:#64748b;font-size:14px;line-height:1.6;margin-bottom:24px}
        .btn{display:inline-block;padding:12px 32px;background:#3b82f6;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;text-decoration:none;cursor:pointer}
        .btn:active{transform:scale(.98)}
        .spinner{width:24px;height:24px;border:3px solid #e2e8f0;border-top-color:#3b82f6;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>
    <div class="box">
        <div class="spinner"></div>
        <h2 id="title">正在准备下载...</h2>
        <p id="desc">如果下载未自动开始，请点击下方按钮</p>
        <a class="btn" id="dlBtn" href="#">手动下载</a>
    </div>
    <script>
        const params=new URLSearchParams(window.location.search);
        const app=params.get('app')||'青柠网盘';
        const ver=params.get('ver')||'';
        
        let url='';
        if(app==='admin'){
            url='https://3862242786-sudo.github.io/pan/站长管理后台.apk';
            document.getElementById('title').textContent='正在下载站长管理后台'+ver;
        }else{
            url='https://3862242786-sudo.github.io/pan/青柠网盘.apk';
            document.getElementById('title').textContent='正在下载青柠网盘'+ver;
        }
        document.getElementById('dlBtn').href=url;
        
        // 自动触发下载
        setTimeout(()=>{
            const a=document.createElement('a');
            a.href=url;
            a.download='';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            document.getElementById('title').textContent='下载已开始';
        },500);
    </script>
</body>
</html>
