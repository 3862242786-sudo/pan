<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>下载更新</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8fafc;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
        .box{background:#fff;border-radius:16px;padding:40px 32px;text-align:center;max-width:360px;width:100%;box-shadow:0 4px 20px rgba(0,0,0,.08)}
        .icon{width:64px;height:64px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);border-radius:18px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center}
        .icon svg{width:32px;height:32px;stroke:#fff;fill:none;stroke-width:2}
        h2{font-size:18px;margin-bottom:8px}
        p{color:#64748b;font-size:14px;line-height:1.6;margin-bottom:24px}
        .btn{display:inline-block;padding:14px 32px;background:#3b82f6;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;text-decoration:none;cursor:pointer;transition:all .15s}
        .btn:active{transform:scale(.97)}
        .btn-outline{background:transparent;color:#3b82f6;border:1.5px solid #3b82f6;margin-left:8px}
        .btns{display:flex;justify-content:center;flex-wrap:wrap;gap:10px}
        .note{font-size:12px;color:#94a3b8;margin-top:20px;line-height:1.6}
        .copied{color:#22c55e!important}
    </style>
</head>
<body>
    <div class="box">
        <div class="icon">
            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </div>
        <h2 id="title">下载更新</h2>
        <p id="desc">点击下方按钮，在浏览器中下载安装包</p>
        <div class="btns">
            <a class="btn" id="dlBtn" href="#">下载安装包</a>
            <a class="btn btn-outline" id="copyBtn" href="javascript:void(0)">复制链接</a>
        </div>
        <div class="note" id="note"></div>
    </div>
    <script>
        const params=new URLSearchParams(window.location.search);
        const app=params.get('app')||'qn';
        const ver=params.get('ver')||'';
        
        let url='',name='';
        if(app==='admin'){
            url='https://3862242786-sudo.github.io/pan/qingning-admin.apk';
            name='站长管理后台';
        }else{
            url='https://3862242786-sudo.github.io/pan/qingning-pan.apk';
            name='青柠网盘';
        }
        
        document.getElementById('title').textContent='下载 '+name+' '+ver;
        document.getElementById('dlBtn').href=url;
        document.getElementById('dlBtn').target='_blank';
        document.getElementById('note').textContent='提示：点击下载按钮后，请在弹出的浏览器中完成下载';
        
        // 复制链接
        document.getElementById('copyBtn').onclick=function(){
            const ta=document.createElement('textarea');
            ta.value=url;
            ta.style.position='fixed';
            ta.style.opacity='0';
            document.body.appendChild(ta);
            ta.select();
            try{document.execCommand('copy');this.textContent='已复制';this.classList.add('copied');}
            catch(e){this.textContent='复制失败';}
            document.body.removeChild(ta);
            const btn=this;
            setTimeout(()=>{btn.textContent='复制链接';btn.classList.remove('copied');},2000);
        };
    </script>
</body>
</html>
