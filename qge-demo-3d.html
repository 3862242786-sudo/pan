<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>青柠漂移 - QGE 3D Racing</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0b0f19;
      font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
      user-select: none;
    }
    canvas { display: block; }

    /* UI 覆盖层 */
    #ui-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    /* 速度表 */
    #speedometer {
      position: absolute;
      bottom: 24px; left: 24px;
      width: 160px; height: 160px;
      pointer-events: auto;
    }
    #speedometer svg { width: 100%; height: 100%; }
    .speed-text {
      font-size: 32px; font-weight: bold;
      fill: #e5e7eb;
      text-anchor: middle;
    }
    .speed-unit {
      font-size: 12px; fill: #9ca3af;
      text-anchor: middle;
    }
    .speed-needle {
      stroke: #ef4444; stroke-width: 3;
      stroke-linecap: round;
      transition: transform 0.1s linear;
    }
    .speed-arc-bg { stroke: #374151; stroke-width: 8; fill: none; }
    .speed-arc-fill { stroke: #22c55e; stroke-width: 8; fill: none; }

    /* 迷你地图 */
    #minimap {
      position: absolute;
      top: 24px; right: 24px;
      width: 180px; height: 180px;
      background: rgba(17, 24, 39, 0.85);
      border: 2px solid #374151;
      border-radius: 8px;
      pointer-events: auto;
    }
    #minimap canvas { width: 100%; height: 100%; border-radius: 6px; }
    .minimap-label {
      position: absolute;
      top: 4px; left: 50%;
      transform: translateX(-50%);
      font-size: 10px; color: #9ca3af;
      background: rgba(0,0,0,0.5);
      padding: 1px 6px; border-radius: 4px;
    }

    /* 漂移得分 */
    #drift-score {
      position: absolute;
      top: 24px; left: 50%;
      transform: translateX(-50%);
      text-align: center;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #drift-score.active { opacity: 1; }
    .drift-main {
      font-size: 48px; font-weight: 900;
      color: #f59e0b;
      text-shadow: 0 0 20px rgba(245, 158, 11, 0.5);
      letter-spacing: 2px;
    }
    .drift-combo {
      font-size: 20px; font-weight: bold;
      color: #ef4444;
      text-shadow: 0 0 10px rgba(239, 68, 68, 0.4);
    }
    .drift-label {
      font-size: 12px; color: #9ca3af;
    }

    /* 计时器 */
    #timer {
      position: absolute;
      top: 24px; left: 24px;
      font-size: 24px; font-weight: bold;
      color: #e5e7eb;
      background: rgba(17, 24, 39, 0.7);
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid #374151;
    }

    /* 车辆信息 */
    #car-info {
      position: absolute;
      top: 70px; left: 24px;
      font-size: 14px; font-weight: bold;
      color: #22c55e;
      background: rgba(17, 24, 39, 0.7);
      padding: 6px 14px;
      border-radius: 8px;
      border: 1px solid #374151;
      opacity: 0;
      transition: opacity 0.5s;
    }
    #car-info.show { opacity: 1; }

    /* 控制提示 */
    #controls-hint {
      position: absolute;
      bottom: 24px; right: 24px;
      background: rgba(17, 24, 39, 0.85);
      border: 1px solid #374151;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 12px;
      color: #d1d5db;
      line-height: 1.8;
      pointer-events: auto;
    }
    #controls-hint kbd {
      background: #1f2937;
      border: 1px solid #4b5563;
      border-radius: 4px;
      padding: 2px 6px;
      font-family: monospace;
      font-size: 11px;
      color: #e5e7eb;
    }

    /* 调试面板 */
    #debug-panel {
      position: absolute;
      top: 110px; left: 24px;
      background: rgba(0, 0, 0, 0.85);
      border: 1px solid #4b5563;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 11px;
      color: #9ca3af;
      font-family: monospace;
      line-height: 1.6;
      display: none;
      pointer-events: auto;
      min-width: 200px;
    }
    #debug-panel.active { display: block; }
    #debug-panel .debug-row {
      display: flex; justify-content: space-between;
      gap: 16px;
    }
    #debug-panel .debug-val { color: #22c55e; }

    /* 相机模式提示 */
    #camera-hint {
      position: absolute;
      bottom: 200px; left: 50%;
      transform: translateX(-50%);
      font-size: 14px; color: #9ca3af;
      background: rgba(0,0,0,0.6);
      padding: 6px 14px;
      border-radius: 20px;
      opacity: 0;
      transition: opacity 0.5s;
    }
    #camera-hint.show { opacity: 1; }

    /* 启动画面 */
    #splash {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #0b0f19;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.8s;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    #splash h1 {
      font-size: 56px; font-weight: 900;
      color: #22c55e;
      text-shadow: 0 0 40px rgba(34, 197, 94, 0.4);
      margin-bottom: 8px;
      letter-spacing: 4px;
    }
    #splash h2 {
      font-size: 18px; color: #9ca3af;
      margin-bottom: 40px;
      letter-spacing: 2px;
    }
    #splash .start-btn {
      background: #22c55e;
      color: #0b0f19;
      font-size: 18px; font-weight: bold;
      padding: 14px 48px;
      border: none; border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      pointer-events: auto;
    }
    #splash .start-btn:hover {
      background: #16a34a;
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(34, 197, 94, 0.4);
    }
    #splash .loading {
      font-size: 14px; color: #6b7280;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <!-- 启动画面 -->
  <div id="splash">
    <h1>青柠漂移</h1>
    <h2>QINGNING DRIFT - QGE 3D RACING</h2>
    <button class="start-btn" id="startBtn">开始游戏</button>
    <div class="loading" id="loadingText">正在加载引擎...</div>
  </div>

  <!-- UI 覆盖层 -->
  <div id="ui-overlay">
    <div id="timer">00:00.00</div>
    <div id="car-info">跑车</div>

    <!-- 速度表 -->
    <div id="speedometer">
      <svg viewBox="0 0 160 160">
        <!-- 背景圆弧 -->
        <path class="speed-arc-bg" d="M 30 130 A 70 70 0 1 1 130 130"/>
        <!-- 填充圆弧 (动态) -->
        <path id="speedArc" class="speed-arc-fill" d="M 30 130 A 70 70 0 0 1 30 130" stroke-dasharray="0 330"/>
        <!-- 刻度 -->
        <g id="speedTicks"></g>
        <!-- 指针 -->
        <line id="speedNeedle" class="speed-needle" x1="80" y1="80" x2="80" y2="30"
              transform="rotate(-135 80 80)"/>
        <!-- 文字 -->
        <text x="80" y="115" class="speed-text" id="speedText">0</text>
        <text x="80" y="132" class="speed-unit">km/h</text>
      </svg>
    </div>

    <!-- 迷你地图 -->
    <div id="minimap">
      <div class="minimap-label">迷你地图</div>
      <canvas id="minimapCanvas" width="180" height="180"></canvas>
    </div>

    <!-- 漂移得分 -->
    <div id="drift-score">
      <div class="drift-label">漂移得分</div>
      <div class="drift-main" id="driftMain">0</div>
      <div class="drift-combo" id="driftCombo"></div>
    </div>

    <!-- 相机模式提示 -->
    <div id="camera-hint">跟随视角</div>

    <!-- 控制提示 -->
    <div id="controls-hint">
      <div><kbd>W</kbd> / <kbd>↑</kbd> 加速</div>
      <div><kbd>S</kbd> / <kbd>↓</kbd> 刹车/倒车</div>
      <div><kbd>A</kbd> / <kbd>←</kbd> 左转　<kbd>D</kbd> / <kbd>→</kbd> 右转</div>
      <div><kbd>空格</kbd> 手刹漂移</div>
      <div><kbd>Shift</kbd> 氮气加速</div>
      <div><kbd>C</kbd> 切换视角</div>
      <div><kbd>V</kbd> 切换车辆</div>
      <div><kbd>~</kbd> 调试面板</div>
    </div>

    <!-- 调试面板 -->
    <div id="debug-panel">
      <div style="color:#22c55e;font-weight:bold;margin-bottom:6px;">调试信息</div>
      <div class="debug-row"><span>速度</span><span class="debug-val" id="dbg-speed">0</span></div>
      <div class="debug-row"><span>转向角</span><span class="debug-val" id="dbg-steer">0</span></div>
      <div class="debug-row"><span>漂移因子</span><span class="debug-val" id="dbg-drift">0</span></div>
      <div class="debug-row"><span>横向速度</span><span class="debug-val" id="dbg-lat">0</span></div>
      <div class="debug-row"><span>位置 X</span><span class="debug-val" id="dbg-x">0</span></div>
      <div class="debug-row"><span>位置 Z</span><span class="debug-val" id="dbg-z">0</span></div>
      <div class="debug-row"><span>旋转</span><span class="debug-val" id="dbg-rot">0</span></div>
      <div class="debug-row"><span>相机模式</span><span class="debug-val" id="dbg-cam">跟随</span></div>
      <div class="debug-row"><span>车辆</span><span class="debug-val" id="dbg-car">跑车</span></div>
      <div class="debug-row"><span>FPS</span><span class="debug-val" id="dbg-fps">0</span></div>
    </div>
  </div>

  <!-- 游戏脚本 -->
  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

    // ============================================
    // 全局变量
    // ============================================
    let scene, camera, renderer;
    let car, carBody, wheels = [];
    let terrainMesh;
    let cones = [];
    let conePhysics = []; // 锥桶物理状态
    let skidMarks = [];
    let particles = [];
    let cameraMode = 0; // 0=跟随, 1=车头, 2=环绕
    let orbitAngle = 0;
    let orbitDistance = 12;

    // ============================================
    // 地形系统
    // ============================================
    const TERRAIN_SEGMENTS = 120;
    const TERRAIN_MAX_HEIGHT = 35;

    // 简单的伪随机噪声函数（无需外部库）
    function hash(x, z) {
      let n = Math.sin(x * 12.9898 + z * 78.233) * 43758.5453;
      return n - Math.floor(n);
    }

    function noise2D(x, z) {
      const ix = Math.floor(x);
      const iz = Math.floor(z);
      const fx = x - ix;
      const fz = z - iz;
      const u = fx * fx * (3 - 2 * fx);
      const v = fz * fz * (3 - 2 * fz);
      const a = hash(ix, iz);
      const b = hash(ix + 1, iz);
      const c = hash(ix, iz + 1);
      const d = hash(ix + 1, iz + 1);
      return a + (b - a) * u + (c - a) * v + (a - b - c + d) * u * v;
    }

    function fbm(x, z, octaves) {
      let val = 0;
      let amp = 1;
      let freq = 1;
      let maxVal = 0;
      for (let i = 0; i < octaves; i++) {
        val += noise2D(x * freq, z * freq) * amp;
        maxVal += amp;
        amp *= 0.5;
        freq *= 2.1;
      }
      return val / maxVal;
    }

    // 道路中心线函数：蜿蜒的道路
    function roadCenterZ(x) {
      return Math.sin(x * 0.015) * 40 + Math.sin(x * 0.035) * 15;
    }

    function roadCenterX(z) {
      // 逆函数近似，用于距离计算
      return 0;
    }

    // 计算地形高度（每帧调用，需高效）
    function getTerrainHeight(x, z) {
      const wx = x / WORLD_SIZE;
      const wz = z / WORLD_SIZE;

      // 基础噪声层：大范围丘陵
      let h = fbm(x * 0.008, z * 0.008, 4) * TERRAIN_MAX_HEIGHT;

      // 细节噪声
      h += fbm(x * 0.03, z * 0.03, 2) * 3;

      // 区域控制：中心起始区平坦
      const distFromCenter = Math.sqrt(x * x + z * z);
      const flatRadius = 35;
      if (distFromCenter < flatRadius) {
        h *= (distFromCenter / flatRadius);
      }

      // 陡峭山区（远离中心的某些区域）
      const mountainX = 120, mountainZ = -100;
      const distMountain = Math.sqrt((x - mountainX) ** 2 + (z - mountainZ) ** 2);
      if (distMountain < 150) {
        const mFactor = Math.max(0, 1 - distMountain / 150);
        h += mFactor * mFactor * 25;
      }

      const mountain2X = -100, mountain2Z = 120;
      const distMountain2 = Math.sqrt((x - mountain2X) ** 2 + (z - mountain2Z) ** 2);
      if (distMountain2 < 120) {
        const mFactor = Math.max(0, 1 - distMountain2 / 120);
        h += mFactor * mFactor * 20;
      }

      // 道路平坦化：沿蜿蜒道路降低高度
      const roadZ = roadCenterZ(x);
      const roadDist = Math.abs(z - roadZ);
      const roadWidth = 10;
      if (roadDist < roadWidth) {
        const smoothFactor = roadDist / roadWidth;
        // 道路中心高度取附近地形平均，避免突兀
        const roadH = getRawTerrainHeight(x, roadZ);
        h = roadH + (h - roadH) * (smoothFactor * smoothFactor);
      }

      return Math.max(0, h);
    }

    // 用于道路计算的原始高度（不带道路平坦化，避免递归）
    function getRawTerrainHeight(x, z) {
      let h = fbm(x * 0.008, z * 0.008, 4) * TERRAIN_MAX_HEIGHT;
      h += fbm(x * 0.03, z * 0.03, 2) * 3;
      const distFromCenter = Math.sqrt(x * x + z * z);
      const flatRadius = 35;
      if (distFromCenter < flatRadius) {
        h *= (distFromCenter / flatRadius);
      }
      const mountainX = 120, mountainZ = -100;
      const distMountain = Math.sqrt((x - mountainX) ** 2 + (z - mountainZ) ** 2);
      if (distMountain < 150) {
        const mFactor = Math.max(0, 1 - distMountain / 150);
        h += mFactor * mFactor * 25;
      }
      const mountain2X = -100, mountain2Z = 120;
      const distMountain2 = Math.sqrt((x - mountain2X) ** 2 + (z - mountain2Z) ** 2);
      if (distMountain2 < 120) {
        const mFactor = Math.max(0, 1 - distMountain2 / 120);
        h += mFactor * mFactor * 20;
      }
      return Math.max(0, h);
    }

    // 根据高度获取颜色
    function getTerrainColor(height) {
      const lowH = 2;
      const midH = 12;
      const highH = 25;
      if (height < lowH) {
        return new THREE.Color(0.25, 0.55, 0.18); // 绿色草地
      } else if (height < midH) {
        const t = (height - lowH) / (midH - lowH);
        return new THREE.Color().lerpColors(
          new THREE.Color(0.25, 0.55, 0.18),
          new THREE.Color(0.55, 0.40, 0.22),
          t
        );
      } else if (height < highH) {
        const t = (height - midH) / (highH - midH);
        return new THREE.Color().lerpColors(
          new THREE.Color(0.55, 0.40, 0.22),
          new THREE.Color(0.50, 0.48, 0.45),
          t
        );
      } else {
        return new THREE.Color(0.55, 0.53, 0.50); // 灰色岩石
      }
    }

    // ============================================
    // 碰撞系统
    // ============================================
    const COLLISION = {
      // 车辆碰撞箱（半长、半宽、半高）
      carHalfW: 1.1,
      carHalfL: 2.2,
      carHalfH: 0.6,

      // 锥桶碰撞半径
      coneRadius: 0.5,

      // 检测车辆与锥桶碰撞（AABB vs Circle）
      checkCarCone(cs, conePos) {
        // 将锥桶位置转换到车辆局部坐标
        const dx = conePos.x - cs.x;
        const dz = conePos.z - cs.z;
        const cos = Math.cos(-cs.rotation);
        const sin = Math.sin(-cs.rotation);
        const localX = dx * cos - dz * sin;
        const localZ = dx * sin + dz * cos;

        // AABB vs Circle
        const closestX = Math.max(-this.carHalfL, Math.min(this.carHalfL, localX));
        const closestZ = Math.max(-this.carHalfW, Math.min(this.carHalfW, localZ));
        const distX = localX - closestX;
        const distZ = localZ - closestZ;
        const distSq = distX * distX + distZ * distZ;
        const r = this.coneRadius;

        if (distSq < r * r) {
          const dist = Math.sqrt(Math.max(distSq, 0.001));
          return {
            hit: true,
            overlap: r - dist,
            nx: distX / dist,  // 碰撞法线（局部坐标）
            nz: distZ / dist,
            localX, localZ,
            conePos
          };
        }
        return { hit: false };
      },

      // 检测车辆与车辆碰撞（AABB vs AABB，预留）
      checkCarCar(a, b) {
        const dx = a.x - b.x;
        const dz = a.z - b.z;
        const dist = Math.sqrt(dx * dx + dz * dz);
        const minDist = this.carHalfL * 2;
        if (dist < minDist) {
          return { hit: true, overlap: minDist - dist, nx: dx / Math.max(dist, 0.01), nz: dz / Math.max(dist, 0.01) };
        }
        return { hit: false };
      }
    };

    // ============================================
    // 车辆定义
    // ============================================
    const CAR_TYPES = [
      {
        name: '跑车',
        color: 0x22c55e,
        maxSpeed: 35,
        accel: 25,
        brakeForce: 25,
        friction: 1.2,
        maxSteer: 0.6,
        driftThreshold: 12,
        grip: 0.9,
        driftGrip: 0.15,
        boostMultiplier: 1.5,
        scale: { x: 1, y: 1, z: 1 },
        bodySize: { w: 1.8, h: 0.5, l: 4.0 },
        cabinSize: { w: 1.4, h: 0.45, l: 2.0 },
        wheelRadius: 0.35,
        wheelWidth: 0.25,
        wheelY: 0.35,
        hasSpoiler: true,
      },
      {
        name: '卡车',
        color: 0xef4444,
        maxSpeed: 22,
        accel: 12,
        brakeForce: 25,
        friction: 1.4,
        maxSteer: 0.45,
        driftThreshold: 10,
        grip: 0.95,
        driftGrip: 0.3,
        boostMultiplier: 1.3,
        scale: { x: 1.3, y: 1.2, z: 1.4 },
        bodySize: { w: 2.4, h: 0.9, l: 5.5 },
        cabinSize: { w: 2.0, h: 0.7, l: 2.5 },
        wheelRadius: 0.55,
        wheelWidth: 0.4,
        wheelY: 0.55,
        hasSpoiler: false,
      },
      {
        name: '漂移车',
        color: 0xa855f7,
        maxSpeed: 30,
        accel: 20,
        brakeForce: 25,
        friction: 1.0,
        maxSteer: 0.7,
        driftThreshold: 8,
        grip: 0.6,
        driftGrip: 0.05,
        boostMultiplier: 1.5,
        scale: { x: 1.15, y: 0.75, z: 1.05 },
        bodySize: { w: 2.0, h: 0.4, l: 3.8 },
        cabinSize: { w: 1.6, h: 0.35, l: 1.8 },
        wheelRadius: 0.32,
        wheelWidth: 0.3,
        wheelY: 0.32,
        hasSpoiler: true,
      },
    ];

    let currentCarIndex = 0;

    // 车辆物理状态
    const carState = {
      x: 0, z: 0,
      rotation: 0,        // 车身朝向 (弧度)
      speed: 0,           // 前进速度
      steerAngle: 0,      // 转向输入 (-1 ~ 1)
      driftFactor: 0,     // 漂移因子 (0 ~ 1)
      lateralVelocity: 0, // 横向滑动速度
      maxSpeed: 35,
      accel: 25,
      brakeForce: 25,
      friction: 1.2,
      maxSteer: 0.6,
      driftThreshold: 12,
      grip: 0.9,
      driftGrip: 0.15,
      boostMultiplier: 1.5,
      collisionCooldown: 0,
    };

    // 输入状态
    const input = {
      accelerate: false,
      brake: false,
      left: false,
      right: false,
      handbrake: false,
      boost: false,
    };

    // 游戏状态
    const gameState = {
      startTime: 0,
      totalDriftScore: 0,
      currentDriftScore: 0,
      driftCombo: 1,
      isDrifting: false,
      driftTimer: 0,
      lastSkidTime: 0,
      cameraHintTimer: 0,
      debugVisible: false,
      fps: 0,
      frameCount: 0,
      lastFpsTime: 0,
      carInfoTimer: 0,
    };

    const WORLD_SIZE = 500;
    const SKID_MAX = 200;
    const PARTICLE_MAX = 300;

    // ============================================
    // 初始化 Three.js
    // ============================================
    function initThree() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x87ceeb);
      scene.fog = new THREE.Fog(0x87ceeb, 80, 350);

      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      // 灯光
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
      scene.add(ambientLight);

      const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
      dirLight.position.set(50, 80, 30);
      dirLight.castShadow = true;
      dirLight.shadow.mapSize.width = 2048;
      dirLight.shadow.mapSize.height = 2048;
      dirLight.shadow.camera.near = 0.5;
      dirLight.shadow.camera.far = 300;
      dirLight.shadow.camera.left = -150;
      dirLight.shadow.camera.right = 150;
      dirLight.shadow.camera.top = 150;
      dirLight.shadow.camera.bottom = -150;
      scene.add(dirLight);

      // 半球光
      const hemiLight = new THREE.HemisphereLight(0x87ceeb, 0x444444, 0.4);
      scene.add(hemiLight);
    }

    // ============================================
    // 创建地形
    // ============================================
    function createTerrain() {
      const geo = new THREE.PlaneGeometry(WORLD_SIZE, WORLD_SIZE, TERRAIN_SEGMENTS, TERRAIN_SEGMENTS);
      geo.rotateX(-Math.PI / 2);

      const positions = geo.attributes.position;
      const colors = new Float32Array(positions.count * 3);

      for (let i = 0; i < positions.count; i++) {
        const x = positions.getX(i);
        const z = positions.getZ(i);
        const h = getTerrainHeight(x, z);
        positions.setY(i, h);

        const col = getTerrainColor(h);
        colors[i * 3] = col.r;
        colors[i * 3 + 1] = col.g;
        colors[i * 3 + 2] = col.b;
      }

      geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
      geo.computeVertexNormals();

      const mat = new THREE.MeshStandardMaterial({
        vertexColors: true,
        roughness: 0.9,
        metalness: 0.05,
        flatShading: true,
      });

      terrainMesh = new THREE.Mesh(geo, mat);
      terrainMesh.receiveShadow = true;
      terrainMesh.castShadow = true;
      scene.add(terrainMesh);

      // 中心圆环标记（漂移区域）
      const ringGeo = new THREE.RingGeometry(18, 20, 64);
      const ringMat = new THREE.MeshBasicMaterial({ color: 0x22c55e, opacity: 0.3, transparent: true, side: THREE.DoubleSide });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.rotation.x = -Math.PI / 2;
      ring.position.y = 0.5;
      scene.add(ring);

      const ring2 = new THREE.Mesh(new THREE.RingGeometry(38, 40, 64), ringMat.clone());
      ring2.rotation.x = -Math.PI / 2;
      ring2.position.y = 0.5;
      scene.add(ring2);
    }

    // ============================================
    // 创建车辆
    // ============================================
    function createCar() {
      if (car) {
        scene.remove(car);
        // 清理旧车轮引用
        wheels = [];
      }

      car = new THREE.Group();
      const type = CAR_TYPES[currentCarIndex];

      // 车身底盘
      const bodyGeo = new THREE.BoxGeometry(type.bodySize.w, type.bodySize.h, type.bodySize.l);
      const bodyMat = new THREE.MeshStandardMaterial({
        color: type.color,
        roughness: 0.3,
        metalness: 0.4,
      });
      carBody = new THREE.Mesh(bodyGeo, bodyMat);
      carBody.position.y = type.bodySize.h / 2 + type.wheelRadius;
      carBody.castShadow = true;
      carBody.receiveShadow = true;
      car.add(carBody);

      // 车厢 (驾驶舱)
      const cabinGeo = new THREE.BoxGeometry(type.cabinSize.w, type.cabinSize.h, type.cabinSize.l);
      const cabinMat = new THREE.MeshStandardMaterial({
        color: 0x1f2937,
        roughness: 0.1,
        metalness: 0.7,
      });
      const cabin = new THREE.Mesh(cabinGeo, cabinMat);
      cabin.position.set(0, type.bodySize.h + type.cabinSize.h / 2 + type.wheelRadius, -0.2);
      cabin.castShadow = true;
      car.add(cabin);

      // 前大灯
      const headlightGeo = new THREE.SphereGeometry(0.15 * type.scale.y, 16, 16);
      const headlightMat = new THREE.MeshStandardMaterial({
        color: 0xffffcc,
        emissive: 0xffffaa,
        emissiveIntensity: 0.8,
      });
      const hlLeft = new THREE.Mesh(headlightGeo, headlightMat);
      hlLeft.position.set(-type.bodySize.w * 0.3, type.wheelRadius + type.bodySize.h * 0.6, type.bodySize.l * 0.45);
      car.add(hlLeft);
      const hlRight = new THREE.Mesh(headlightGeo, headlightMat);
      hlRight.position.set(type.bodySize.w * 0.3, type.wheelRadius + type.bodySize.h * 0.6, type.bodySize.l * 0.45);
      car.add(hlRight);

      // 前大灯聚光灯
      const spotL = new THREE.SpotLight(0xffffcc, 2, 40, 0.5, 0.5, 1);
      spotL.position.set(-type.bodySize.w * 0.3, type.wheelRadius + type.bodySize.h * 0.6, type.bodySize.l * 0.45);
      spotL.target.position.set(-type.bodySize.w * 0.3, 0, 10);
      car.add(spotL);
      car.add(spotL.target);
      const spotR = new THREE.SpotLight(0xffffcc, 2, 40, 0.5, 0.5, 1);
      spotR.position.set(type.bodySize.w * 0.3, type.wheelRadius + type.bodySize.h * 0.6, type.bodySize.l * 0.45);
      spotR.target.position.set(type.bodySize.w * 0.3, 0, 10);
      car.add(spotR);
      car.add(spotR.target);

      // 尾灯
      const taillightMat = new THREE.MeshStandardMaterial({
        color: 0xff0000,
        emissive: 0xff0000,
        emissiveIntensity: 0.6,
      });
      const tlLeft = new THREE.Mesh(new THREE.SphereGeometry(0.12 * type.scale.y, 16, 16), taillightMat);
      tlLeft.position.set(-type.bodySize.w * 0.3, type.wheelRadius + type.bodySize.h * 0.6, -type.bodySize.l * 0.45);
      car.add(tlLeft);
      const tlRight = new THREE.Mesh(new THREE.SphereGeometry(0.12 * type.scale.y, 16, 16), taillightMat);
      tlRight.position.set(type.bodySize.w * 0.3, type.wheelRadius + type.bodySize.h * 0.6, -type.bodySize.l * 0.45);
      car.add(tlRight);

      // 车轮
      const wheelGeo = new THREE.CylinderGeometry(type.wheelRadius, type.wheelRadius, type.wheelWidth, 24);
      const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
      const wheelPositions = [
        { x: -type.bodySize.w * 0.55, z: type.bodySize.l * 0.35 },  // 左前
        { x: type.bodySize.w * 0.55, z: type.bodySize.l * 0.35 },   // 右前
        { x: -type.bodySize.w * 0.55, z: -type.bodySize.l * 0.35 }, // 左后
        { x: type.bodySize.w * 0.55, z: -type.bodySize.l * 0.35 },  // 右后
      ];
      wheelPositions.forEach((pos) => {
        const wheel = new THREE.Mesh(wheelGeo, wheelMat);
        wheel.rotation.z = Math.PI / 2;
        wheel.position.set(pos.x, type.wheelY, pos.z);
        wheel.castShadow = true;
        car.add(wheel);
        wheels.push(wheel);
      });

      // 尾翼（跑车和漂移车有）
      if (type.hasSpoiler) {
        const wingGeo = new THREE.BoxGeometry(type.bodySize.w * 0.85, 0.08, 0.4);
        const wingMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.5, metalness: 0.5 });
        const wing = new THREE.Mesh(wingGeo, wingMat);
        wing.position.set(0, type.bodySize.h + type.wheelRadius + 0.5, -type.bodySize.l * 0.4);
        car.add(wing);
        const strutGeo = new THREE.BoxGeometry(0.06, 0.3, 0.06);
        const strutL = new THREE.Mesh(strutGeo, wingMat);
        strutL.position.set(-type.bodySize.w * 0.25, type.bodySize.h + type.wheelRadius + 0.3, -type.bodySize.l * 0.4);
        car.add(strutL);
        const strutR = new THREE.Mesh(strutGeo, wingMat);
        strutR.position.set(type.bodySize.w * 0.25, type.bodySize.h + type.wheelRadius + 0.3, -type.bodySize.l * 0.4);
        car.add(strutR);
      }

      // 应用整体缩放
      car.scale.set(type.scale.x, type.scale.y, type.scale.z);

      scene.add(car);
    }

    // 切换车辆
    function switchCar() {
      const oldX = carState.x;
      const oldZ = carState.z;
      const oldRot = carState.rotation;

      currentCarIndex = (currentCarIndex + 1) % CAR_TYPES.length;
      const type = CAR_TYPES[currentCarIndex];

      // 重置物理状态
      carState.speed = 0;
      carState.steerAngle = 0;
      carState.driftFactor = 0;
      carState.lateralVelocity = 0;
      carState.maxSpeed = type.maxSpeed;
      carState.accel = type.accel;
      carState.friction = type.friction;
      carState.maxSteer = type.maxSteer;
      carState.driftThreshold = type.driftThreshold;
      carState.grip = type.grip;
      carState.driftGrip = type.driftGrip;
      carState.boostMultiplier = type.boostMultiplier;
      carState.collisionCooldown = 0;

      // 重新创建车辆模型
      createCar();

      // 恢复位置
      carState.x = oldX;
      carState.z = oldZ;
      carState.rotation = oldRot;

      // 更新UI
      const infoEl = document.getElementById('car-info');
      infoEl.textContent = type.name;
      infoEl.classList.add('show');
      gameState.carInfoTimer = 2.0;

      // 更新速度表刻度
      initSpeedometer();
    }

    // ============================================
    // 创建锥桶障碍物
    // ============================================
    function createCones() {
      const coneGeo = new THREE.ConeGeometry(0.4, 1.0, 16);
      const coneMat = new THREE.MeshStandardMaterial({
        color: 0xff6600,
        roughness: 0.7,
      });

      // 直线绕桩赛道（沿道路放置）
      for (let i = 0; i < 10; i++) {
        const side = i % 2 === 0 ? -1 : 1;
        const x = side * 4;
        const z = 30 + i * 8;
        const cone = new THREE.Mesh(coneGeo, coneMat);
        const h = getTerrainHeight(x, z);
        cone.position.set(x, h + 0.5, z);
        cone.castShadow = true;
        cone.receiveShadow = true;
        scene.add(cone);
        cones.push(cone);
        conePhysics.push({ vx: 0, vy: 0, vz: 0, rx: 0, rz: 0, angularVx: 0, angularVz: 0, grounded: true, active: true });
      }

      // 圆形漂移区锥桶
      for (let i = 0; i < 12; i++) {
        const angle = (i / 12) * Math.PI * 2;
        const r = 30;
        const x = Math.cos(angle) * r;
        const z = Math.sin(angle) * r;
        const cone = new THREE.Mesh(coneGeo, coneMat);
        const h = getTerrainHeight(x, z);
        cone.position.set(x, h + 0.5, z);
        cone.castShadow = true;
        cone.receiveShadow = true;
        scene.add(cone);
        cones.push(cone);
        conePhysics.push({ vx: 0, vy: 0, vz: 0, rx: 0, rz: 0, angularVx: 0, angularVz: 0, grounded: true, active: true });
      }

      // 随机散布的锥桶（在道路上或附近）
      for (let i = 0; i < 20; i++) {
        const x = (Math.random() - 0.5) * 200;
        const z = (Math.random() - 0.5) * 200;
        if (Math.abs(x) < 10 && Math.abs(z) < 10) continue; // 避开出生点
        const cone = new THREE.Mesh(coneGeo, coneMat);
        const h = getTerrainHeight(x, z);
        cone.position.set(x, h + 0.5, z);
        cone.castShadow = true;
        cone.receiveShadow = true;
        scene.add(cone);
        cones.push(cone);
        conePhysics.push({ vx: 0, vy: 0, vz: 0, rx: 0, rz: 0, angularVx: 0, angularVz: 0, grounded: true, active: true });
      }
    }

    // ============================================
    // 创建障碍物（路障 + 油桶）
    // ============================================
    let obstacles = [];
    let obstaclePhysics = [];

    function createObstacles() {
      // 路障（长条形）
      const barrierGeo = new THREE.BoxGeometry(6, 0.8, 0.4);
      const barrierMat = new THREE.MeshStandardMaterial({ color: 0xff4400, roughness: 0.6 });

      const barrierPositions = [
        { x: 0, z: -40, ry: 0 },
        { x: 20, z: -20, ry: Math.PI / 4 },
        { x: -25, z: 10, ry: -Math.PI / 6 },
        { x: 40, z: 40, ry: Math.PI / 3 },
        { x: -40, z: -50, ry: 0 },
      ];

      barrierPositions.forEach(pos => {
        const barrier = new THREE.Mesh(barrierGeo, barrierMat);
        const h = getTerrainHeight(pos.x, pos.z);
        barrier.position.set(pos.x, h + 0.4, pos.z);
        barrier.rotation.y = pos.ry;
        barrier.castShadow = true;
        barrier.receiveShadow = true;
        scene.add(barrier);
        obstacles.push({ mesh: barrier, type: 'barrier', halfW: 3, halfL: 0.2, radius: 3.2 });
        obstaclePhysics.push({ vx: 0, vy: 0, vz: 0, rx: 0, rz: 0, avx: 0, avz: 0, grounded: true, immovable: true });
      });

    }

    // ============================================
    // 创建 skid mark (轮胎印)
    // ============================================
    function createSkidMark(x, z, rotation, width) {
      if (skidMarks.length >= SKID_MAX) {
        const old = skidMarks.shift();
        scene.remove(old);
        old.geometry.dispose();
        old.material.dispose();
      }

      const geo = new THREE.PlaneGeometry(width, 1.2);
      const mat = new THREE.MeshBasicMaterial({
        color: 0x111111,
        transparent: true,
        opacity: 0.5,
        depthWrite: false,
      });
      const mark = new THREE.Mesh(geo, mat);
      mark.rotation.x = -Math.PI / 2;
      mark.rotation.z = rotation;
      const h = getTerrainHeight(x, z);
      mark.position.set(x, h + 0.08, z);
      scene.add(mark);
      skidMarks.push(mark);

      // 渐隐效果
      mark.userData.life = 1.0;
      mark.userData.fadeRate = 0.002 + Math.random() * 0.003;
    }

    // ============================================
    // 创建粒子 (烟雾/尘土)
    // ============================================
    function createParticle(x, y, z, vx, vy, vz, size, color, life) {
      if (particles.length >= PARTICLE_MAX) {
        const old = particles.shift();
        scene.remove(old);
        old.geometry.dispose();
        old.material.dispose();
      }

      const geo = new THREE.PlaneGeometry(size, size);
      const mat = new THREE.MeshBasicMaterial({
        color: color,
        transparent: true,
        opacity: 0.6,
        depthWrite: false,
        side: THREE.DoubleSide,
      });
      const p = new THREE.Mesh(geo, mat);
      p.position.set(x, y, z);
      p.lookAt(camera.position);
      scene.add(p);

      p.userData = {
        vx, vy, vz,
        life: life || 1.0,
        maxLife: life || 1.0,
        rotSpeed: (Math.random() - 0.5) * 4,
      };
      particles.push(p);
    }

    function spawnDriftParticles(x, z, rotation, intensity) {
      const count = Math.floor(intensity * 3) + 1;
      for (let i = 0; i < count; i++) {
        const offsetAngle = rotation + Math.PI + (Math.random() - 0.5) * 0.8;
        const speed = 2 + Math.random() * 4;
        const vx = Math.sin(offsetAngle) * speed;
        const vz = Math.cos(offsetAngle) * speed;
        const size = 0.3 + Math.random() * 0.8;
        const gray = 0.6 + Math.random() * 0.3;
        const color = new THREE.Color(gray, gray, gray);
        const h = getTerrainHeight(x, z);
        createParticle(
          x + (Math.random() - 0.5) * 1.5,
          h + 0.2 + Math.random() * 0.5,
          z + (Math.random() - 0.5) * 1.5,
          vx, 1 + Math.random() * 2, vz,
          size, color, 0.8 + Math.random() * 0.5
        );
      }
    }

    function spawnBoostParticles(x, z, rotation) {
      const h = getTerrainHeight(x, z);
      for (let i = 0; i < 2; i++) {
        const offsetAngle = rotation + Math.PI + (Math.random() - 0.5) * 0.3;
        const vx = Math.sin(offsetAngle) * (3 + Math.random() * 3);
        const vz = Math.cos(offsetAngle) * (3 + Math.random() * 3);
        const size = 0.2 + Math.random() * 0.4;
        const color = new THREE.Color(0.2, 0.8, 1.0);
        createParticle(
          x + (Math.random() - 0.5),
          h + 0.3,
          z + (Math.random() - 0.5),
          vx, 0.5, vz,
          size, color, 0.4
        );
      }
    }

    // ============================================
    // 输入处理
    // ============================================
    function setupInput() {
      window.addEventListener('keydown', (e) => {
        switch (e.code) {
          case 'KeyW': case 'ArrowUp': input.accelerate = true; break;
          case 'KeyS': case 'ArrowDown': input.brake = true; break;
          case 'KeyA': case 'ArrowLeft': input.left = true; break;
          case 'KeyD': case 'ArrowRight': input.right = true; break;
          case 'Space': input.handbrake = true; e.preventDefault(); break;
          case 'ShiftLeft': case 'ShiftRight': input.boost = true; break;
          case 'KeyC': cycleCamera(); break;
          case 'KeyV': switchCar(); break;
          case 'Backquote': case 'IntlBackslash': toggleDebug(); break;
        }
      });

      window.addEventListener('keyup', (e) => {
        switch (e.code) {
          case 'KeyW': case 'ArrowUp': input.accelerate = false; break;
          case 'KeyS': case 'ArrowDown': input.brake = false; break;
          case 'KeyA': case 'ArrowLeft': input.left = false; break;
          case 'KeyD': case 'ArrowRight': input.right = false; break;
          case 'Space': input.handbrake = false; break;
          case 'ShiftLeft': case 'ShiftRight': input.boost = false; break;
        }
      });

      // 鼠标控制环绕视角
      let mouseDown = false;
      renderer.domElement.addEventListener('mousedown', () => { mouseDown = true; });
      renderer.domElement.addEventListener('mouseup', () => { mouseDown = false; });
      renderer.domElement.addEventListener('mousemove', (e) => {
        if (cameraMode === 2 && mouseDown) {
          orbitAngle -= e.movementX * 0.01;
          orbitDistance = Math.max(5, Math.min(30, orbitDistance - e.movementY * 0.05));
        }
      });
      renderer.domElement.addEventListener('wheel', (e) => {
        if (cameraMode === 2) {
          orbitDistance = Math.max(5, Math.min(30, orbitDistance + e.deltaY * 0.01));
        }
      });

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    }

    function cycleCamera() {
      cameraMode = (cameraMode + 1) % 3;
      const names = ['跟随视角', '车头视角', '环绕视角'];
      const hint = document.getElementById('camera-hint');
      hint.textContent = names[cameraMode];
      hint.classList.add('show');
      gameState.cameraHintTimer = 2.0;
    }

    function toggleDebug() {
      gameState.debugVisible = !gameState.debugVisible;
      document.getElementById('debug-panel').classList.toggle('active', gameState.debugVisible);
    }

    // ============================================
    // 物理更新
    // ============================================
    function updatePhysics(dt) {
      const cs = carState;

      // 碰撞冷却倒计时
      if (cs.collisionCooldown > 0) {
        cs.collisionCooldown -= dt;
      }

      // 转向输入
      let steerInput = 0;
      if (input.left) steerInput -= 1;
      if (input.right) steerInput += 1;

      // 加速/刹车
      const boostMult = input.boost ? cs.boostMultiplier : 1.0;
      if (input.accelerate) {
        cs.speed += cs.accel * boostMult * dt;
      }
      if (input.brake) {
        cs.speed -= cs.brakeForce * dt;
      }

      // 自然摩擦减速
      cs.speed *= (1 - cs.friction * dt);

      // 速度限制
      const maxSpd = cs.maxSpeed * boostMult;
      cs.speed = Math.max(-maxSpd * 0.3, Math.min(maxSpd, cs.speed));

      // 转向角 (低速更灵敏, 高速降低响应)
      const speedFactor = Math.abs(cs.speed) / cs.maxSpeed;
      const steerResponse = cs.maxSteer * (1 - speedFactor * 0.5);
      const targetSteer = steerInput * steerResponse;
      cs.steerAngle += (targetSteer - cs.steerAngle) * Math.min(1, 8 * dt);

      // 漂移判定
      const isDrifting = input.handbrake ||
        (Math.abs(cs.speed) > cs.driftThreshold && Math.abs(cs.steerAngle) > 0.25 && speedFactor > 0.3);

      if (isDrifting) {
        cs.driftFactor = Math.min(cs.driftFactor + dt * 2, 1);
      } else {
        cs.driftFactor = Math.max(cs.driftFactor - dt * 3, 0);
      }

      // 抓地力计算
      const currentGrip = THREE.MathUtils.lerp(cs.grip, cs.driftGrip, cs.driftFactor);

      // 横向滑动速度
      const targetLateral = cs.driftFactor * cs.speed * Math.sin(cs.steerAngle) * 0.5;
      cs.lateralVelocity += (targetLateral - cs.lateralVelocity) * (1 - currentGrip) * dt * 5;
      cs.lateralVelocity *= (1 - 0.5 * dt); // 横向衰减

      // 车身旋转 (转向影响) - 注意：Three.js 坐标系 Y 轴向上，rotation.y 逆时针为正
      // 所以 steerAngle 为正（右转）时，turnRate 应该使车向右转（rotation 减小）
      const turnRate = -cs.steerAngle * cs.speed * dt * 0.15;
      cs.rotation += turnRate;

      // 速度方向 (考虑漂移时的侧滑)
      const forwardAngle = cs.rotation;
      const driftAngle = cs.driftFactor * cs.steerAngle * 0.8;
      const moveAngle = forwardAngle + driftAngle;

      const vx = Math.sin(moveAngle) * cs.speed + Math.cos(forwardAngle) * cs.lateralVelocity;
      const vz = Math.cos(moveAngle) * cs.speed - Math.sin(forwardAngle) * cs.lateralVelocity;

      cs.x += vx * dt;
      cs.z += vz * dt;

      // 世界边界限制
      const bound = WORLD_SIZE / 2 - 2;
      if (cs.x < -bound) { cs.x = -bound; cs.speed *= 0.5; }
      if (cs.x > bound) { cs.x = bound; cs.speed *= 0.5; }
      if (cs.z < -bound) { cs.z = -bound; cs.speed *= 0.5; }
      if (cs.z > bound) { cs.z = bound; cs.speed *= 0.5; }

      // 地形高度采样与贴合
      const carH = getTerrainHeight(cs.x, cs.z);
      // 计算前方和侧方高度以确定车身俯仰和侧倾
      const lookAheadDist = 2.0;
      const hForward = getTerrainHeight(cs.x + Math.sin(cs.rotation) * lookAheadDist, cs.z + Math.cos(cs.rotation) * lookAheadDist);
      const hRight = getTerrainHeight(cs.x + Math.cos(cs.rotation) * lookAheadDist, cs.z - Math.sin(cs.rotation) * lookAheadDist);
      const hLeft = getTerrainHeight(cs.x - Math.cos(cs.rotation) * lookAheadDist, cs.z + Math.sin(cs.rotation) * lookAheadDist);

      const pitch = Math.atan2(hForward - carH, lookAheadDist);
      const roll = Math.atan2(hRight - hLeft, lookAheadDist * 2);

      // 更新车辆显示
      car.position.set(cs.x, carH, cs.z);
      // 车身朝向 + 漂移时的侧倾 + 地形适应
      car.rotation.y = cs.rotation;
      car.rotation.z = -cs.driftFactor * cs.steerAngle * 0.3 + roll; // 侧倾
      car.rotation.x = cs.driftFactor * 0.1 + pitch; // 俯仰

      // 前轮转向可视化
      wheels[0].rotation.y = cs.steerAngle * 1.5;
      wheels[1].rotation.y = cs.steerAngle * 1.5;
      // 车轮滚动
      const wheelRoll = cs.speed * dt * 3;
      wheels.forEach(w => { w.rotation.x += wheelRoll; });

      // 漂移效果
      if (cs.driftFactor > 0.3 && Math.abs(cs.speed) > 5) {
        const now = performance.now();
        if (now - gameState.lastSkidTime > 50) {
          // 后轮轮胎印
          const rearOffset = 1.3 * CAR_TYPES[currentCarIndex].scale.z;
          const sideOffset = 0.9 * CAR_TYPES[currentCarIndex].scale.x;
          const sin = Math.sin(cs.rotation);
          const cos = Math.cos(cs.rotation);
          createSkidMark(
            cs.x + (-sideOffset * cos - rearOffset * sin),
            cs.z + (-sideOffset * sin + rearOffset * cos),
            cs.rotation, 0.3
          );
          createSkidMark(
            cs.x + (sideOffset * cos - rearOffset * sin),
            cs.z + (sideOffset * sin + rearOffset * cos),
            cs.rotation, 0.3
          );
          gameState.lastSkidTime = now;
        }

        // 烟雾粒子
        spawnDriftParticles(cs.x, cs.z, cs.rotation, cs.driftFactor);

        // 漂移得分
        if (!gameState.isDrifting) {
          gameState.isDrifting = true;
          gameState.driftTimer = 0;
          gameState.currentDriftScore = 0;
        }
        gameState.driftTimer += dt;
        const speedBonus = Math.abs(cs.speed) * 0.5;
        const driftBonus = cs.driftFactor * 20;
        gameState.currentDriftScore += (speedBonus + driftBonus) * dt;

        // 连击倍率
        if (gameState.driftTimer > 2) gameState.driftCombo = 2;
        if (gameState.driftTimer > 5) gameState.driftCombo = 3;
        if (gameState.driftTimer > 10) gameState.driftCombo = 5;
      } else {
        if (gameState.isDrifting) {
          // 漂移结束,结算得分
          gameState.totalDriftScore += Math.floor(gameState.currentDriftScore * gameState.driftCombo);
          gameState.isDrifting = false;
          gameState.driftTimer = 0;
          gameState.driftCombo = 1;
          gameState.currentDriftScore = 0;
        }
      }

      // 氮气加速粒子
      if (input.boost && Math.abs(cs.speed) > 5) {
        spawnBoostParticles(cs.x, cs.z, cs.rotation);
      }

      // ============================================
      // 碰撞检测：车辆 vs 障碍物（路障/油桶）
      // ============================================
      for (let i = 0; i < obstacles.length; i++) {
        const obs = obstacles[i];
        const op = obstaclePhysics[i];
        const mesh = obs.mesh;

        let hit = false;
        let pushForce = 0;
        let worldNx = 0, worldNz = 0;

        if (obs.type === 'barrel') {
          // 圆形碰撞
          const dx = mesh.position.x - cs.x;
          const dz = mesh.position.z - cs.z;
          const dist = Math.sqrt(dx * dx + dz * dz);
          const minDist = COLLISION.carHalfL + obs.radius;
          if (dist < minDist && dist > 0.01) {
            hit = true;
            pushForce = Math.abs(cs.speed) * 0.9 + 4;
            worldNx = dx / dist;
            worldNz = dz / dist;
          }
        } else if (obs.type === 'barrier') {
          // 简化为圆形碰撞（路障较长，用较大半径）
          const dx = mesh.position.x - cs.x;
          const dz = mesh.position.z - cs.z;
          const dist = Math.sqrt(dx * dx + dz * dz);
          const minDist = COLLISION.carHalfL + obs.radius;
          if (dist < minDist && dist > 0.01) {
            hit = true;
            pushForce = Math.abs(cs.speed) * 0.6 + 2;
            worldNx = dx / dist;
            worldNz = dz / dist;
            op.immovable = true; // 路障较重，不容易推动
          }
        }

        if (hit) {
          if (op.immovable) {
            // 路障：车反弹，添加碰撞冷却避免卡死
            if (!cs.collisionCooldown || cs.collisionCooldown <= 0) {
              cs.speed *= -0.3;
              cs.x -= worldNx * 1.0;
              cs.z -= worldNz * 1.0;
              cs.collisionCooldown = 0.3; // 0.3秒冷却
            }
          } else {
            // 油桶：被撞飞
            op.vx = worldNx * pushForce + cs.speed * Math.sin(cs.rotation) * 0.4;
            op.vz = worldNz * pushForce + cs.speed * Math.cos(cs.rotation) * 0.4;
            op.vy = pushForce * 0.5 + 3;
            op.grounded = false;
            op.avx = (Math.random() - 0.5) * 8;
            op.avz = (Math.random() - 0.5) * 8;
            cs.speed *= 0.75;
          }

          // 碰撞粒子
          const pColor = obs.type === 'barrel' ? 0x6699cc : 0xff6600;
          for (let j = 0; j < 4; j++) {
            createParticle(
              mesh.position.x, mesh.position.y, mesh.position.z,
              (Math.random() - 0.5) * 6, Math.random() * 4, (Math.random() - 0.5) * 6,
              0.2, pColor, 0.5
            );
          }
        }
      }

      // ============================================
      // 障碍物物理更新
      // ============================================
      for (let i = 0; i < obstacles.length; i++) {
        const obs = obstacles[i];
        const op = obstaclePhysics[i];
        if (op.immovable || op.grounded) continue;

        op.vy += gravity * dt;
        op.vx *= (1 - 0.5 * dt);
        op.vz *= (1 - 0.5 * dt);

        obs.mesh.position.x += op.vx * dt;
        obs.mesh.position.y += op.vy * dt;
        obs.mesh.position.z += op.vz * dt;

        op.rx += op.avx * dt;
        op.rz += op.avz * dt;
        obs.mesh.rotation.x = op.rx;
        obs.mesh.rotation.z = op.rz;

        const restY = obs.type === 'barrel' ? 0.6 : 0.4;
        const terrainY = getTerrainHeight(obs.mesh.position.x, obs.mesh.position.z);
        if (obs.mesh.position.y <= terrainY + restY) {
          obs.mesh.position.y = terrainY + restY;
          op.vy = -op.vy * 0.25;
          op.vx *= 0.6;
          op.vz *= 0.6;
          op.avx *= 0.6;
          op.avz *= 0.6;
          if (Math.abs(op.vy) < 0.5) {
            op.vy = 0;
            op.grounded = true;
            obs.mesh.rotation.x *= 0.5;
            obs.mesh.rotation.z *= 0.5;
          }
        }

        const b = WORLD_SIZE / 2;
        if (Math.abs(obs.mesh.position.x) > b || Math.abs(obs.mesh.position.z) > b) {
          op.grounded = true;
          op.vx = 0; op.vy = 0; op.vz = 0;
        }
      }

      // ============================================
      // 碰撞检测：车辆 vs 锥桶（有冷却期）
      // ============================================
      if (!cs.collisionCooldown || cs.collisionCooldown <= 0) {
        for (let i = 0; i < cones.length; i++) {
          const cone = cones[i];
          const cp = conePhysics[i];
          if (!cp.active) continue;

          const result = COLLISION.checkCarCone(cs, cone.position);
          if (result.hit) {
            // 计算碰撞冲量
            const impactSpeed = Math.abs(cs.speed);
            const pushForce = impactSpeed * 0.8 + 3;

            // 将碰撞法线转回世界坐标
            const cos = Math.cos(cs.rotation);
            const sin = Math.sin(cs.rotation);
            const worldNx = result.nx * cos - result.nz * sin;
            const worldNz = result.nx * sin + result.nz * cos;

            // 推开锥桶
            cp.vx = worldNx * pushForce + cs.speed * sin * 0.3;
            cp.vz = worldNz * pushForce + cs.speed * cos * 0.3;
            cp.vy = pushForce * 0.4 + 2; // 弹起
            cp.grounded = false;
            cp.angularVx = (Math.random() - 0.5) * 10;
            cp.angularVz = (Math.random() - 0.5) * 10;

            // 车辆减速并推开
            cs.speed *= 0.7;
            cs.x -= worldNx * 0.8;
            cs.z -= worldNz * 0.8;
            cs.collisionCooldown = 0.15; // 0.15秒冷却

            // 碰撞粒子（橙色碎片）
            for (let j = 0; j < 5; j++) {
              createParticle(
                cone.position.x, cone.position.y, cone.position.z,
                (Math.random() - 0.5) * 5, Math.random() * 3, (Math.random() - 0.5) * 5,
                0.15, 0xff8800, 0.6
              );
            }
          }
        }
      }

      // ============================================
      // 锥桶物理更新
      // ============================================
      const gravity = -15;
      for (let i = 0; i < cones.length; i++) {
        const cone = cones[i];
        const cp = conePhysics[i];
        if (cp.active && !cp.grounded) {
          // 重力
          cp.vy += gravity * dt;
          // 空气阻力
          cp.vx *= (1 - 0.5 * dt);
          cp.vz *= (1 - 0.5 * dt);

          // 更新位置
          cone.position.x += cp.vx * dt;
          cone.position.y += cp.vy * dt;
          cone.position.z += cp.vz * dt;

          // 旋转
          cp.rx += cp.angularVx * dt;
          cp.rz += cp.angularVz * dt;
          cone.rotation.x = cp.rx;
          cone.rotation.z = cp.rz;

          // 地面碰撞（贴合地形）
          const terrainY = getTerrainHeight(cone.position.x, cone.position.z);
          const groundY = terrainY + 0.5;
          if (cone.position.y <= groundY) {
            cone.position.y = groundY;
            cp.vy = -cp.vy * 0.3; // 弹跳衰减
            cp.vx *= 0.7; // 地面摩擦
            cp.vz *= 0.7;
            cp.angularVx *= 0.7;
            cp.angularVz *= 0.7;

            if (Math.abs(cp.vy) < 0.5) {
              cp.vy = 0;
              cp.grounded = true;
              // 恢复直立
              cone.rotation.x *= 0.5;
              cone.rotation.z *= 0.5;
            }
          }

          // 超出边界重置
          const b = WORLD_SIZE / 2;
          if (Math.abs(cone.position.x) > b || Math.abs(cone.position.z) > b) {
            const resetY = getTerrainHeight(cone.position.x, cone.position.z);
            cone.position.y = resetY + 0.5;
            cp.vx = 0; cp.vy = 0; cp.vz = 0;
            cp.grounded = true;
            cone.rotation.x = 0;
            cone.rotation.z = 0;
          }
        }
      }
    }

    // ============================================
    // 更新粒子
    // ============================================
    function updateParticles(dt) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.userData.life -= dt;
        if (p.userData.life <= 0) {
          scene.remove(p);
          p.geometry.dispose();
          p.material.dispose();
          particles.splice(i, 1);
          continue;
        }
        const t = p.userData.life / p.userData.maxLife;
        p.material.opacity = t * 0.5;
        p.position.x += p.userData.vx * dt;
        p.position.y += p.userData.vy * dt;
        p.position.z += p.userData.vz * dt;
        p.userData.vy += 1.0 * dt; // 上升
        p.scale.setScalar(1 + (1 - t) * 2);
        p.rotation.z += p.userData.rotSpeed * dt;
        p.lookAt(camera.position);
      }
    }

    // ============================================
    // 更新 skid marks 渐隐
    // ============================================
    function updateSkidMarks(dt) {
      for (let i = skidMarks.length - 1; i >= 0; i--) {
        const mark = skidMarks[i];
        mark.userData.life -= mark.userData.fadeRate;
        if (mark.userData.life <= 0) {
          scene.remove(mark);
          mark.geometry.dispose();
          mark.material.dispose();
          skidMarks.splice(i, 1);
        } else {
          mark.material.opacity = mark.userData.life * 0.5;
        }
      }
    }

    // ============================================
    // 更新相机
    // ============================================
    function updateCamera(dt) {
      const cs = carState;
      const sin = Math.sin(cs.rotation);
      const cos = Math.cos(cs.rotation);
      const carH = getTerrainHeight(cs.x, cs.z);

      let targetPos, lookAt;

      if (cameraMode === 0) {
        // 跟随视角
        const dist = 8 + Math.abs(cs.speed) * 0.15;
        const height = 4 + Math.abs(cs.speed) * 0.05;
        targetPos = new THREE.Vector3(
          cs.x - sin * dist,
          carH + height,
          cs.z - cos * dist
        );
        lookAt = new THREE.Vector3(cs.x, carH + 1, cs.z);
      } else if (cameraMode === 1) {
        // 车头视角
        const hoodDist = 1.5;
        const hoodHeight = 1.2;
        targetPos = new THREE.Vector3(
          cs.x + sin * hoodDist,
          carH + hoodHeight,
          cs.z + cos * hoodDist
        );
        lookAt = new THREE.Vector3(
          cs.x + sin * 10,
          carH + 1,
          cs.z + cos * 10
        );
      } else {
        // 环绕视角
        targetPos = new THREE.Vector3(
          cs.x + Math.sin(orbitAngle) * orbitDistance,
          carH + 6,
          cs.z + Math.cos(orbitAngle) * orbitDistance
        );
        lookAt = new THREE.Vector3(cs.x, carH + 1, cs.z);
      }

      // 平滑插值
      const lerpFactor = Math.min(1, (cameraMode === 1 ? 12 : 4) * dt);
      camera.position.lerp(targetPos, lerpFactor);
      camera.lookAt(lookAt);
    }

    // ============================================
    // 更新 UI
    // ============================================
    function updateUI(dt) {
      const cs = carState;
      const gs = gameState;

      // 速度表
      const kmh = Math.abs(Math.round(cs.speed * 3.6));
      document.getElementById('speedText').textContent = kmh;

      // 指针角度 (-135 ~ 135 度)
      const maxKmh = Math.round(cs.maxSpeed * 3.6 * 1.5);
      const needleAngle = -135 + (kmh / maxKmh) * 270;
      document.getElementById('speedNeedle').setAttribute('transform', `rotate(${needleAngle} 80 80)`);

      // 圆弧填充
      const arcLength = 330; // 近似圆弧长度
      const dash = Math.min(arcLength, (kmh / maxKmh) * arcLength);
      const arc = document.getElementById('speedArc');
      arc.setAttribute('stroke-dasharray', `${dash} ${arcLength}`);
      // 颜色根据速度变化
      if (kmh > 120) arc.setAttribute('stroke', '#ef4444');
      else if (kmh > 80) arc.setAttribute('stroke', '#f59e0b');
      else arc.setAttribute('stroke', '#22c55e');

      // 计时器
      const elapsed = (performance.now() - gs.startTime) / 1000;
      const mins = Math.floor(elapsed / 60).toString().padStart(2, '0');
      const secs = Math.floor(elapsed % 60).toString().padStart(2, '0');
      const ms = Math.floor((elapsed % 1) * 100).toString().padStart(2, '0');
      document.getElementById('timer').textContent = `${mins}:${secs}.${ms}`;

      // 漂移得分
      const driftEl = document.getElementById('drift-score');
      if (gs.isDrifting || gs.currentDriftScore > 0) {
        driftEl.classList.add('active');
        const displayScore = Math.floor(gs.currentDriftScore * gs.driftCombo);
        document.getElementById('driftMain').textContent = displayScore;
        if (gs.driftCombo > 1) {
          document.getElementById('driftCombo').textContent = `x${gs.driftCombo} 连击!`;
        } else {
          document.getElementById('driftCombo').textContent = '';
        }
      } else {
        driftEl.classList.remove('active');
      }

      // 相机提示自动隐藏
      if (gs.cameraHintTimer > 0) {
        gs.cameraHintTimer -= dt;
        if (gs.cameraHintTimer <= 0) {
          document.getElementById('camera-hint').classList.remove('show');
        }
      }

      // 车辆信息提示自动隐藏
      if (gs.carInfoTimer > 0) {
        gs.carInfoTimer -= dt;
        if (gs.carInfoTimer <= 0) {
          document.getElementById('car-info').classList.remove('show');
        }
      }

      // 调试面板
      if (gs.debugVisible) {
        document.getElementById('dbg-speed').textContent = cs.speed.toFixed(2);
        document.getElementById('dbg-steer').textContent = cs.steerAngle.toFixed(3);
        document.getElementById('dbg-drift').textContent = cs.driftFactor.toFixed(3);
        document.getElementById('dbg-lat').textContent = cs.lateralVelocity.toFixed(2);
        document.getElementById('dbg-x').textContent = cs.x.toFixed(1);
        document.getElementById('dbg-z').textContent = cs.z.toFixed(1);
        document.getElementById('dbg-rot').textContent = ((cs.rotation * 180 / Math.PI) % 360).toFixed(1);
        const camNames = ['跟随', '车头', '环绕'];
        document.getElementById('dbg-cam').textContent = camNames[cameraMode];
        document.getElementById('dbg-car').textContent = CAR_TYPES[currentCarIndex].name;
        document.getElementById('dbg-fps').textContent = gs.fps;
      }

      // 迷你地图
      updateMinimap();
    }

    // ============================================
    // 更新迷你地图
    // ============================================
    function updateMinimap() {
      const canvas = document.getElementById('minimapCanvas');
      const ctx = canvas.getContext('2d');
      const w = canvas.width, h = canvas.height;

      ctx.fillStyle = '#111827';
      ctx.fillRect(0, 0, w, h);

      const scale = w / WORLD_SIZE;
      const cx = w / 2, cy = h / 2;

      // 绘制锥桶
      ctx.fillStyle = '#ff6600';
      cones.forEach(cone => {
        const px = cx + cone.position.x * scale;
        const py = cy + cone.position.z * scale;
        ctx.beginPath();
        ctx.arc(px, py, 2, 0, Math.PI * 2);
        ctx.fill();
      });

      // 绘制车辆
      const carX = cx + carState.x * scale;
      const carY = cy + carState.z * scale;

      ctx.save();
      ctx.translate(carX, carY);
      ctx.rotate(-carState.rotation);

      // 车身颜色根据当前车辆类型
      const carColor = '#' + new THREE.Color(CAR_TYPES[currentCarIndex].color).getHexString();
      ctx.fillStyle = carColor;
      ctx.fillRect(-4, -8, 8, 16);
      // 车头方向指示
      ctx.fillStyle = '#ffffaa';
      ctx.fillRect(-3, 6, 2, 4);
      ctx.fillRect(1, 6, 2, 4);

      ctx.restore();

      // 绘制边界
      ctx.strokeStyle = '#374151';
      ctx.strokeRect(cx - WORLD_SIZE/2 * scale, cy - WORLD_SIZE/2 * scale, WORLD_SIZE * scale, WORLD_SIZE * scale);
    }

    // ============================================
    // 速度表刻度
    // ============================================
    function initSpeedometer() {
      const container = document.getElementById('speedTicks');
      container.innerHTML = '';
      const maxKmh = Math.round(carState.maxSpeed * 3.6 * 1.5);
      for (let i = 0; i <= 10; i++) {
        const angle = -135 + (i / 10) * 270;
        const rad = (angle - 90) * Math.PI / 180;
        const r1 = 58, r2 = 66;
        const x1 = 80 + Math.cos(rad) * r1;
        const y1 = 80 + Math.sin(rad) * r1;
        const x2 = 80 + Math.cos(rad) * r2;
        const y2 = 80 + Math.sin(rad) * r2;

        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', x1);
        line.setAttribute('y1', y1);
        line.setAttribute('x2', x2);
        line.setAttribute('y2', y2);
        line.setAttribute('stroke', '#6b7280');
        line.setAttribute('stroke-width', '2');
        container.appendChild(line);

        // 数字
        const val = Math.round((i / 10) * maxKmh);
        const tx = 80 + Math.cos(rad) * (r2 + 10);
        const ty = 80 + Math.sin(rad) * (r2 + 10);
        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', tx);
        text.setAttribute('y', ty + 3);
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('fill', '#9ca3af');
        text.setAttribute('font-size', '9');
        text.textContent = val;
        container.appendChild(text);
      }
    }

    // ============================================
    // 主循环
    // ============================================
    let lastTime = 0;
    function animate(time) {
      requestAnimationFrame(animate);

      const dt = Math.min((time - lastTime) / 1000, 0.05); // 限制最大 dt
      lastTime = time;

      if (dt <= 0) return;

      // FPS 计算
      gameState.frameCount++;
      if (time - gameState.lastFpsTime >= 1000) {
        gameState.fps = gameState.frameCount;
        gameState.frameCount = 0;
        gameState.lastFpsTime = time;
      }

      updatePhysics(dt);
      updateParticles(dt);
      updateSkidMarks(dt);
      updateCamera(dt);
      updateUI(dt);

      renderer.render(scene, camera);
    }

    // ============================================
    // 启动
    // ============================================
    function startGame() {
      document.getElementById('splash').classList.add('hidden');
      gameState.startTime = performance.now();
      lastTime = performance.now();
      requestAnimationFrame(animate);
    }

    // 初始化
    initThree();
    createTerrain();
    createCar();
    createCones();
    createObstacles();
    initSpeedometer();
    setupInput();

    document.getElementById('loadingText').textContent = '点击开始按钮进入游戏';
    document.getElementById('startBtn').addEventListener('click', startGame);

    // 初始渲染一帧
    renderer.render(scene, camera);
  </script>

  <!-- ============================================
       触屏控制（虚拟摇杆 + 按键）
       ============================================ -->
  <div id="touch-controls">
    <!-- 左摇杆（转向） -->

      <div id="touch-joystick">
        <div id="touch-joystick-knob"></div>
      </div>
      <div class="touch-label">转向</div>
    </div>

    <!-- 右侧按钮 -->
    <div id="touch-zone-right">
      <div id="touch-btn-accelerate" class="touch-btn touch-btn-accel">
        <span>油门</span>
      </div>
      <div id="touch-btn-brake" class="touch-btn touch-btn-brake">
        <span>刹车</span>
      </div>
      <div id="touch-btn-boost" class="touch-btn touch-btn-boost">
        <span>氮气</span>
      </div>
      <div id="touch-btn-handbrake" class="touch-btn touch-btn-handbrake">
        <span>漂移</span>
      </div>
    </div>
  </div>

  <style>
    /* 触屏控制 - 仅在触摸设备显示 */
    #touch-controls {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 20;
      pointer-events: none;
      display: none;
    }

    @media (hover: none) and (pointer: coarse) {
      #touch-controls { display: block; }
      /* 隐藏键盘控制提示 */
      #controls-hint { display: none; }
    }

    /* 左摇杆区 */
    #touch-zone-left {
      position: absolute;
      bottom: 30px; left: 30px;
      width: 130px; height: 130px;
      pointer-events: auto;
    }

    #touch-joystick {
      width: 130px; height: 130px;
      border-radius: 50%;
      background: rgba(34, 197, 94, 0.12);
      border: 2px solid rgba(34, 197, 94, 0.3);
      position: relative;
      touch-action: none;
    }

    #touch-joystick-knob {
      position: absolute;
      top: 50%; left: 50%;
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(34, 197, 94, 0.5);
      border: 2px solid rgba(34, 197, 94, 0.7);
      transform: translate(-50%, -50%);
      transition: none;
    }

    .touch-label {
      text-align: center;
      color: rgba(255,255,255,0.4);
      font-size: 11px;
      margin-top: 4px;
      letter-spacing: 2px;
    }

    /* 右侧按钮区 */
    #touch-zone-right {
      position: absolute;
      bottom: 30px; right: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      pointer-events: auto;
    }

    .touch-btn {
      width: 64px; height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .touch-btn:active, .touch-btn.active {
      transform: scale(0.92);
    }

    .touch-btn-accel {
      background: rgba(34, 197, 94, 0.3);
      border: 2px solid rgba(34, 197, 94, 0.6);
    }
    .touch-btn-accel:active, .touch-btn-accel.active {
      background: rgba(34, 197, 94, 0.6);
    }

    .touch-btn-brake {
      background: rgba(239, 68, 68, 0.3);
      border: 2px solid rgba(239, 68, 68, 0.6);
    }
    .touch-btn-brake:active, .touch-btn-brake.active {
      background: rgba(239, 68, 68, 0.6);
    }

    .touch-btn-boost {
      background: rgba(59, 130, 246, 0.3);
      border: 2px solid rgba(59, 130, 246, 0.6);
    }
    .touch-btn-boost:active, .touch-btn-boost.active {
      background: rgba(59, 130, 246, 0.6);
    }

    .touch-btn-handbrake {
      background: rgba(249, 115, 22, 0.3);
      border: 2px solid rgba(249, 115, 22, 0.6);
      grid-column: span 2;
      width: 100%;
      border-radius: 32px;
    }
    .touch-btn-handbrake:active, .touch-btn-handbrake.active {
      background: rgba(249, 115, 22, 0.6);
    }

    /* 手机竖屏适配 */
    @media (max-width: 480px) {
      #touch-zone-left { bottom: 20px; left: 14px; width: 100px; height: 100px; }
      #touch-joystick { width: 100px; height: 100px; }
      #touch-joystick-knob { width: 36px; height: 36px; }
      #touch-zone-right { bottom: 20px; right: 10px; gap: 8px; }
      .touch-btn { width: 54px; height: 54px; font-size: 10px; }
      .touch-btn-handbrake { width: 100%; }
      #speedometer { width: 100px; height: 100px; bottom: 12px; left: 12px; }
      #miniMap { width: 80px; height: 80px; top: 60px; }
      /* 适配小屏速度表文字 */
      .speed-text { font-size: 20px; }
      .speed-unit { font-size: 9px; }
    }
  </style>

  <script>
    // 触屏控制逻辑
    (function() {
      'use strict';

      // ---- 左摇杆（转向） ----
      const joystick = document.getElementById('touch-joystick');
      const knob = document.getElementById('touch-joystick-knob');
      let joyX = 0;
      let joyTouchId = null;

      // 获取摇杆中心坐标
      function getJoystickCenter() {
        const rect = joystick.getBoundingClientRect();
        return { cx: rect.left + rect.width / 2, cy: rect.top + rect.height / 2, r: rect.width / 2 - 22 };
      }

      function updateJoystick(touchX, touchY) {
        const { cx, cy, r } = getJoystickCenter();
        let dx = touchX - cx;
        let dy = touchY - cy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > r) { dx = dx / dist * r; dy = dy / dist * r; }
        joyX = dx / r; // -1 ~ 1
        knob.style.transform = `translate(${dx - 22}px, ${dy - 22}px)`;
      }

      function resetJoystick() {
        joyX = 0;
        joyTouchId = null;
        knob.style.transform = 'translate(-22px, -22px)';
      }

      joystick.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const t = e.changedTouches[0];
        joyTouchId = t.identifier;
        updateJoystick(t.clientX, t.clientY);
      });
      joystick.addEventListener('touchmove', (e) => {
        e.preventDefault();
        for (const t of e.changedTouches) {
          if (t.identifier === joyTouchId) {
            updateJoystick(t.clientX, t.clientY);
          }
        }
      });
      joystick.addEventListener('touchend', (e) => {
        for (const t of e.changedTouches) {
          if (t.identifier === joyTouchId) resetJoystick();
        }
      });
      joystick.addEventListener('touchcancel', resetJoystick);

      // ---- 右侧按钮 ----
      function setupTouchBtn(id, inputKey) {
        const el = document.getElementById(id);
        if (!el) return;
        el.addEventListener('touchstart', (e) => {
          e.preventDefault();
          if (inputKey in touchInputs) touchInputs[inputKey] = true;
          el.classList.add('active');
        });
        el.addEventListener('touchend', (e) => {
          e.preventDefault();
          if (inputKey in touchInputs) touchInputs[inputKey] = false;
          el.classList.remove('active');
        });
        el.addEventListener('touchcancel', () => {
          if (inputKey in touchInputs) touchInputs[inputKey] = false;
          el.classList.remove('active');
        });
        // 鼠标 fallback（桌面调试）
        el.addEventListener('mousedown', () => { if (inputKey in touchInputs) touchInputs[inputKey] = true; el.classList.add('active'); });
        el.addEventListener('mouseup', () => { if (inputKey in touchInputs) touchInputs[inputKey] = false; el.classList.remove('active'); });
        el.addEventListener('mouseleave', () => { if (inputKey in touchInputs) touchInputs[inputKey] = false; el.classList.remove('active'); });
      }

      const touchInputs = { accel: false, brake: false, boost: false, hb: false };

      setupTouchBtn('touch-btn-accelerate', 'accel');
      setupTouchBtn('touch-btn-brake', 'brake');
      setupTouchBtn('touch-btn-boost', 'boost');
      setupTouchBtn('touch-btn-handbrake', 'hb');

      // ---- 将触屏输入合并到游戏输入 ----
      // 在每帧 update 前将触摸状态写入 input
      const origUpdateUI = updateUI;
      updateUI = function(dt) {
        if (touchInputs.accel) input.accelerate = true;
        if (touchInputs.brake) input.brake = true;
        if (touchInputs.boost) input.boost = true;
        if (touchInputs.hb) { input.handbrake = true; }
        // 摇杆转向覆盖键盘
        if (joyX < -0.2) { input.left = true; input.right = false; }
        else if (joyX > 0.2) { input.right = true; input.left = false; }
        origUpdateUI(dt);
      };
    })();
  </script>
</body>
</html>
