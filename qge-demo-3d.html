<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>青柠漂移 - QGE 3D Racing</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0b0f19;
      font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
      user-select: none;
    }
    canvas { display: block; }

    /* UI 覆盖层 */
    #ui-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    /* 速度表 */
    #speedometer {
      position: absolute;
      bottom: 24px; left: 24px;
      width: 160px; height: 160px;
      pointer-events: auto;
    }
    #speedometer svg { width: 100%; height: 100%; }
    .speed-text {
      font-size: 32px; font-weight: bold;
      fill: #e5e7eb;
      text-anchor: middle;
    }
    .speed-unit {
      font-size: 12px; fill: #9ca3af;
      text-anchor: middle;
    }
    .speed-needle {
      stroke: #ef4444; stroke-width: 3;
      stroke-linecap: round;
      transition: transform 0.1s linear;
    }
    .speed-arc-bg { stroke: #374151; stroke-width: 8; fill: none; }
    .speed-arc-fill { stroke: #22c55e; stroke-width: 8; fill: none; }

    /* 迷你地图 */
    #minimap {
      position: absolute;
      top: 24px; right: 24px;
      width: 180px; height: 180px;
      background: rgba(17, 24, 39, 0.85);
      border: 2px solid #374151;
      border-radius: 8px;
      pointer-events: auto;
    }
    #minimap canvas { width: 100%; height: 100%; border-radius: 6px; }
    .minimap-label {
      position: absolute;
      top: 4px; left: 50%;
      transform: translateX(-50%);
      font-size: 10px; color: #9ca3af;
      background: rgba(0,0,0,0.5);
      padding: 1px 6px; border-radius: 4px;
    }

    /* 漂移得分 */
    #drift-score {
      position: absolute;
      top: 24px; left: 50%;
      transform: translateX(-50%);
      text-align: center;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #drift-score.active { opacity: 1; }
    .drift-main {
      font-size: 48px; font-weight: 900;
      color: #f59e0b;
      text-shadow: 0 0 20px rgba(245, 158, 11, 0.5);
      letter-spacing: 2px;
    }
    .drift-combo {
      font-size: 20px; font-weight: bold;
      color: #ef4444;
      text-shadow: 0 0 10px rgba(239, 68, 68, 0.4);
    }
    .drift-label {
      font-size: 12px; color: #9ca3af;
    }

    /* 计时器 */
    #timer {
      position: absolute;
      top: 24px; left: 24px;
      font-size: 24px; font-weight: bold;
      color: #e5e7eb;
      background: rgba(17, 24, 39, 0.7);
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid #374151;
    }

    /* 车辆信息 */
    #car-info {
      position: absolute;
      top: 70px; left: 24px;
      font-size: 14px; font-weight: bold;
      color: #22c55e;
      background: rgba(17, 24, 39, 0.7);
      padding: 6px 14px;
      border-radius: 8px;
      border: 1px solid #374151;
      opacity: 0;
      transition: opacity 0.5s;
    }
    #car-info.show { opacity: 1; }

    /* 控制提示 */
    #controls-hint {
      position: absolute;
      bottom: 24px; right: 24px;
      background: rgba(17, 24, 39, 0.85);
      border: 1px solid #374151;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 12px;
      color: #d1d5db;
      line-height: 1.8;
      pointer-events: auto;
    }
    #controls-hint kbd {
      background: #1f2937;
      border: 1px solid #4b5563;
      border-radius: 4px;
      padding: 2px 6px;
      font-family: monospace;
      font-size: 11px;
      color: #e5e7eb;
    }

    /* 调试面板 */
    #debug-panel {
      position: absolute;
      top: 110px; left: 24px;
      background: rgba(0, 0, 0, 0.85);
      border: 1px solid #4b5563;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 11px;
      color: #9ca3af;
      font-family: monospace;
      line-height: 1.6;
      display: none;
      pointer-events: auto;
      min-width: 200px;
    }
    #debug-panel.active { display: block; }
    #debug-panel .debug-row {
      display: flex; justify-content: space-between;
      gap: 16px;
    }
    #debug-panel .debug-val { color: #22c55e; }

    /* 相机模式提示 */
    #camera-hint {
      position: absolute;
      bottom: 200px; left: 50%;
      transform: translateX(-50%);
      font-size: 14px; color: #9ca3af;
      background: rgba(0,0,0,0.6);
      padding: 6px 14px;
      border-radius: 20px;
      opacity: 0;
      transition: opacity 0.5s;
    }
    #camera-hint.show { opacity: 1; }

    /* 启动画面 */
    #splash {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #0b0f19;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.8s;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    #splash h1 {
      font-size: 56px; font-weight: 900;
      color: #22c55e;
      text-shadow: 0 0 40px rgba(34, 197, 94, 0.4);
      margin-bottom: 8px;
      letter-spacing: 4px;
    }
    #splash h2 {
      font-size: 18px; color: #9ca3af;
      margin-bottom: 40px;
      letter-spacing: 2px;
    }
    #splash .start-btn {
      background: #22c55e;
      color: #0b0f19;
      font-size: 18px; font-weight: bold;
      padding: 14px 48px;
      border: none; border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      pointer-events: auto;
    }
    #splash .start-btn:hover {
      background: #16a34a;
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(34, 197, 94, 0.4);
    }
    #splash .loading {
      font-size: 14px; color: #6b7280;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <!-- 启动画面 -->
  <div id="splash">
    <h1>青柠漂移</h1>
    <h2>QINGNING DRIFT - QGE 3D RACING</h2>
    <button class="start-btn" id="startBtn">开始游戏</button>
    <div class="loading" id="loadingText">正在加载引擎...</div>
  </div>

  <!-- UI 覆盖层 -->
  <div id="ui-overlay">
    <div id="timer">00:00.00</div>
    <div id="car-info">跑车</div>

    <!-- 速度表 -->
    <div id="speedometer">
      <svg viewBox="0 0 160 160">
        <!-- 背景圆弧 -->
        <path class="speed-arc-bg" d="M 30 130 A 70 70 0 1 1 130 130"/>
        <!-- 填充圆弧 (动态) -->
        <path id="speedArc" class="speed-arc-fill" d="M 30 130 A 70 70 0 0 1 30 130" stroke-dasharray="0 330"/>
        <!-- 刻度 -->
        <g id="speedTicks"></g>
        <!-- 指针 -->
        <line id="speedNeedle" class="speed-needle" x1="80" y1="80" x2="80" y2="30"
              transform="rotate(-135 80 80)"/>
        <!-- 文字 -->
        <text x="80" y="115" class="speed-text" id="speedText">0</text>
        <text x="80" y="132" class="speed-unit">km/h</text>
      </svg>
    </div>

    <!-- 迷你地图 -->
    <div id="minimap">
      <div class="minimap-label">迷你地图</div>
      <canvas id="minimapCanvas" width="180" height="180"></canvas>
    </div>

    <!-- 漂移得分 -->
    <div id="drift-score">
      <div class="drift-label">漂移得分</div>
      <div class="drift-main" id="driftMain">0</div>
      <div class="drift-combo" id="driftCombo"></div>
    </div>

    <!-- 相机模式提示 -->
    <div id="camera-hint">跟随视角</div>

    <!-- 控制提示 -->
    <div id="controls-hint">
      <div><kbd>W</kbd> / <kbd>↑</kbd> 加速</div>
      <div><kbd>S</kbd> / <kbd>↓</kbd> 刹车/倒车</div>
      <div><kbd>A</kbd> / <kbd>←</kbd> 左转　<kbd>D</kbd> / <kbd>→</kbd> 右转</div>
      <div><kbd>空格</kbd> 手刹漂移</div>
      <div><kbd>Shift</kbd> 氮气加速</div>
      <div><kbd>C</kbd> 切换视角</div>
      <div><kbd>V</kbd> 切换车辆</div>
      <div><kbd>~</kbd> 调试面板</div>
    </div>

    <!-- 调试面板 -->
    <div id="debug-panel">
      <div style="color:#22c55e;font-weight:bold;margin-bottom:6px;">调试信息</div>
      <div class="debug-row"><span>速度</span><span class="debug-val" id="dbg-speed">0</span></div>
      <div class="debug-row"><span>转向角</span><span class="debug-val" id="dbg-steer">0</span></div>
      <div class="debug-row"><span>漂移因子</span><span class="debug-val" id="dbg-drift">0</span></div>
      <div class="debug-row"><span>横向速度</span><span class="debug-val" id="dbg-lat">0</span></div>
      <div class="debug-row"><span>位置 X</span><span class="debug-val" id="dbg-x">0</span></div>
      <div class="debug-row"><span>位置 Z</span><span class="debug-val" id="dbg-z">0</span></div>
      <div class="debug-row"><span>旋转</span><span class="debug-val" id="dbg-rot">0</span></div>
      <div class="debug-row"><span>相机模式</span><span class="debug-val" id="dbg-cam">跟随</span></div>
      <div class="debug-row"><span>车辆</span><span class="debug-val" id="dbg-car">跑车</span></div>
      <div class="debug-row"><span>FPS</span><span class="debug-val" id="dbg-fps">0</span></div>
    </div>
  </div>

  <!-- 游戏画布 -->
  <canvas id="game-canvas"></canvas>

  <!-- QGE 框架 -->
  <script src="qge/qge-core.js?v=3"></script>
  <script src="qge/qge-3d.js?v=3"></script>

  <!-- 游戏主逻辑 -->
  <script>
  // ============================================
  // DriftScene3D - 继承 QGE.Scene3D
  // ============================================
  class DriftScene3D extends QGE.Scene3D {
    constructor(engine) {
      super(engine);
      this._ready = false;
      this._started = false;

      // 车辆物理状态
      this.carState = {
        x: 0, z: 0,
        rotation: 0,
        speed: 0,
        steerAngle: 0,
        driftFactor: 0,
        lateralVelocity: 0,
        maxSpeed: 35,
        accel: 25,
        brakeForce: 25,
        friction: 1.2,
        maxSteer: 0.6,
        driftThreshold: 12,
        grip: 0.9,
        driftGrip: 0.15,
        boostMultiplier: 1.5,
        collisionCooldown: 0,
      };

      // 游戏状态
      this.gameState = {
        startTime: 0,
        totalDriftScore: 0,
        currentDriftScore: 0,
        driftCombo: 1,
        isDrifting: false,
        driftTimer: 0,
        lastSkidTime: 0,
        cameraHintTimer: 0,
        debugVisible: false,
        fps: 0,
        frameCount: 0,
        lastFpsTime: 0,
        carInfoTimer: 0,
      };

      // Three.js 对象引用
      this.car = null;
      this.carBody = null;
      this.wheels = [];
      this.terrainMesh = null;
      this.cones = [];
      this.conePhysics = [];
      this.obstacles = [];
      this.obstaclePhysics = [];
      this.skidMarks = [];
      this.particles = [];
      this.currentCarIndex = 0;
      this.cameraMode = 0;
      this.orbitAngle = 0;
      this.orbitDistance = 12;
      this.THREE = null;
    }

    // ============================================
    // 地形系统
    // ============================================
    get TERRAIN_SEGMENTS() { return 120; }
    get TERRAIN_MAX_HEIGHT() { return 35; }
    get WORLD_SIZE() { return 500; }
    get SKID_MAX() { return 200; }
    get PARTICLE_MAX() { return 300; }

    hash(x, z) {
      let n = Math.sin(x * 12.9898 + z * 78.233) * 43758.5453;
      return n - Math.floor(n);
    }

    noise2D(x, z) {
      const ix = Math.floor(x);
      const iz = Math.floor(z);
      const fx = x - ix;
      const fz = z - iz;
      const u = fx * fx * (3 - 2 * fx);
      const v = fz * fz * (3 - 2 * fz);
      const a = this.hash(ix, iz);
      const b = this.hash(ix + 1, iz);
      const c = this.hash(ix, iz + 1);
      const d = this.hash(ix + 1, iz + 1);
      return a + (b - a) * u + (c - a) * v + (a - b - c + d) * u * v;
    }

    fbm(x, z, octaves) {
      let val = 0;
      let amp = 1;
      let freq = 1;
      let maxVal = 0;
      for (let i = 0; i < octaves; i++) {
        val += this.noise2D(x * freq, z * freq) * amp;
        maxVal += amp;
        amp *= 0.5;
        freq *= 2.1;
      }
      return val / maxVal;
    }

    roadCenterZ(x) {
      return Math.sin(x * 0.015) * 40 + Math.sin(x * 0.035) * 15;
    }

    getTerrainHeight(x, z) {
      let h = this.fbm(x * 0.008, z * 0.008, 4) * this.TERRAIN_MAX_HEIGHT;
      h += this.fbm(x * 0.03, z * 0.03, 2) * 3;
      const distFromCenter = Math.sqrt(x * x + z * z);
      const flatRadius = 35;
      if (distFromCenter < flatRadius) {
        h *= (distFromCenter / flatRadius);
      }
      const mountainX = 120, mountainZ = -100;
      const distMountain = Math.sqrt((x - mountainX) ** 2 + (z - mountainZ) ** 2);
      if (distMountain < 150) {
        const mFactor = Math.max(0, 1 - distMountain / 150);
        h += mFactor * mFactor * 25;
      }
      const mountain2X = -100, mountain2Z = 120;
      const distMountain2 = Math.sqrt((x - mountain2X) ** 2 + (z - mountain2Z) ** 2);
      if (distMountain2 < 120) {
        const mFactor = Math.max(0, 1 - distMountain2 / 120);
        h += mFactor * mFactor * 20;
      }
      const roadZ = this.roadCenterZ(x);
      const roadDist = Math.abs(z - roadZ);
      const roadWidth = 10;
      if (roadDist < roadWidth) {
        const smoothFactor = roadDist / roadWidth;
        const roadH = this.getRawTerrainHeight(x, roadZ);
        h = roadH + (h - roadH) * (smoothFactor * smoothFactor);
      }
      return Math.max(0, h);
    }

    getRawTerrainHeight(x, z) {
      let h = this.fbm(x * 0.008, z * 0.008, 4) * this.TERRAIN_MAX_HEIGHT;
      h += this.fbm(x * 0.03, z * 0.03, 2) * 3;
      const distFromCenter = Math.sqrt(x * x + z * z);
      const flatRadius = 35;
      if (distFromCenter < flatRadius) {
        h *= (distFromCenter / flatRadius);
      }
      const mountainX = 120, mountainZ = -100;
      const distMountain = Math.sqrt((x - mountainX) ** 2 + (z - mountainZ) ** 2);
      if (distMountain < 150) {
        const mFactor = Math.max(0, 1 - distMountain / 150);
        h += mFactor * mFactor * 25;
      }
      const mountain2X = -100, mountain2Z = 120;
      const distMountain2 = Math.sqrt((x - mountain2X) ** 2 + (z - mountain2Z) ** 2);
      if (distMountain2 < 120) {
        const mFactor = Math.max(0, 1 - distMountain2 / 120);
        h += mFactor * mFactor * 20;
      }
      return Math.max(0, h);
    }

    getTerrainColor(height) {
      const T = this.THREE;
      const lowH = 2;
      const midH = 12;
      const highH = 25;
      if (height < lowH) {
        return new T.Color(0.25, 0.55, 0.18);
      } else if (height < midH) {
        const t = (height - lowH) / (midH - lowH);
        return new T.Color().lerpColors(
          new T.Color(0.25, 0.55, 0.18),
          new T.Color(0.55, 0.40, 0.22), t
        );
      } else if (height < highH) {
        const t = (height - midH) / (highH - midH);
        return new T.Color().lerpColors(
          new T.Color(0.55, 0.40, 0.22),
          new T.Color(0.50, 0.48, 0.45), t
        );
      } else {
        return new T.Color(0.55, 0.53, 0.50);
      }
    }

    // ============================================
    // 碰撞系统
    // ============================================
    get COLLISION() {
      return {
        carHalfW: 1.1,
        carHalfL: 2.2,
        carHalfH: 0.6,
        coneRadius: 0.5,
        checkCarCone: (cs, conePos) => {
          const dx = conePos.x - cs.x;
          const dz = conePos.z - cs.z;
          const cos = Math.cos(-cs.rotation);
          const sin = Math.sin(-cs.rotation);
          const localX = dx * cos - dz * sin;
          const localZ = dx * sin + dz * cos;
          const closestX = Math.max(-this.COLLISION.carHalfL, Math.min(this.COLLISION.carHalfL, localX));
          const closestZ = Math.max(-this.COLLISION.carHalfW, Math.min(this.COLLISION.carHalfW, localZ));
          const distX = localX - closestX;
          const distZ = localZ - closestZ;
          const distSq = distX * distX + distZ * distZ;
          const r = this.COLLISION.coneRadius;
          if (distSq < r * r) {
            const dist = Math.sqrt(Math.max(distSq, 0.001));
            return { hit: true, overlap: r - dist, nx: distX / dist, nz: distZ / dist, localX, localZ, conePos };
          }
          return { hit: false };
        }
      };
    }

    // ============================================
    // 车辆定义
    // ============================================
    get CAR_TYPES() {
      return [
        {
          name: '跑车', color: 0x22c55e, maxSpeed: 35, accel: 25, brakeForce: 25,
          friction: 1.2, maxSteer: 0.6, driftThreshold: 12, grip: 0.9, driftGrip: 0.15,
          boostMultiplier: 1.5, scale: { x: 1, y: 1, z: 1 },
          bodySize: { w: 1.8, h: 0.5, l: 4.0 }, cabinSize: { w: 1.4, h: 0.45, l: 2.0 },
          wheelRadius: 0.35, wheelWidth: 0.25, wheelY: 0.35, hasSpoiler: true,
        },
        {
          name: '卡车', color: 0xef4444, maxSpeed: 22, accel: 12, brakeForce: 25,
          friction: 1.4, maxSteer: 0.45, driftThreshold: 10, grip: 0.95, driftGrip: 0.3,
          boostMultiplier: 1.3, scale: { x: 1.3, y: 1.2, z: 1.4 },
          bodySize: { w: 2.4, h: 0.9, l: 5.5 }, cabinSize: { w: 2.0, h: 0.7, l: 2.5 },
          wheelRadius: 0.55, wheelWidth: 0.4, wheelY: 0.55, hasSpoiler: false,
        },
        {
          name: '漂移车', color: 0xa855f7, maxSpeed: 30, accel: 20, brakeForce: 25,
          friction: 1.0, maxSteer: 0.7, driftThreshold: 8, grip: 0.6, driftGrip: 0.05,
          boostMultiplier: 1.5, scale: { x: 1.15, y: 0.75, z: 1.05 },
          bodySize: { w: 2.0, h: 0.4, l: 3.8 }, cabinSize: { w: 1.6, h: 0.35, l: 1.8 },
          wheelRadius: 0.32, wheelWidth: 0.3, wheelY: 0.32, hasSpoiler: true,
        },
      ];
    }

    // ============================================
    // init - 异步初始化场景 (QGE.Scene3D 入口)
    // ============================================
    async init() {
      try {
      // 调用 Scene3D.init3D，初始化 threeScene, renderer3D, camera3D
      await this.init3D({
        antialias: true,
        shadowMapEnabled: true,
        shadowMapType: 'PCFSoftShadowMap',
        pixelRatio: Math.min(window.devicePixelRatio, 2),
      });

      // 获取 THREE 引用
      this.THREE = await QGE.loadThree();
      const T = this.THREE;

      // 设置场景背景和雾
      this.setBackground(0x87ceeb);
      this.setFog(80, 350, 0x87ceeb);

      // 设置摄像机
      this.camera3D.camera.position.set(0, 4, 8);
      this.camera3D.camera.lookAt(0, 0, 0);

      // 灯光
      const ambientLight = new T.AmbientLight(0xffffff, 0.5);
      this.add(ambientLight);

      const dirLight = new T.DirectionalLight(0xffffff, 1.0);
      dirLight.position.set(50, 80, 30);
      dirLight.castShadow = true;
      dirLight.shadow.mapSize.width = 2048;
      dirLight.shadow.mapSize.height = 2048;
      dirLight.shadow.camera.near = 0.5;
      dirLight.shadow.camera.far = 300;
      dirLight.shadow.camera.left = -150;
      dirLight.shadow.camera.right = 150;
      dirLight.shadow.camera.top = 150;
      dirLight.shadow.camera.bottom = -150;
      this.add(dirLight);

      const hemiLight = new T.HemisphereLight(0x87ceeb, 0x444444, 0.4);
      this.add(hemiLight);

      // 创建游戏世界
      this.createTerrain();
      this.createCar();
      this.createCones();
      this.createObstacles();
      this.initSpeedometer();
      this.setupInput();

      // 暴露到全局供触屏控制使用
      window._gameScene = this;

      // 标记就绪
      this._ready = true;
      super.init();
      document.getElementById('loadingText').textContent = '点击开始按钮进入游戏';
      } catch (err) {
        console.error('[QGE Racing] 初始化失败:', err);
        document.getElementById('loadingText').textContent = '加载失败: ' + err.message;
        document.getElementById('loadingText').style.color = '#ff4444';
      }
    }

    startGame() {
      this.gameState.startTime = performance.now();
      this._started = true;
      document.getElementById('splash').classList.add('hidden');
    }

    // ============================================
    // 创建地形
    // ============================================
    createTerrain() {
      const T = this.THREE;
      const geo = new T.PlaneGeometry(this.WORLD_SIZE, this.WORLD_SIZE, this.TERRAIN_SEGMENTS, this.TERRAIN_SEGMENTS);
      geo.rotateX(-Math.PI / 2);
      const positions = geo.attributes.position;
      const colors = new Float32Array(positions.count * 3);
      for (let i = 0; i < positions.count; i++) {
        const x = positions.getX(i);
        const z = positions.getZ(i);
        const h = this.getTerrainHeight(x, z);
        positions.setY(i, h);
        const col = this.getTerrainColor(h);
        colors[i * 3] = col.r;
        colors[i * 3 + 1] = col.g;
        colors[i * 3 + 2] = col.b;
      }
      geo.setAttribute('color', new T.BufferAttribute(colors, 3));
      geo.computeVertexNormals();
      const mat = new T.MeshStandardMaterial({
        vertexColors: true, roughness: 0.9, metalness: 0.05, flatShading: true,
      });
      this.terrainMesh = new T.Mesh(geo, mat);
      this.terrainMesh.receiveShadow = true;
      this.terrainMesh.castShadow = true;
      this.add(this.terrainMesh);

      // 中心圆环标记
      const ringGeo = new T.RingGeometry(18, 20, 64);
      const ringMat = new T.MeshBasicMaterial({ color: 0x22c55e, opacity: 0.3, transparent: true, side: T.DoubleSide });
      const ring = new T.Mesh(ringGeo, ringMat);
      ring.rotation.x = -Math.PI / 2;
      ring.position.y = 0.5;
      this.add(ring);
      const ring2 = new T.Mesh(new T.RingGeometry(38, 40, 64), ringMat.clone());
      ring2.rotation.x = -Math.PI / 2;
      ring2.position.y = 0.5;
      this.add(ring2);
    }

    // ============================================
    // 创建车辆
    // ============================================
    createCar() {
      const T = this.THREE;
      if (this.car) {
        this.remove(this.car);
        this.wheels = [];
      }
      this.car = new T.Group();
      const type = this.CAR_TYPES[this.currentCarIndex];
      const idx = this.currentCarIndex;

      const bodyMat = new T.MeshStandardMaterial({ color: type.color, roughness: 0.25, metalness: 0.5 });
      const glassMat = new T.MeshStandardMaterial({ color: 0x223344, roughness: 0.05, metalness: 0.9, transparent: true, opacity: 0.7 });

      if (idx === 0) {
        // ====== 跑车 ======
        const bw = 1.9, bh = 0.55, bl = 4.2;

        this.car.add(this.carBody);

        const hood = new T.Mesh(new T.BoxGeometry(bw * 0.92, 0.06, bl * 0.3), bodyMat);
        hood.position.set(0, wy + bh + 0.03, bl * 0.1);

        const trunk = new T.Mesh(new T.BoxGeometry(bw * 0.9, 0.06, bl * 0.2), bodyMat);
        trunk.position.set(0, wy + bh + 0.03, -bl * 0.25);
        this.car.add(trunk);

        const intakeGeo = new T.BoxGeometry(0.06, 0.03, 0.8);
        const intakeL = new T.Mesh(intakeGeo, blackMat);
        intakeL.position.set(-0.35, wy + bh + 0.07, bl * 0.1);
        this.car.add(intakeL);
        const intakeR = new T.Mesh(intakeGeo, blackMat);
        intakeR.position.set(0.35, wy + bh + 0.07, bl * 0.1);
        this.car.add(intakeR);

        const cabin = new T.Mesh(new T.BoxGeometry(bw * 0.75, 0.4, bl * 0.35), glassMat);
        cabin.position.set(0, wy + bh + 0.2, -0.1);
        this.car.add(cabin);
        const windshield = new T.Mesh(new T.PlaneGeometry(bw * 0.72, 0.5), glassMat);
        windshield.position.set(0, wy + bh + 0.35, bl * 0.12);

        [-0.55, 0.55].forEach((sx, i) => {
          const mirror = new T.Mesh(new T.BoxGeometry(0.15, 0.1, 0.08), bodyMat);
          mirror.position.set(sx * bw, wy + bh + 0.1, bl * 0.1);

        });
        [-0.5, 0.5].forEach((sx, i) => {

          hl.position.set(sx, wy + bh * 0.5, bl * 0.48);
          this.car.add(hl);
        });
        const spotL = new T.SpotLight(0xffffcc, 3, 50, 0.4, 0.5, 1);
        spotL.position.set(-0.5, wy + bh * 0.5, bl * 0.5);
        spotL.target.position.set(-0.5, 0, 15);
        this.car.add(spotL); this.car.add(spotL.target);
        const spotR = new T.SpotLight(0xffffcc, 3, 50, 0.4, 0.5, 1);
        spotR.position.set(0.5, wy + bh * 0.5, bl * 0.5);
        spotR.target.position.set(0.5, 0, 15);
        this.car.add(spotR); this.car.add(spotR.target);
        [-0.55, 0.55].forEach((sx, i) => {
          const tl = new T.Mesh(new T.BoxGeometry(0.4, 0.1, 0.06), redGlowMat);
          tl.position.set(sx, wy + bh * 0.55, -bl * 0.48);
          this.car.add(tl);
        });
        [-0.6, 0.6].forEach((sx) => {
          const ex = new T.Mesh(new T.CylinderGeometry(0.06, 0.06, 0.3, 8), chromeMat);
          ex.rotation.x = Math.PI / 2;
          ex.position.set(sx, wy + 0.15, -bl * 0.52);
          this.car.add(ex);
        });
        const wing = new T.Mesh(new T.BoxGeometry(1.8, 0.06, 0.35), blackMat);
        wing.position.set(0, wy + bh + 0.55, -bl * 0.38);
        this.car.add(wing);
        [-0.5, 0.5].forEach(sx => {
          const strut = new T.Mesh(new T.BoxGeometry(0.05, 0.35, 0.05), blackMat);
          strut.position.set(sx, wy + bh + 0.35, -bl * 0.38);
          this.car.add(strut);
        });
        this.createWheels(wr, 0.25, wy, bw * 0.55, bl * 0.35, chromeMat);

      } else if (idx === 1) {
        // ====== 卡车 ======
        const bw = 2.5, bh = 1.0, bl = 5.8;
        const wr = 0.5, wy = 0.5;
        const chassis = new T.Mesh(new T.BoxGeometry(bw, bh * 0.4, bl), bodyMat);
        chassis.position.set(0, wy + bh * 0.2, 0);
        chassis.castShadow = true;
        this.carBody = chassis;
        this.car.add(chassis);

        const cab = new T.Mesh(new T.BoxGeometry(bw * 0.85, bh * 0.7, bl * 0.45), bodyMat);
        cab.position.set(0, wy + bh * 0.75, bl * 0.22);
        cab.castShadow = true;
        this.car.add(cab);
        const ws = new T.Mesh(new T.PlaneGeometry(bw * 0.7, bh * 0.4), glassMat);
        ws.position.set(0, wy + bh * 0.9, bl * 0.45);
        ws.rotation.x = -0.1;
        this.car.add(ws);
        const bedMat = new T.MeshStandardMaterial({ color: 0x3d3d3d, roughness: 0.8 });
        const bed = new T.Mesh(new T.BoxGeometry(bw * 0.9, bh * 0.5, bl * 0.45), bedMat);
        bed.position.set(0, wy + bh * 0.45, -bl * 0.22);
        bed.castShadow = true;
        this.car.add(bed);
        const bullMat = new T.MeshStandardMaterial({ color: 0x555555, roughness: 0.4, metalness: 0.7 });
        const bull = new T.Mesh(new T.BoxGeometry(bw * 1.05, bh * 0.35, 0.15), bullMat);
        bull.position.set(0, wy + bh * 0.25, bl * 0.52);
        this.car.add(bull);
        const roofLightMat = new T.MeshStandardMaterial({ color: 0xffaa00, emissive: 0xffaa00, emissiveIntensity: 0.9 });
        [-0.4, 0, 0.4].forEach(lx => {
          const rl = new T.Mesh(new T.SphereGeometry(0.08, 8, 8), roofLightMat);
          rl.position.set(lx, wy + bh + 0.08, bl * 0.35);

        });
        [-0.7, 0.7].forEach((sx, i) => {
          const hl = new T.Mesh(new T.BoxGeometry(0.3, 0.18, 0.1), yellowGlowMat);
          hl.position.set(sx, wy + bh * 0.45, bl * 0.52);
          this.car.add(hl);
        });
        [-0.8, 0.8].forEach((sx, i) => {
          const tl = new T.Mesh(new T.BoxGeometry(0.25, 0.15, 0.08), redGlowMat);
          tl.position.set(sx, wy + bh * 0.45, -bl * 0.52);
          this.car.add(tl);
        });

        [-bl * 0.35, bl * 0.35].forEach(mz => {

          mudL.position.set(-bw * 0.55, wy + 0.2, mz);

          const mudR = new T.Mesh(new T.BoxGeometry(0.05, 0.25, 0.4), mudMat2);
          mudR.position.set(bw * 0.55, wy + 0.2, mz);
          this.car.add(mudR);
        });
        this.createWheels(wr, 0.35, wy, bw * 0.55, bl * 0.32, chromeMat);

      } else {
        // ====== 漂移车 ======
        const bw = 2.1, bh = 0.45, bl = 3.9;
        const wr = 0.33, wy = 0.3;
        const bodyGeo2 = new T.BoxGeometry(bw, bh, bl);
        this.carBody = new T.Mesh(bodyGeo2, bodyMat);
        this.carBody.position.set(0, wy + bh / 2, 0);
        this.carBody.castShadow = true;
        this.car.add(this.carBody);

        [-bl * 0.35, bl * 0.35].forEach(fz => {
          const flare = new T.Mesh(new T.BoxGeometry(0.15, 0.12, 0.6), bodyMat);
          flare.position.set(-bw * 0.52, wy + bh * 0.7, fz);
          this.car.add(flare);
          const flare2 = new T.Mesh(new T.BoxGeometry(0.15, 0.12, 0.6), bodyMat);
          flare2.position.set(bw * 0.52, wy + bh * 0.7, fz);
          this.car.add(flare2);
        });
        [-bw * 0.52, bw * 0.52].forEach(sx => {
          const skirt = new T.Mesh(new T.BoxGeometry(0.08, 0.1, bl * 0.6), blackMat);
          skirt.position.set(sx, wy + 0.1, 0);
          this.car.add(skirt);
        });
        const cabin2 = new T.Mesh(new T.BoxGeometry(bw * 0.7, bh * 0.7, bl * 0.45), glassMat);
        cabin2.position.set(0, wy + bh + bh * 0.35, -0.15);
        this.car.add(cabin2);
        const cageMat = new T.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3, metalness: 0.8 });
        [-0.35, 0.35].forEach(cx => {
          const bar = new T.Mesh(new T.CylinderGeometry(0.03, 0.03, 0.8, 6), cageMat);
          bar.position.set(cx, wy + bh + 0.4, -0.15);
          this.car.add(bar);
        });
        const cageCross = new T.Mesh(new T.CylinderGeometry(0.03, 0.03, 0.7, 6), cageMat);
        cageCross.rotation.z = Math.PI / 2;
        cageCross.position.set(0, wy + bh + 0.65, -0.15);
        this.car.add(cageCross);
        const scoop = new T.Mesh(new T.BoxGeometry(0.5, 0.08, 0.7), blackMat);
        scoop.position.set(0, wy + bh + 0.05, 0.8);
        this.car.add(scoop);
        [-0.55, 0.55].forEach((sx, i) => {
          const hl = new T.Mesh(new T.BoxGeometry(0.3, 0.1, 0.06), yellowGlowMat);
          hl.position.set(sx, wy + bh * 0.5, bl * 0.48);
          this.car.add(hl);
          const tl = new T.Mesh(new T.BoxGeometry(0.35, 0.08, 0.05), redGlowMat);
          tl.position.set(sx, wy + bh * 0.55, -bl * 0.48);
          this.car.add(tl);
        });
        const wing2 = new T.Mesh(new T.BoxGeometry(2.0, 0.06, 0.4), blackMat);
        wing2.position.set(0, wy + bh + 0.7, -bl * 0.38);
        this.car.add(wing2);
        [-0.6, 0.6].forEach(sx => {
          const strut2 = new T.Mesh(new T.BoxGeometry(0.06, 0.5, 0.06), blackMat);
          strut2.position.set(sx, wy + bh + 0.45, -bl * 0.38);
          this.car.add(strut2);
        });
        const diff = new T.Mesh(new T.BoxGeometry(bw * 0.7, 0.08, 0.3), blackMat);
        diff.position.set(0, wy + 0.05, -bl * 0.48);
        this.car.add(diff);
        this.createWheels(wr, 0.32, wy, bw * 0.55, bl * 0.35, chromeMat);
      }

      this.add(this.car);
    }

    createWheels(radius, width, y, sideOffset, frontBackOffset, rimMat) {
      const T = this.THREE;
      const tireMat = new T.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
      const rimGeo = new T.CylinderGeometry(radius * 0.6, radius * 0.6, width * 1.05, 12);
      const tireGeo = new T.CylinderGeometry(radius, radius, width, 20);
      const positions = [
        { x: -sideOffset, z: frontBackOffset },
        { x: sideOffset, z: frontBackOffset },
        { x: -sideOffset, z: -frontBackOffset },
        { x: sideOffset, z: -frontBackOffset },
      ];
      positions.forEach(pos => {
        const wg = new T.Group();
        const tire = new T.Mesh(tireGeo, tireMat);
        tire.rotation.z = Math.PI / 2;
        tire.castShadow = true;
        wg.add(tire);
        const rim = new T.Mesh(rimGeo, rimMat);
        rim.rotation.z = Math.PI / 2;
        wg.add(rim);
        const spokeGeo = new T.BoxGeometry(radius * 1.0, width * 1.1, 0.04);
        const spoke1 = new T.Mesh(spokeGeo, rimMat);
        spoke1.rotation.z = Math.PI / 2;
        wg.add(spoke1);
        const spoke2 = new T.Mesh(spokeGeo, rimMat);
        spoke2.rotation.z = Math.PI / 2;
        spoke2.rotation.x = Math.PI / 2;
        wg.add(spoke2);
        wg.position.set(pos.x, y, pos.z);
        this.car.add(wg);
        this.wheels.push(wg);
      });
    }

    switchCar() {
      const oldX = this.carState.x;
      const oldZ = this.carState.z;
      const oldRot = this.carState.rotation;
      this.currentCarIndex = (this.currentCarIndex + 1) % this.CAR_TYPES.length;
      const type = this.CAR_TYPES[this.currentCarIndex];
      const cs = this.carState;
      cs.speed = 0; cs.steerAngle = 0; cs.driftFactor = 0; cs.lateralVelocity = 0;
      cs.maxSpeed = type.maxSpeed; cs.accel = type.accel; cs.friction = type.friction;
      cs.maxSteer = type.maxSteer; cs.driftThreshold = type.driftThreshold;
      cs.grip = type.grip; cs.driftGrip = type.driftGrip;
      cs.boostMultiplier = type.boostMultiplier; cs.collisionCooldown = 0;
      this.createCar();
      cs.x = oldX; cs.z = oldZ; cs.rotation = oldRot;
      const infoEl = document.getElementById('car-info');
      infoEl.textContent = type.name;
      infoEl.classList.add('show');
      this.gameState.carInfoTimer = 2.0;
      this.initSpeedometer();
    }

    // ============================================
    // 创建锥桶
    // ============================================
    createCones() {
      const T = this.THREE;
      const coneGeo = new T.ConeGeometry(0.4, 1.0, 16);
      const coneMat = new T.MeshStandardMaterial({ color: 0xff6600, roughness: 0.7 });
      for (let i = 0; i < 10; i++) {
        const side = i % 2 === 0 ? -1 : 1;
        const x = side * 4;
        const z = 30 + i * 8;
        const cone = new T.Mesh(coneGeo, coneMat);
        const h = this.getTerrainHeight(x, z);
        cone.position.set(x, h + 0.5, z);
        cone.castShadow = true;
        cone.receiveShadow = true;
        this.add(cone);
        this.cones.push(cone);
        this.conePhysics.push({ vx: 0, vy: 0, vz: 0, rx: 0, rz: 0, angularVx: 0, angularVz: 0, grounded: true, active: true });
      }
      for (let i = 0; i < 12; i++) {
        const angle = (i / 12) * Math.PI * 2;
        const r = 30;
        const x = Math.cos(angle) * r;
        const z = Math.sin(angle) * r;
        const cone = new T.Mesh(coneGeo, coneMat);
        const h = this.getTerrainHeight(x, z);
        cone.position.set(x, h + 0.5, z);
        cone.castShadow = true;
        cone.receiveShadow = true;
        this.add(cone);
        this.cones.push(cone);
        this.conePhysics.push({ vx: 0, vy: 0, vz: 0, rx: 0, rz: 0, angularVx: 0, angularVz: 0, grounded: true, active: true });
      }
      for (let i = 0; i < 20; i++) {
        const x = (Math.random() - 0.5) * 200;
        const z = (Math.random() - 0.5) * 200;
        if (Math.abs(x) < 10 && Math.abs(z) < 10) continue;
        const cone = new T.Mesh(coneGeo, coneMat);
        const h = this.getTerrainHeight(x, z);
        cone.position.set(x, h + 0.5, z);
        cone.castShadow = true;
        cone.receiveShadow = true;
        this.add(cone);
        this.cones.push(cone);
        this.conePhysics.push({ vx: 0, vy: 0, vz: 0, rx: 0, rz: 0, angularVx: 0, angularVz: 0, grounded: true, active: true });
      }
    }

    // ============================================
    // 创建障碍物
    // ============================================
    createObstacles() {
      const T = this.THREE;
      const barrierGeo = new T.BoxGeometry(6, 0.8, 0.4);
      const barrierMat = new T.MeshStandardMaterial({ color: 0xff4400, roughness: 0.6 });
      const barrierPositions = [
        { x: 0, z: -40, ry: 0 },
        { x: 20, z: -20, ry: Math.PI / 4 },
        { x: -25, z: 10, ry: -Math.PI / 6 },
        { x: 40, z: 40, ry: Math.PI / 3 },
        { x: -40, z: -50, ry: 0 },
      ];
      barrierPositions.forEach(pos => {
        const barrier = new T.Mesh(barrierGeo, barrierMat);
        const h = this.getTerrainHeight(pos.x, pos.z);
        barrier.position.set(pos.x, h + 0.4, pos.z);
        barrier.rotation.y = pos.ry;
        barrier.castShadow = true;
        barrier.receiveShadow = true;
        this.add(barrier);
        this.obstacles.push({ mesh: barrier, type: 'barrier', halfW: 3, halfL: 0.2, radius: 3.2 });
        this.obstaclePhysics.push({ vx: 0, vy: 0, vz: 0, rx: 0, rz: 0, avx: 0, avz: 0, grounded: true, immovable: true });
      });
    }

    // ============================================
    // Skid marks / 粒子
    // ============================================
    createSkidMark(x, z, rotation, width) {
      const T = this.THREE;
      if (this.skidMarks.length >= this.SKID_MAX) {
        const old = this.skidMarks.shift();
        this.remove(old);
        old.geometry.dispose();
        old.material.dispose();
      }
      const geo = new T.PlaneGeometry(width, 1.2);
      const mat = new T.MeshBasicMaterial({ color: 0x111111, transparent: true, opacity: 0.5, depthWrite: false });
      const mark = new T.Mesh(geo, mat);
      mark.rotation.x = -Math.PI / 2;
      mark.rotation.z = rotation;
      const h = this.getTerrainHeight(x, z);
      mark.position.set(x, h + 0.08, z);
      this.add(mark);
      this.skidMarks.push(mark);
      mark.userData.life = 1.0;
      mark.userData.fadeRate = 0.002 + Math.random() * 0.003;
    }

    createParticle(x, y, z, vx, vy, vz, size, color, life) {
      const T = this.THREE;
      if (this.particles.length >= this.PARTICLE_MAX) {
        const old = this.particles.shift();
        this.remove(old);
        old.geometry.dispose();
        old.material.dispose();
      }
      const geo = new T.PlaneGeometry(size, size);
      const mat = new T.MeshBasicMaterial({ color, transparent: true, opacity: 0.6, depthWrite: false, side: T.DoubleSide });
      const p = new T.Mesh(geo, mat);
      p.position.set(x, y, z);
      p.lookAt(this.camera3D.camera.position);
      this.add(p);
      p.userData = { vx, vy, vz, life: life || 1.0, maxLife: life || 1.0, rotSpeed: (Math.random() - 0.5) * 4 };
      this.particles.push(p);
    }

    spawnDriftParticles(x, z, rotation, intensity) {
      const count = Math.floor(intensity * 3) + 1;
      for (let i = 0; i < count; i++) {
        const offsetAngle = rotation + Math.PI + (Math.random() - 0.5) * 0.8;
        const speed = 2 + Math.random() * 4;
        const vx = Math.sin(offsetAngle) * speed;
        const vz = Math.cos(offsetAngle) * speed;
        const size = 0.3 + Math.random() * 0.8;
        const gray = 0.6 + Math.random() * 0.3;
        const color = new this.THREE.Color(gray, gray, gray);
        const h = this.getTerrainHeight(x, z);
        this.createParticle(
          x + (Math.random() - 0.5) * 1.5, h + 0.2 + Math.random() * 0.5, z + (Math.random() - 0.5) * 1.5,
          vx, 1 + Math.random() * 2, vz, size, color, 0.8 + Math.random() * 0.5
        );
      }
    }

    spawnBoostParticles(x, z, rotation) {
      const T = this.THREE;
      const h = this.getTerrainHeight(x, z);
      for (let i = 0; i < 2; i++) {
        const offsetAngle = rotation + Math.PI + (Math.random() - 0.5) * 0.3;
        const vx = Math.sin(offsetAngle) * (3 + Math.random() * 3);
        const vz = Math.cos(offsetAngle) * (3 + Math.random() * 3);
        const size = 0.2 + Math.random() * 0.4;
        const color2 = new T.Color(0.2, 0.8, 1.0);
        this.createParticle(
          x + (Math.random() - 0.5), h + 0.3, z + (Math.random() - 0.5),
          vx, 0.5, vz, size, color2, 0.4
        );
      }
    }

    // ============================================
    // 输入处理 (使用 QGE.InputManager)
    // ============================================
    setupInput() {
      // 使用 QGE.Core.input (InputManager) 处理按键
      // isKeyDown 用于持续按键，isKeyPressed 用于单次触发
      const T = this.THREE;

      // 鼠标控制环绕视角
      let mouseDown = false;
      const canvas = this.engine.canvas;
      canvas.addEventListener('mousedown', () => { mouseDown = true; });
      canvas.addEventListener('mouseup', () => { mouseDown = false; });
      const self = this;
      canvas.addEventListener('mousemove', (e) => {
        if (self.cameraMode === 2 && mouseDown) {
          self.orbitAngle -= e.movementX * 0.01;
          self.orbitDistance = Math.max(5, Math.min(30, self.orbitDistance - e.movementY * 0.05));
        }
      });
      canvas.addEventListener('wheel', (e) => {
        if (self.cameraMode === 2) {
          self.orbitDistance = Math.max(5, Math.min(30, self.orbitDistance + e.deltaY * 0.01));
        }
      });

      // 窗口 resize
      window.addEventListener('resize', () => {
        if (self.camera3D) {
          self.camera3D.resize(window.innerWidth, window.innerHeight);
          self.renderer3D.setSize(window.innerWidth, window.innerHeight);
        }
      });
    }

    // 单次按键检测 (在 update 中调用)
    checkKeyPresses() {
      const input = this.engine.input;
      if (input.isKeyPressed('KeyC')) this.cycleCamera();
      if (input.isKeyPressed('KeyV')) this.switchCar();
      if (input.isKeyPressed('Backquote') || input.isKeyPressed('IntlBackslash')) this.toggleDebug();
    }

    cycleCamera() {
      this.cameraMode = (this.cameraMode + 1) % 3;
      const names = ['跟随视角', '车头视角', '环绕视角'];
      const hint = document.getElementById('camera-hint');
      hint.textContent = names[this.cameraMode];
      hint.classList.add('show');
      this.gameState.cameraHintTimer = 2.0;
    }

    toggleDebug() {
      this.gameState.debugVisible = !this.gameState.debugVisible;
      document.getElementById('debug-panel').classList.toggle('active', this.gameState.debugVisible);
    }

    // ============================================
    // update - 每帧更新 (QGE.Scene3D 覆盖)
    // ============================================
    update(dt) {
      if (!this._ready || !this._started) return;

      // 调用父类更新
      super.update(dt);

      // FPS 计算
      this.gameState.frameCount++;
      if (performance.now() - this.gameState.lastFpsTime >= 1000) {
        this.gameState.fps = this.gameState.frameCount;
        this.gameState.frameCount = 0;
        this.gameState.lastFpsTime = performance.now();
      }

      // 检测按键（单次触发）
      this.checkKeyPresses();

      // 游戏更新
      this.updatePhysics(dt);
      this.updateParticles(dt);
      this.updateSkidMarks(dt);
      this.updateCamera(dt);
      this.updateUI(dt);
    }

    // ============================================
    // render - 每帧渲染 (QGE.Scene3D 覆盖)
    // ============================================
    render(ctx) {
      if (!this._ready) return;
      // Scene3D.render 会调用 renderer3D.render(threeScene, camera3D.camera)
      super.render(ctx);
    }

    // ============================================
    // 物理更新
    // ============================================
    updatePhysics(dt) {
      const cs = this.carState;
      const input = this.engine.input;

      // 碰撞冷却
      if (cs.collisionCooldown > 0) cs.collisionCooldown -= dt;

      // 转向输入
      let steerInput = 0;
      if (input.isKeyDown('KeyA') || input.isKeyDown('ArrowLeft')) steerInput -= 1;
      if (input.isKeyDown('KeyD') || input.isKeyDown('ArrowRight')) steerInput += 1;

      // 加速/刹车
      const boost = input.isKeyDown('ShiftLeft') || input.isKeyDown('ShiftRight');
      const boostMult = boost ? cs.boostMultiplier : 1.0;
      if (input.isKeyDown('KeyW') || input.isKeyDown('ArrowUp')) {
        cs.speed += cs.accel * boostMult * dt;
      }
      if (input.isKeyDown('KeyS') || input.isKeyDown('ArrowDown')) {
        cs.speed -= cs.brakeForce * dt;
      }

      cs.speed *= (1 - cs.friction * dt);
      const maxSpd = cs.maxSpeed * boostMult;
      cs.speed = Math.max(-maxSpd * 0.3, Math.min(maxSpd, cs.speed));

      // 转向
      const speedFactor = Math.abs(cs.speed) / cs.maxSpeed;
      const steerResponse = cs.maxSteer * (1 - speedFactor * 0.5);
      const targetSteer = steerInput * steerResponse;
      cs.steerAngle += (targetSteer - cs.steerAngle) * Math.min(1, 8 * dt);

      // 漂移
      const handbrake = input.isKeyDown('Space');
      const isDrifting = handbrake || (Math.abs(cs.speed) > cs.driftThreshold && Math.abs(cs.steerAngle) > 0.25 && speedFactor > 0.3);
      if (isDrifting) {
        cs.driftFactor = Math.min(cs.driftFactor + dt * 2, 1);
      } else {
        cs.driftFactor = Math.max(cs.driftFactor - dt * 3, 0);
      }

      const T = this.THREE;
      const currentGrip = T.MathUtils.lerp(cs.grip, cs.driftGrip, cs.driftFactor);
      const targetLateral = cs.driftFactor * cs.speed * Math.sin(cs.steerAngle) * 0.5;
      cs.lateralVelocity += (targetLateral - cs.lateralVelocity) * (1 - currentGrip) * dt * 5;
      cs.lateralVelocity *= (1 - 0.5 * dt);

      const turnRate = -cs.steerAngle * cs.speed * dt * 0.15;
      cs.rotation += turnRate;

      const forwardAngle = cs.rotation;
      const driftAngle = cs.driftFactor * cs.steerAngle * 0.8;
      const moveAngle = forwardAngle + driftAngle;
      const vx = Math.sin(moveAngle) * cs.speed + Math.cos(forwardAngle) * cs.lateralVelocity;
      const vz = Math.cos(moveAngle) * cs.speed - Math.sin(forwardAngle) * cs.lateralVelocity;
      cs.x += vx * dt;
      cs.z += vz * dt;

      const bound = this.WORLD_SIZE / 2 - 2;
      if (cs.x < -bound) { cs.x = -bound; cs.speed *= 0.5; }
      if (cs.x > bound) { cs.x = bound; cs.speed *= 0.5; }
      if (cs.z < -bound) { cs.z = -bound; cs.speed *= 0.5; }
      if (cs.z > bound) { cs.z = bound; cs.speed *= 0.5; }

      const carH = this.getTerrainHeight(cs.x, cs.z);
      const lookAheadDist = 2.0;
      const hForward = this.getTerrainHeight(cs.x + Math.sin(cs.rotation) * lookAheadDist, cs.z + Math.cos(cs.rotation) * lookAheadDist);
      const hRight = this.getTerrainHeight(cs.x + Math.cos(cs.rotation) * lookAheadDist, cs.z - Math.sin(cs.rotation) * lookAheadDist);
      const hLeft = this.getTerrainHeight(cs.x - Math.cos(cs.rotation) * lookAheadDist, cs.z + Math.sin(cs.rotation) * lookAheadDist);
      const pitch = Math.atan2(hForward - carH, lookAheadDist);
      const roll = Math.atan2(hRight - hLeft, lookAheadDist * 2);

      this.car.position.set(cs.x, carH, cs.z);
      this.car.rotation.y = cs.rotation;
      this.car.rotation.z = -cs.driftFactor * cs.steerAngle * 0.3 + roll;
      this.car.rotation.x = cs.driftFactor * 0.1 + pitch;

      // 前轮转向
      this.wheels[0].rotation.y = cs.steerAngle * 1.5;
      this.wheels[1].rotation.y = cs.steerAngle * 1.5;
      const wheelRoll = cs.speed * dt * 3;
      this.wheels.forEach(wg => {
        wg.children.forEach(child => {
          child.rotation.x += wheelRoll;
        });
      });

      // 漂移效果
      if (cs.driftFactor > 0.3 && Math.abs(cs.speed) > 5) {
        const now = performance.now();
        if (now - this.gameState.lastSkidTime > 50) {
          const rearOffset = 1.3 * this.CAR_TYPES[this.currentCarIndex].scale.z;
          const sideOffset = 0.9 * this.CAR_TYPES[this.currentCarIndex].scale.x;
          const sin = Math.sin(cs.rotation);
          const cos = Math.cos(cs.rotation);
          this.createSkidMark(cs.x + (-sideOffset * cos - rearOffset * sin), cs.z + (-sideOffset * sin + rearOffset * cos), cs.rotation, 0.3);
          this.createSkidMark(cs.x + (sideOffset * cos - rearOffset * sin), cs.z + (sideOffset * sin + rearOffset * cos), cs.rotation, 0.3);
          this.gameState.lastSkidTime = now;
        }
        this.spawnDriftParticles(cs.x, cs.z, cs.rotation, cs.driftFactor);

        if (!this.gameState.isDrifting) {
          this.gameState.isDrifting = true;
          this.gameState.driftTimer = 0;
          this.gameState.currentDriftScore = 0;
        }
        this.gameState.driftTimer += dt;
        const speedBonus = Math.abs(cs.speed) * 0.5;
        const driftBonus = cs.driftFactor * 20;
        this.gameState.currentDriftScore += (speedBonus + driftBonus) * dt;
        if (this.gameState.driftTimer > 2) this.gameState.driftCombo = 2;
        if (this.gameState.driftTimer > 5) this.gameState.driftCombo = 3;
        if (this.gameState.driftTimer > 10) this.gameState.driftCombo = 5;
      } else {
        if (this.gameState.isDrifting) {
          this.gameState.totalDriftScore += Math.floor(this.gameState.currentDriftScore * this.gameState.driftCombo);
          this.gameState.isDrifting = false;
          this.gameState.driftTimer = 0;
          this.gameState.driftCombo = 1;
          this.gameState.currentDriftScore = 0;
        }
      }

      // 氮气粒子
      if (boost && Math.abs(cs.speed) > 5) {
        this.spawnBoostParticles(cs.x, cs.z, cs.rotation);
      }

      // 碰撞检测: 障碍物
      for (let i = 0; i < this.obstacles.length; i++) {
        const obs = this.obstacles[i];
        const op = this.obstaclePhysics[i];
        const mesh = obs.mesh;
        let hit = false, pushForce = 0, worldNx = 0, worldNz = 0;
        if (obs.type === 'barrel') {
          const dx = mesh.position.x - cs.x;
          const dz = mesh.position.z - cs.z;
          const dist = Math.sqrt(dx * dx + dz * dz);
          const minDist = this.COLLISION.carHalfL + obs.radius;
          if (dist < minDist && dist > 0.01) {
            hit = true; pushForce = Math.abs(cs.speed) * 0.9 + 4;
            worldNx = dx / dist; worldNz = dz / dist;
          }
        } else if (obs.type === 'barrier') {
          const dx = mesh.position.x - cs.x;
          const dz = mesh.position.z - cs.z;
          const dist = Math.sqrt(dx * dx + dz * dz);
          const minDist = this.COLLISION.carHalfL + obs.radius;
          if (dist < minDist && dist > 0.01) {
            hit = true; pushForce = Math.abs(cs.speed) * 0.6 + 2;
            worldNx = dx / dist; worldNz = dz / dist;
          }
        }
        if (hit) {
          if (op.immovable || op.immovable === undefined) {
            if (!cs.collisionCooldown || cs.collisionCooldown <= 0) {
              cs.speed *= -0.3;
              cs.x -= worldNx * 1.0;
              cs.z -= worldNz * 1.0;
              cs.collisionCooldown = 0.3;
            }
          } else {
            op.vx = worldNx * pushForce + cs.speed * Math.sin(cs.rotation) * 0.4;
            op.vz = worldNz * pushForce + cs.speed * Math.cos(cs.rotation) * 0.4;
            op.vy = pushForce * 0.5 + 3;
            op.grounded = false;
            op.avx = (Math.random() - 0.5) * 8;
            op.avz = (Math.random() - 0.5) * 8;
            cs.speed *= 0.75;
          }
          const pColor = obs.type === 'barrel' ? 0x6699cc : 0xff6600;
          for (let j = 0; j < 4; j++) {
            this.createParticle(mesh.position.x, mesh.position.y, mesh.position.z,
              (Math.random() - 0.5) * 6, Math.random() * 4, (Math.random() - 0.5) * 6, 0.2, pColor, 0.5);
          }
        }
      }

      // 障碍物物理
      for (let i = 0; i < this.obstacles.length; i++) {
        const obs = this.obstacles[i];
        const op = this.obstaclePhysics[i];
        if (op.immovable || op.grounded) continue;
        op.vy += -15 * dt;
        op.vx *= (1 - 0.5 * dt);
        op.vz *= (1 - 0.5 * dt);
        obs.mesh.position.x += op.vx * dt;
        obs.mesh.position.y += op.vy * dt;
        obs.mesh.position.z += op.vz * dt;
        op.rx += op.avx * dt;
        op.rz += op.avz * dt;
        obs.mesh.rotation.x = op.rx;
        obs.mesh.rotation.z = op.rz;
        const restY = obs.type === 'barrel' ? 0.6 : 0.4;
        const terrainY = this.getTerrainHeight(obs.mesh.position.x, obs.mesh.position.z);
        if (obs.mesh.position.y <= terrainY + restY) {
          obs.mesh.position.y = terrainY + restY;
          op.vy = -op.vy * 0.25; op.vx *= 0.6; op.vz *= 0.6;
          op.avx *= 0.6; op.avz *= 0.6;
          if (Math.abs(op.vy) < 0.5) { op.vy = 0; op.grounded = true; obs.mesh.rotation.x *= 0.5; obs.mesh.rotation.z *= 0.5; }
        }
        const b = this.WORLD_SIZE / 2;
        if (Math.abs(obs.mesh.position.x) > b || Math.abs(obs.mesh.position.z) > b) {
          op.grounded = true; op.vx = 0; op.vy = 0; op.vz = 0;
        }
      }

      // 碰撞检测: 锥桶
      if (!cs.collisionCooldown || cs.collisionCooldown <= 0) {
        for (let i = 0; i < this.cones.length; i++) {
          const cone = this.cones[i];
          const cp = this.conePhysics[i];
          if (!cp.active) continue;
          const result = this.COLLISION.checkCarCone(cs, cone.position);
          if (result.hit) {
            const impactSpeed = Math.abs(cs.speed);
            const pushForce2 = impactSpeed * 0.8 + 3;
            const cos = Math.cos(cs.rotation);
            const sin = Math.sin(cs.rotation);
            const wNx = result.nx * cos - result.nz * sin;
            const wNz = result.nx * sin + result.nz * cos;
            cp.vx = wNx * pushForce2 + cs.speed * sin * 0.3;
            cp.vz = wNz * pushForce2 + cs.speed * cos * 0.3;
            cp.vy = pushForce2 * 0.4 + 2;
            cp.grounded = false;
            cp.angularVx = (Math.random() - 0.5) * 10;
            cp.angularVz = (Math.random() - 0.5) * 10;
            cs.speed *= 0.7;
            cs.x -= wNx * 0.8;
            cs.z -= wNz * 0.8;
            cs.collisionCooldown = 0.15;
            for (let j = 0; j < 5; j++) {
              this.createParticle(cone.position.x, cone.position.y, cone.position.z,
                (Math.random() - 0.5) * 5, Math.random() * 3, (Math.random() - 0.5) * 5, 0.15, 0xff8800, 0.6);
            }
          }
        }
      }

      // 锥桶物理
      for (let i = 0; i < this.cones.length; i++) {
        const cone = this.cones[i];
        const cp = this.conePhysics[i];
        if (cp.active && !cp.grounded) {
          cp.vy += -15 * dt;
          cp.vx *= (1 - 0.5 * dt);
          cp.vz *= (1 - 0.5 * dt);
          cone.position.x += cp.vx * dt;
          cone.position.y += cp.vy * dt;
          cone.position.z += cp.vz * dt;
          cp.rx += cp.angularVx * dt;
          cp.rz += cp.angularVz * dt;
          cone.rotation.x = cp.rx;
          cone.rotation.z = cp.rz;
          const terrainY2 = this.getTerrainHeight(cone.position.x, cone.position.z);
          const groundY = terrainY2 + 0.5;
          if (cone.position.y <= groundY) {
            cone.position.y = groundY;
            cp.vy = -cp.vy * 0.3; cp.vx *= 0.7; cp.vz *= 0.7; cp.angularVx *= 0.7; cp.angularVz *= 0.7;
            if (Math.abs(cp.vy) < 0.5) { cp.vy = 0; cp.grounded = true; cone.rotation.x *= 0.5; cone.rotation.z *= 0.5; }
          }
          const b2 = this.WORLD_SIZE / 2;
          if (Math.abs(cone.position.x) > b2 || Math.abs(cone.position.z) > b2) {
            const resetY = this.getTerrainHeight(cone.position.x, cone.position.z);
            cone.position.y = resetY + 0.5;
            cp.vx = 0; cp.vy = 0; cp.vz = 0; cp.grounded = true;
            cone.rotation.x = 0; cone.rotation.z = 0;
          }
        }
      }
    }

    // ============================================
    // 更新粒子
    // ============================================
    updateParticles(dt) {
      for (let i = this.particles.length - 1; i >= 0; i--) {
        const p = this.particles[i];
        p.userData.life -= dt;
        if (p.userData.life <= 0) {
          this.remove(p);
          p.geometry.dispose();
          p.material.dispose();
          this.particles.splice(i, 1);
          continue;
        }
        const t = p.userData.life / p.userData.maxLife;
        p.material.opacity = t * 0.5;
        p.position.x += p.userData.vx * dt;
        p.position.y += p.userData.vy * dt;
        p.position.z += p.userData.vz * dt;
        p.userData.vy += 1.0 * dt;
        p.scale.setScalar(1 + (1 - t) * 2);
        p.rotation.z += p.userData.rotSpeed * dt;
        p.lookAt(this.camera3D.camera.position);
      }
    }

    // ============================================
    // 更新 skid marks
    // ============================================
    updateSkidMarks(dt) {
      for (let i = this.skidMarks.length - 1; i >= 0; i--) {
        const mark = this.skidMarks[i];
        mark.userData.life -= mark.userData.fadeRate;
        if (mark.userData.life <= 0) {
          this.remove(mark);
          mark.geometry.dispose();
          mark.material.dispose();
          this.skidMarks.splice(i, 1);
        } else {
          mark.material.opacity = mark.userData.life * 0.5;
        }
      }
    }

    // ============================================
    // 更新相机
    // ============================================
    updateCamera(dt) {
      const cs = this.carState;
      const sin = Math.sin(cs.rotation);
      const cos = Math.cos(cs.rotation);
      const carH = this.getTerrainHeight(cs.x, cs.z);
      const T = this.THREE;

      let targetPos, lookAt;
      if (this.cameraMode === 0) {
        const dist = 8 + Math.abs(cs.speed) * 0.15;
        const height = 4 + Math.abs(cs.speed) * 0.05;
        targetPos = new T.Vector3(cs.x - sin * dist, carH + height, cs.z - cos * dist);
        lookAt = new T.Vector3(cs.x, carH + 1, cs.z);
      } else if (this.cameraMode === 1) {
        const hoodDist = 1.5;
        const hoodHeight = 1.2;
        targetPos = new T.Vector3(cs.x + sin * hoodDist, carH + hoodHeight, cs.z + cos * hoodDist);
        lookAt = new T.Vector3(cs.x + sin * 10, carH + 1, cs.z + cos * 10);
      } else {
        targetPos = new T.Vector3(cs.x + Math.sin(this.orbitAngle) * this.orbitDistance, carH + 6, cs.z + Math.cos(this.orbitAngle) * this.orbitDistance);
        lookAt = new T.Vector3(cs.x, carH + 1, cs.z);
      }

      const lerpFactor = Math.min(1, (this.cameraMode === 1 ? 12 : 4) * dt);
      this.camera3D.camera.position.lerp(targetPos, lerpFactor);
      this.camera3D.camera.lookAt(lookAt);
    }

    // ============================================
    // 更新 UI
    // ============================================
    updateUI(dt) {
      const cs = this.carState;
      const gs = this.gameState;

      const kmh = Math.abs(Math.round(cs.speed * 3.6));
      document.getElementById('speedText').textContent = kmh;
      const maxKmh = Math.round(cs.maxSpeed * 3.6 * 1.5);
      const needleAngle = -135 + (kmh / maxKmh) * 270;
      document.getElementById('speedNeedle').setAttribute('transform', `rotate(${needleAngle} 80 80)`);
      const arcLength = 330;
      const dash = Math.min(arcLength, (kmh / maxKmh) * arcLength);
      const arc = document.getElementById('speedArc');
      arc.setAttribute('stroke-dasharray', `${dash} ${arcLength}`);
      if (kmh > 120) arc.setAttribute('stroke', '#ef4444');
      else if (kmh > 80) arc.setAttribute('stroke', '#f59e0b');
      else arc.setAttribute('stroke', '#22c55e');

      const elapsed = (performance.now() - gs.startTime) / 1000;
      const mins = Math.floor(elapsed / 60).toString().padStart(2, '0');
      const secs = Math.floor(elapsed % 60).toString().padStart(2, '0');
      const ms = Math.floor((elapsed % 1) * 100).toString().padStart(2, '0');
      document.getElementById('timer').textContent = `${mins}:${secs}.${ms}`;

      const driftEl = document.getElementById('drift-score');
      if (gs.isDrifting || gs.currentDriftScore > 0) {
        driftEl.classList.add('active');
        document.getElementById('driftMain').textContent = Math.floor(gs.currentDriftScore * gs.driftCombo);
        document.getElementById('driftCombo').textContent = gs.driftCombo > 1 ? `x${gs.driftCombo} 连击!` : '';
      } else {
        driftEl.classList.remove('active');
      }

      if (gs.cameraHintTimer > 0) {
        gs.cameraHintTimer -= dt;
        if (gs.cameraHintTimer <= 0) document.getElementById('camera-hint').classList.remove('show');
      }
      if (gs.carInfoTimer > 0) {
        gs.carInfoTimer -= dt;
        if (gs.carInfoTimer <= 0) document.getElementById('car-info').classList.remove('show');
      }

      if (gs.debugVisible) {
        document.getElementById('dbg-speed').textContent = cs.speed.toFixed(2);
        document.getElementById('dbg-steer').textContent = cs.steerAngle.toFixed(3);
        document.getElementById('dbg-drift').textContent = cs.driftFactor.toFixed(3);
        document.getElementById('dbg-lat').textContent = cs.lateralVelocity.toFixed(2);
        document.getElementById('dbg-x').textContent = cs.x.toFixed(1);
        document.getElementById('dbg-z').textContent = cs.z.toFixed(1);
        document.getElementById('dbg-rot').textContent = ((cs.rotation * 180 / Math.PI) % 360).toFixed(1);
        const camNames = ['跟随', '车头', '环绕'];
        document.getElementById('dbg-cam').textContent = camNames[this.cameraMode];
        document.getElementById('dbg-car').textContent = this.CAR_TYPES[this.currentCarIndex].name;
        document.getElementById('dbg-fps').textContent = gs.fps;
      }

      this.updateMinimap();
    }

    // ============================================
    // 迷你地图
    // ============================================
    updateMinimap() {
      const canvas = document.getElementById('minimapCanvas');
      const ctx = canvas.getContext('2d');
      const w = canvas.width, h = canvas.height;
      ctx.fillStyle = '#111827';
      ctx.fillRect(0, 0, w, h);
      const scale = w / this.WORLD_SIZE;
      const cx = w / 2, cy = h / 2;
      ctx.fillStyle = '#ff6600';
      this.cones.forEach(cone => {
        ctx.beginPath();
        ctx.arc(cx + cone.position.x * scale, cy + cone.position.z * scale, 2, 0, Math.PI * 2);
        ctx.fill();
      });
      const carX = cx + this.carState.x * scale;
      const carY = cy + this.carState.z * scale;
      ctx.save();
      ctx.translate(carX, carY);
      ctx.rotate(-this.carState.rotation);
      const T = this.THREE;
      const carColor = '#' + new T.Color(this.CAR_TYPES[this.currentCarIndex].color).getHexString();
      ctx.fillStyle = carColor;
      ctx.fillRect(-4, -8, 8, 16);
      ctx.fillStyle = '#ffffaa';
      ctx.fillRect(-3, 6, 2, 4);
      ctx.fillRect(1, 6, 2, 4);
      ctx.restore();
      ctx.strokeStyle = '#374151';
      ctx.strokeRect(cx - this.WORLD_SIZE / 2 * scale, cy - this.WORLD_SIZE / 2 * scale, this.WORLD_SIZE * scale, this.WORLD_SIZE * scale);
    }

    // ============================================
    // 速度表刻度
    // ============================================
    initSpeedometer() {
      const container = document.getElementById('speedTicks');
      container.innerHTML = '';
      const maxKmh = Math.round(this.carState.maxSpeed * 3.6 * 1.5);
      for (let i = 0; i <= 10; i++) {
        const angle = -135 + (i / 10) * 270;
        const rad = (angle - 90) * Math.PI / 180;
        const r1 = 58, r2 = 66;
        const x1 = 80 + Math.cos(rad) * r1;
        const y1 = 80 + Math.sin(rad) * r1;
        const x2 = 80 + Math.cos(rad) * r2;
        const y2 = 80 + Math.sin(rad) * r2;
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', x1); line.setAttribute('y1', y1);
        line.setAttribute('x2', x2); line.setAttribute('y2', y2);
        line.setAttribute('stroke', '#6b7280'); line.setAttribute('stroke-width', '2');
        container.appendChild(line);
        const val = Math.round((i / 10) * maxKmh);
        const tx = 80 + Math.cos(rad) * (r2 + 10);
        const ty = 80 + Math.sin(rad) * (r2 + 10);
        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', tx); text.setAttribute('y', ty + 3);
        text.setAttribute('text-anchor', 'middle'); text.setAttribute('fill', '#9ca3af');
        text.setAttribute('font-size', '9'); text.textContent = val;
        container.appendChild(text);
      }
    }
  }

  // ============================================
  // 引擎初始化
  // ============================================
  const engine = new QGE.Core(document.getElementById('game-canvas'), {
    width: window.innerWidth,
    height: window.innerHeight,
    renderer: 'webgl',
    autoResize: false,
    pixelRatio: 1,
  });

  engine.scenes.register('game', DriftScene3D);
  engine.scenes.switch('game');
  engine.start();

  // 启动按钮
  document.getElementById('startBtn').addEventListener('click', () => {
    const scene = engine.scenes.current();
    if (scene && scene._ready && !scene._started) {
      scene.startGame();
    }
  });
  </script>

  <!-- ============================================

  <style>
    /* 触屏控制 - 仅在触摸设备显示 */
    #touch-controls {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 20;
      pointer-events: none;
      display: none;
    }
    @media (hover: none) and (pointer: coarse) {
      #touch-controls { display: block; }
      #controls-hint { display: none; }
    }
    #touch-zone-left {
      position: absolute;
      bottom: 30px; left: 30px;
      width: 130px; height: 130px;
      pointer-events: auto;
    }
    #touch-joystick {
      width: 130px; height: 130px;
      border-radius: 50%;
      background: rgba(34, 197, 94, 0.12);
      border: 2px solid rgba(34, 197, 94, 0.3);
      position: relative;
      touch-action: none;
    }
    #touch-joystick-knob {
      position: absolute;
      top: 50%; left: 50%;
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(34, 197, 94, 0.5);
      border: 2px solid rgba(34, 197, 94, 0.7);
      transform: translate(-50%, -50%);
      transition: none;
    }
    .touch-label {
      text-align: center;
      color: rgba(255,255,255,0.4);
      font-size: 11px;
      margin-top: 4px;
      letter-spacing: 2px;
    }
    #touch-zone-right {
      position: absolute;
      bottom: 30px; right: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      pointer-events: auto;
    }
    .touch-btn {
      width: 64px; height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    .touch-btn:active, .touch-btn.active { transform: scale(0.92); }
    .touch-btn-accel { background: rgba(34, 197, 94, 0.3); border: 2px solid rgba(34, 197, 94, 0.6); }
    .touch-btn-accel:active, .touch-btn-accel.active { background: rgba(34, 197, 94, 0.6); }
    .touch-btn-brake { background: rgba(239, 68, 68, 0.3); border: 2px solid rgba(239, 68, 68, 0.6); }
    .touch-btn-brake:active, .touch-btn-brake.active { background: rgba(239, 68, 68, 0.6); }
    .touch-btn-boost { background: rgba(59, 130, 246, 0.3); border: 2px solid rgba(59, 130, 246, 0.6); }
    .touch-btn-boost:active, .touch-btn-boost.active { background: rgba(59, 130, 246, 0.6); }
    .touch-btn-handbrake {
      background: rgba(249, 115, 22, 0.3);

    @media (max-width: 480px) {

  <script>
    // 触屏控制逻辑 - 直接触发键盘事件，与键鼠操作完全一致
    (function() {
      'use strict';
      function dispatchKey(type, code) {
        var ev = new KeyboardEvent(type, { code: code, key: code, bubbles: true, cancelable: true });
        document.dispatchEvent(ev);
      }
      function bindKeyBtn(id, downCode, upCode) {
        var el = document.getElementById(id);
        if (!el) return;
        el.addEventListener('touchstart', function(e) { e.preventDefault(); dispatchKey('keydown', downCode); el.classList.add('active'); });
        el.addEventListener('touchend', function(e) { e.preventDefault(); dispatchKey('keyup', upCode || downCode); el.classList.remove('active'); });
        el.addEventListener('touchcancel', function() { dispatchKey('keyup', upCode || downCode); el.classList.remove('active'); });
      }
      bindKeyBtn('touch-btn-accelerate', 'KeyW');
      bindKeyBtn('touch-btn-brake', 'KeyS');
      bindKeyBtn('touch-btn-boost', 'ShiftLeft');
      bindKeyBtn('touch-btn-handbrake', 'Space');
      bindKeyBtn('touch-btn-switch-car', 'KeyV');
      bindKeyBtn('touch-btn-camera', 'KeyC');

      var joystick = document.getElementById('touch-joystick');
      var knob = document.getElementById('touch-joystick-knob');
      var joyX = 0;
      var joyTouchId = null;
      var joyLeftActive = false;
      var joyRightActive = false;
      function getJoystickCenter() {
        var rect = joystick.getBoundingClientRect();
        return { cx: rect.left + rect.width / 2, cy: rect.top + rect.height / 2, r: rect.width / 2 - 22 };
      }
      function updateJoystick(touchX, touchY) {
        var c = getJoystickCenter();
        var dx = touchX - c.cx;
        var dy = touchY - c.cy;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > c.r) { dx = dx / dist * c.r; dy = dy / dist * c.r; }
        joyX = dx / c.r;
        knob.style.transform = 'translate(' + (dx - 22) + 'px, ' + (dy - 22) + 'px)';
        if (joyX < -0.2) {
          if (!joyLeftActive) { joyLeftActive = true; dispatchKey('keydown', 'KeyA'); }
          if (joyRightActive) { joyRightActive = false; dispatchKey('keyup', 'KeyD'); }
        } else if (joyX > 0.2) {
          if (!joyRightActive) { joyRightActive = true; dispatchKey('keydown', 'KeyD'); }
          if (joyLeftActive) { joyLeftActive = false; dispatchKey('keyup', 'KeyA'); }
        } else {
          if (joyLeftActive) { joyLeftActive = false; dispatchKey('keyup', 'KeyA'); }
          if (joyRightActive) { joyRightActive = false; dispatchKey('keyup', 'KeyD'); }
        }
      }
      function resetJoystick() {
        joyX = 0; joyTouchId = null;
        knob.style.transform = 'translate(-22px, -22px)';
        if (joyLeftActive) { joyLeftActive = false; dispatchKey('keyup', 'KeyA'); }
        if (joyRightActive) { joyRightActive = false; dispatchKey('keyup', 'KeyD'); }
      }
      if (joystick) {
        joystick.addEventListener('touchstart', function(e) { e.preventDefault(); var t = e.changedTouches[0]; joyTouchId = t.identifier; updateJoystick(t.clientX, t.clientY); });
        joystick.addEventListener('touchmove', function(e) { e.preventDefault(); for (var i = 0; i < e.changedTouches.length; i++) { if (e.changedTouches[i].identifier === joyTouchId) updateJoystick(e.changedTouches[i].clientX, e.changedTouches[i].clientY); } });
        joystick.addEventListener('touchend', function(e) { for (var i = 0; i < e.changedTouches.length; i++) { if (e.changedTouches[i].identifier === joyTouchId) resetJoystick(); } });
        joystick.addEventListener('touchcancel', resetJoystick);
      }
    })();
  </script>
