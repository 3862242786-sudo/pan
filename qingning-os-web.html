<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>QingningOS Terminal v2.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
            background-color: #0a0e1a; color: #22c55e; line-height: 1.6;
            overflow: hidden; width: 100vw; height: 100vh; user-select: none;
        }

        /* ===== 开机画面 ===== */
        #bootScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .boot-ascii-logo {
            font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
            font-size: clamp(0.5rem, 1.5vw, 1rem);
            color: #22c55e;
            white-space: pre;
            line-height: 1.3;
            opacity: 0;
            animation: bootAsciiIn 0.8s ease-out 0.3s forwards;
            text-shadow: 0 0 20px rgba(34,197,94,0.4);
        }
        .boot-version-text {
            font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
            font-size: 0.9rem;
            color: #22c55e;
            margin-top: 16px;
            opacity: 0;
            animation: bootFadeIn 0.8s ease-out 0.8s forwards;
        }
        .boot-powered-text {
            font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
            font-size: 0.7rem;
            color: #64748b;
            position: absolute;
            bottom: 60px;
            right: 30px;
            opacity: 0;
            animation: bootFadeIn 0.8s ease-out 1s forwards;
        }
        .boot-progress-container {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 240px;
            height: 3px;
            background: rgba(34,197,94,0.1);
            border-radius: 3px;
            overflow: hidden;
            opacity: 0;
            animation: bootFadeIn 0.5s ease-out 1.2s forwards;
        }
        .boot-progress-fill {
            height: 100%; width: 0%; background: #22c55e; border-radius: 3px;
            animation: bootProgress 2s ease-in-out 1.2s forwards;
            box-shadow: 0 0 8px rgba(34,197,94,0.5);
        }
        @keyframes bootAsciiIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes bootFadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes bootProgress {
            0% { width: 0%; }
            30% { width: 40%; }
            60% { width: 70%; }
            100% { width: 100%; }
        }

        /* ===== 激活码界面 ===== */
        #activationScreen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0e1a; z-index: 9998;
            align-items: center; justify-content: center;
            font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
        }
        .activation-box {
            color: #22c55e;
            white-space: pre;
            font-size: clamp(0.55rem, 1.2vw, 0.85rem);
            line-height: 1.5;
            text-align: center;
        }
        .activation-box .border-line { color: #22c55e; }
        .activation-box .text-content { color: #22c55e; }
        .activation-box .text-dim { color: #64748b; }
        .activation-box .text-warn { color: #eab308; }
        .activation-input-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 0;
            margin-bottom: 0;
            font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
            font-size: clamp(0.55rem, 1.2vw, 0.85rem);
            color: #22c55e;
        }
        .activation-input {
            width: 220px;
            padding: 6px 12px;
            background: rgba(34,197,94,0.05);
            border: 1px solid rgba(34,197,94,0.3);
            color: #22c55e;
            font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
            font-size: clamp(0.55rem, 1.2vw, 0.85rem);
            outline: none;
            caret-color: #22c55e;
        }
        .activation-input:focus {
            border-color: #22c55e;
            box-shadow: 0 0 8px rgba(34,197,94,0.2);
        }
        .activation-input::placeholder { color: #475569; }
        .activation-buttons-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-top: 4px;
            margin-bottom: 0;
            font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
            font-size: clamp(0.55rem, 1.2vw, 0.85rem);
        }
        .activation-btn {
            padding: 6px 20px;
            background: rgba(34,197,94,0.1);
            border: 1px solid rgba(34,197,94,0.3);
            color: #22c55e;
            font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
            font-size: clamp(0.55rem, 1.2vw, 0.85rem);
            cursor: pointer;
            transition: all 0.2s;
        }
        .activation-btn:hover {
            background: rgba(34,197,94,0.2);
            border-color: #22c55e;
            box-shadow: 0 0 12px rgba(34,197,94,0.2);
        }
        .activation-link {
            color: #64748b;
            text-decoration: none;
            font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
            font-size: clamp(0.55rem, 1.2vw, 0.85rem);
            cursor: pointer;
            transition: color 0.2s;
        }
        .activation-link:hover { color: #22c55e; }
        .activation-error {
            color: #ef4444;
            font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
            font-size: 0.75rem;
            text-align: center;
            min-height: 18px;
            margin-top: 8px;
        }

        /* ===== 终端主界面 ===== */
        #terminalScreen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0e1a; z-index: 9997;
            flex-direction: column;
            font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
        }

        /* 顶部状态栏 */
        .terminal-statusbar {
            height: 28px;
            background: rgba(34,197,94,0.05);
            border-bottom: 1px solid rgba(34,197,94,0.15);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            font-size: 0.72rem;
            color: #64748b;
            flex-shrink: 0;
            z-index: 10;
        }
        .terminal-statusbar-left { color: #22c55e; font-weight: 600; }
        .terminal-statusbar-right { display: flex; gap: 16px; align-items: center; }
        .terminal-statusbar-right .status-item { color: #64748b; }
        .terminal-statusbar-right .status-value { color: #22c55e; }
        .terminal-statusbar-right .status-separator { color: #1e293b; }

        /* 终端内容区域 */
        .terminal-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
            font-size: 0.82rem;
            line-height: 1.6;
            position: relative;
        }
        /* 滚动渐变遮罩 */
        .terminal-content-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        .terminal-content-wrapper::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 30px;
            background: linear-gradient(to bottom, #0a0e1a, transparent);
            pointer-events: none;
            z-index: 5;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .terminal-content-wrapper.scrolled::after {
            opacity: 1;
        }

        /* 终端行样式 */
        .term-line { white-space: pre-wrap; word-break: break-all; }
        .term-line.cmd { color: #e2e8f0; }
        .term-line.info { color: #22c55e; }
        .term-line.error { color: #ef4444; }
        .term-line.warn { color: #eab308; }
        .term-line.dim { color: #64748b; }
        .term-line.success { color: #22c55e; font-weight: bold; }
        .term-line.system { color: #22c55e; opacity: 0.7; }
        .term-line.highlight { color: #22c55e; text-shadow: 0 0 8px rgba(34,197,94,0.3); }
        .term-line.white { color: #e2e8f0; }
        .term-line .prompt-prefix { color: #22c55e; }
        .term-line .prompt-path { color: #64748b; }
        .term-line .prompt-arrow { color: #22c55e; }

        /* 底部输入行 */
        .terminal-input-row {
            display: flex;
            align-items: center;
            padding: 8px 16px;
            border-top: 1px solid rgba(34,197,94,0.1);
            background: rgba(10,14,26,0.8);
            flex-shrink: 0;
            font-size: 0.82rem;
        }
        .terminal-prompt {
            color: #22c55e;
            margin-right: 8px;
            white-space: nowrap;
            font-size: 0.82rem;
        }
        .terminal-prompt .bracket { color: #64748b; }
        .terminal-prompt .user { color: #22c55e; }
        .terminal-prompt .at { color: #64748b; }
        .terminal-prompt .host { color: #22c55e; }
        .terminal-prompt .path { color: #64748b; }
        .terminal-prompt .arrow { color: #22c55e; }
        .terminal-input {
            flex: 1;
            background: none;
            border: none;
            color: #e2e8f0;
            font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
            font-size: 0.82rem;
            outline: none;
            caret-color: #22c55e;
        }

        /* 光标闪烁 */
        @keyframes cursorBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .cursor-blink {
            animation: cursorBlink 1s step-end infinite;
        }

        /* ===== 关机画面 ===== */
        #shutdownScreen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10001;
            align-items: center; justify-content: center; flex-direction: column;
            font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
        }
        .shutdown-text {
            color: #64748b;
            font-size: 0.85rem;
            animation: shutdownPulse 1.5s ease-in-out infinite;
        }
        @keyframes shutdownPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* ===== Toast ===== */
        #toastContainer {
            position: fixed; top: 40px; right: 20px; z-index: 10002;
            display: flex; flex-direction: column; gap: 8px;
        }
        .toast {
            padding: 10px 20px; border-radius: 6px; font-size: 0.8rem;
            font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
            animation: toastIn 0.3s ease;
            max-width: 400px;
            border: 1px solid;
        }
        .toast-info { background: rgba(10,14,26,0.95); border-color: rgba(34,197,94,0.3); color: #22c55e; }
        .toast-success { background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.4); color: #22c55e; }
        .toast-error { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); color: #ef4444; }
        .toast-warn { background: rgba(234,179,8,0.1); border-color: rgba(234,179,8,0.3); color: #eab308; }
        .toast-fade-out { animation: toastOut 0.3s ease forwards; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

        /* ===== 滚动条 ===== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(34,197,94,0.2); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(34,197,94,0.35); }

        /* ===== 选中样式 ===== */
        ::selection {
            background: rgba(34,197,94,0.3);
            color: #22c55e;
        }
    </style>
</head>
<body>

    <!-- Toast 容器 -->
    <div id="toastContainer"></div>

    <!-- ===== 开机画面 ===== -->
    <div id="bootScreen">
        <div class="boot-ascii-logo" id="bootLogo"></div>
        <div class="boot-version-text">QingningOS Terminal v2.0</div>
        <div class="boot-powered-text">Powered by Web</div>
        <div class="boot-progress-container">
            <div class="boot-progress-fill"></div>
        </div>
    </div>

    <!-- ===== 激活码界面 ===== -->
    <div id="activationScreen">
        <div class="activation-box" id="activationBox"></div>
    </div>

    <!-- ===== 终端主界面 ===== -->
    <div id="terminalScreen">
        <!-- 顶部状态栏 -->
        <div class="terminal-statusbar">
            <div class="terminal-statusbar-left">QingningOS Terminal v2.0</div>
            <div class="terminal-statusbar-right">
                <span class="status-item">用户: <span class="status-value" id="statusUser">--</span></span>
                <span class="status-separator">|</span>
                <span class="status-item">激活码: <span class="status-value" id="statusCode">--</span></span>
                <span class="status-separator">|</span>
                <span class="status-item">权限: <span class="status-value" id="statusPerm">--</span></span>
                <span class="status-separator">|</span>
                <span class="status-item" id="statusClock">--</span>
            </div>
        </div>

        <!-- 终端内容区域 -->
        <div class="terminal-content-wrapper" id="terminalContentWrapper">
            <div class="terminal-content" id="terminalContent"></div>
        </div>

        <!-- 底部输入行 -->
        <div class="terminal-input-row">
            <span class="terminal-prompt" id="terminalPrompt"></span>
            <input type="text" class="terminal-input" id="terminalInput" autocomplete="off" spellcheck="false" autofocus>
        </div>
    </div>

    <!-- ===== 关机画面 ===== -->
    <div id="shutdownScreen">
        <div class="shutdown-text" id="shutdownText">正在关闭系统...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth2.js"></script>
    <script src="qingning-os-web.js"></script>
</body>
</html>
