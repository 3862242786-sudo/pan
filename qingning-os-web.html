<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>青柠OS - 网页体验系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
            background-color: #000; color: #e2e8f0; line-height: 1.6;
            overflow: hidden; width: 100vw; height: 100vh; user-select: none;
        }

        /* ===== 开机动画 ===== */
        #bootScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .boot-logo {
            width: 120px; height: 120px; margin-bottom: 20px;
            animation: bootLogoIn 1s ease-out;
        }
        .boot-title {
            font-size: 2.2rem; font-weight: 700; color: #fff;
            opacity: 0; animation: bootFadeIn 1s ease-out 0.5s forwards;
            letter-spacing: 2px;
        }
        .boot-subtitle {
            font-size: 0.85rem; color: #64748b; margin-top: 8px;
            opacity: 0; animation: bootFadeIn 1s ease-out 0.8s forwards;
        }
        .boot-progress-container {
            position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
            width: 200px; height: 3px; background: rgba(34,197,94,0.15); border-radius: 3px;
            overflow: hidden; opacity: 0; animation: bootFadeIn 0.5s ease-out 1s forwards;
        }
        .boot-progress-fill {
            height: 100%; width: 0%; background: #22c55e; border-radius: 3px;
            animation: bootProgress 2.5s ease-in-out 1s forwards;
        }
        @keyframes bootLogoIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        @keyframes bootFadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bootProgress { 0% { width: 0%; } 50% { width: 60%; } 100% { width: 100%; } }

        /* ===== 设备选择 ===== */
        #deviceSelectScreen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0a0e1a 0%, #0d1117 50%, #0a1628 100%);
            z-index: 9999; align-items: center; justify-content: center; flex-direction: column;
        }
        .device-select-title {
            font-size: 1.6rem; font-weight: 700; color: #e2e8f0; margin-bottom: 40px;
            text-align: center;
        }
        .device-cards {
            display: flex; gap: 30px; flex-wrap: wrap; justify-content: center;
        }
        .device-card {
            width: 220px; padding: 40px 24px;
            background: rgba(15,23,42,0.8); backdrop-filter: blur(20px);
            border: 1px solid rgba(34,197,94,0.15); border-radius: 20px;
            text-align: center; cursor: pointer; transition: all 0.3s;
        }
        .device-card:hover {
            transform: translateY(-6px); border-color: rgba(34,197,94,0.4);
            box-shadow: 0 12px 40px rgba(34,197,94,0.15);
        }
        .device-card-icon { font-size: 48px; margin-bottom: 16px; }
        .device-card-name { font-size: 1.1rem; font-weight: 600; color: #e2e8f0; margin-bottom: 6px; }
        .device-card-desc { font-size: 0.8rem; color: #64748b; }

        /* ===== 激活码界面 ===== */
        #activationScreen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0a0e1a 0%, #0d1117 30%, #0f1923 60%, #0a1628 100%);
            z-index: 9998; align-items: center; justify-content: center;
        }
        .activation-card {
            position: relative; z-index: 1;
            background: rgba(15,23,42,0.8); backdrop-filter: blur(20px);
            border: 1px solid rgba(34,197,94,0.15); border-radius: 20px;
            padding: 48px 40px; max-width: 420px; width: 90%; text-align: center;
        }
        .activation-logo { width: 80px; height: 80px; margin: 0 auto 20px; }
        .activation-title { font-size: 1.5rem; font-weight: 700; color: #22c55e; margin-bottom: 8px; }
        .activation-subtitle { color: #94a3b8; font-size: 0.9rem; margin-bottom: 28px; }
        .activation-input-group { margin-bottom: 20px; }
        .activation-input {
            width: 100%; padding: 14px 18px; background: rgba(15,23,42,0.6);
            border: 1px solid rgba(34,197,94,0.2); border-radius: 12px;
            color: #e2e8f0; font-size: 1rem; outline: none; transition: border-color 0.3s;
        }
        .activation-input:focus { border-color: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,0.1); }
        .activation-input::placeholder { color: #475569; }
        .activation-btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #22c55e, #16a34a); color: #fff;
            border: none; border-radius: 12px; font-size: 1rem; font-weight: 600;
            cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 20px rgba(34,197,94,0.3);
        }
        .activation-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(34,197,94,0.4); }
        .activation-note { margin-top: 20px; color: #475569; font-size: 0.8rem; }
        .activation-perm-info {
            margin-top: 12px; padding: 10px 14px; border-radius: 8px; font-size: 0.8rem; display: none;
        }
        .activation-perm-info.system { background: rgba(239,68,68,0.1); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); }
        .activation-perm-info.admin { background: rgba(34,197,94,0.1); color: #22c55e; border: 1px solid rgba(34,197,94,0.2); }
        .activation-perm-info.user { background: rgba(100,116,139,0.1); color: #94a3b8; border: 1px solid rgba(100,116,139,0.2); }

        /* ===== 账户验证弹窗 ===== */
        .auth-verify-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7); z-index: 9997;
            display: flex; align-items: center; justify-content: center;
        }
        .auth-verify-card {
            background: rgba(15,23,42,0.95); backdrop-filter: blur(20px);
            border: 1px solid rgba(34,197,94,0.15); border-radius: 16px;
            padding: 32px; max-width: 360px; width: 90%; text-align: center;
        }
        .auth-verify-card h3 { color: #e2e8f0; margin-bottom: 8px; }
        .auth-verify-card p { color: #64748b; font-size: 0.85rem; margin-bottom: 20px; }
        .auth-verify-card input {
            width: 100%; padding: 12px 16px; margin-bottom: 12px;
            background: rgba(15,23,42,0.6); border: 1px solid rgba(34,197,94,0.2);
            border-radius: 10px; color: #e2e8f0; font-size: 0.9rem; outline: none;
        }
        .auth-verify-card input:focus { border-color: #22c55e; }

        /* ===== OOBE 界面 ===== */
        #oobeScreen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0a0e1a 0%, #0d1117 50%, #0a1628 100%);
            z-index: 9996; flex-direction: column; align-items: center; justify-content: center;
        }
        .oobe-container {
            max-width: 600px; width: 90%; text-align: center;
            background: rgba(15,23,42,0.6); backdrop-filter: blur(20px);
            border: 1px solid rgba(34,197,94,0.1); border-radius: 24px;
            padding: 48px 40px; animation: oobeSlideIn 0.5s ease;
        }
        @keyframes oobeSlideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .oobe-step-indicator {
            display: flex; justify-content: center; gap: 8px; margin-bottom: 32px;
        }
        .oobe-step-dot {
            width: 8px; height: 8px; border-radius: 50%; background: rgba(34,197,94,0.2);
            transition: all 0.3s;
        }
        .oobe-step-dot.active { background: #22c55e; width: 24px; border-radius: 4px; }
        .oobe-title { font-size: 1.5rem; font-weight: 700; color: #e2e8f0; margin-bottom: 12px; }
        .oobe-desc { color: #94a3b8; font-size: 0.95rem; margin-bottom: 32px; }
        .oobe-options {
            display: flex; flex-direction: column; gap: 10px; margin-bottom: 32px;
            max-height: 280px; overflow-y: auto;
        }
        .oobe-option {
            padding: 14px 18px; background: rgba(15,23,42,0.5);
            border: 1px solid rgba(34,197,94,0.1); border-radius: 12px;
            cursor: pointer; text-align: left; transition: all 0.2s;
            display: flex; align-items: center; gap: 12px; color: #e2e8f0;
        }
        .oobe-option:hover { border-color: rgba(34,197,94,0.3); background: rgba(34,197,94,0.05); }
        .oobe-option.selected { border-color: #22c55e; background: rgba(34,197,94,0.1); }
        .oobe-option-icon { font-size: 20px; }
        .oobe-option-text { flex: 1; }
        .oobe-option-name { font-weight: 500; font-size: 0.9rem; }
        .oobe-option-detail { font-size: 0.75rem; color: #64748b; margin-top: 2px; }
        .oobe-buttons {
            display: flex; gap: 12px; justify-content: center;
        }
        .oobe-btn {
            padding: 12px 32px; border-radius: 10px; font-size: 0.9rem; font-weight: 600;
            cursor: pointer; transition: all 0.3s; border: none;
        }
        .oobe-btn.primary {
            background: linear-gradient(135deg, #22c55e, #16a34a); color: #fff;
            box-shadow: 0 4px 16px rgba(34,197,94,0.3);
        }
        .oobe-btn.primary:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(34,197,94,0.4); }
        .oobe-btn.secondary {
            background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); color: #22c55e;
        }
        .oobe-btn.secondary:hover { background: rgba(34,197,94,0.2); }
        .oobe-input {
            width: 100%; max-width: 300px; padding: 14px 18px; margin-bottom: 24px;
            background: rgba(15,23,42,0.6); border: 1px solid rgba(34,197,94,0.2);
            border-radius: 12px; color: #e2e8f0; font-size: 1rem; outline: none; text-align: center;
        }
        .oobe-input:focus { border-color: #22c55e; }
        .oobe-toggle-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 18px; background: rgba(15,23,42,0.5);
            border: 1px solid rgba(34,197,94,0.1); border-radius: 12px; margin-bottom: 10px;
        }
        .oobe-toggle-label { color: #e2e8f0; font-size: 0.9rem; }
        .oobe-toggle-desc { color: #64748b; font-size: 0.75rem; margin-top: 2px; }
        .oobe-toggle-switch {
            width: 44px; height: 24px; background: rgba(100,116,139,0.3);
            border-radius: 12px; position: relative; cursor: pointer; transition: all 0.3s;
            flex-shrink: 0;
        }
        .oobe-toggle-switch.on { background: #22c55e; }
        .oobe-toggle-switch::after {
            content: ''; position: absolute; top: 2px; left: 2px;
            width: 20px; height: 20px; background: #fff; border-radius: 50%;
            transition: all 0.3s;
        }
        .oobe-toggle-switch.on::after { left: 22px; }
        .oobe-wifi-signal { margin-left: auto; font-size: 0.75rem; color: #22c55e; }
        .oobe-wifi-locked { margin-left: 8px; font-size: 0.75rem; color: #64748b; }

        /* ===== OS 桌面 ===== */
        #osDesktop {
            display: none; width: 100%; height: 100vh; position: relative;
        }
        #desktopWallpaper {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #0a0e1a 0%, #0d1117 30%, #0f1923 60%, #0a1628 100%);
            z-index: 0; transition: background 0.5s;
        }
        #desktopWallpaper::after {
            content: ''; position: absolute; top: 20%; right: 15%; width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(34,197,94,0.08) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none;
        }

        /* ===== 桌面模式 UI ===== */
        #desktopUI {
            position: relative; z-index: 1; width: 100%; height: 100%;
            display: flex; flex-direction: column;
        }

        /* ===== 任务栏 / 状态栏 ===== */
        .taskbar {
            height: 40px; background: rgba(15,23,42,0.85); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(34,197,94,0.1); display: flex;
            align-items: center; justify-content: space-between; padding: 0 12px;
            z-index: 500; flex-shrink: 0;
        }
        .taskbar-left { display: flex; align-items: center; gap: 8px; }
        .taskbar-logo { width: 24px; height: 24px; }
        .start-menu-btn {
            background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2);
            color: #22c55e; padding: 4px 14px; border-radius: 6px;
            font-size: 0.8rem; cursor: pointer; transition: all 0.2s; font-weight: 500;
        }
        .start-menu-btn:hover { background: rgba(34,197,94,0.2); }
        .taskbar-center { display: flex; align-items: center; gap: 4px; }
        .taskbar-window-btn {
            background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.12);
            color: #94a3b8; padding: 3px 10px; border-radius: 4px; font-size: 0.7rem;
            cursor: pointer; display: flex; align-items: center; gap: 4px;
            white-space: nowrap; transition: all 0.2s;
        }
        .taskbar-window-btn:hover, .taskbar-window-btn.minimized { background: rgba(34,197,94,0.15); color: #e2e8f0; }
        .taskbar-right { display: flex; align-items: center; gap: 12px; }
        .taskbar-icon { font-size: 0.85rem; cursor: pointer; opacity: 0.8; transition: opacity 0.2s; }
        .taskbar-icon:hover { opacity: 1; }
        .taskbar-code {
            font-size: 0.7rem; color: #22c55e; background: rgba(34,197,94,0.1);
            padding: 2px 8px; border-radius: 4px;
        }
        .clock-time { font-size: 0.8rem; color: #e2e8f0; font-weight: 500; }

        /* ===== 开始菜单 ===== */
        #startMenu {
            display: none; position: absolute; top: 40px; left: 0; width: 280px;
            background: rgba(15,23,42,0.95); backdrop-filter: blur(20px);
            border: 1px solid rgba(34,197,94,0.15); border-radius: 0 0 12px 12px;
            z-index: 600; padding: 12px 0; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .start-menu-user {
            padding: 16px 20px; border-bottom: 1px solid rgba(34,197,94,0.1);
            display: flex; align-items: center; gap: 12px;
        }
        .start-menu-avatar {
            width: 36px; height: 36px; background: rgba(34,197,94,0.15);
            border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px;
        }
        .start-menu-username { font-size: 0.9rem; font-weight: 600; color: #e2e8f0; }
        .start-menu-usercode { font-size: 0.75rem; color: #22c55e; }
        .start-menu-item {
            display: flex; align-items: center; gap: 12px; padding: 10px 20px;
            cursor: pointer; transition: background 0.2s; font-size: 0.85rem; color: #e2e8f0;
        }
        .start-menu-item:hover { background: rgba(34,197,94,0.1); }
        .start-menu-item-icon { font-size: 18px; width: 24px; text-align: center; }
        .start-menu-divider { height: 1px; background: rgba(34,197,94,0.1); margin: 4px 20px; }
        .start-menu-item.danger { color: #ef4444; }
        .start-menu-item.danger:hover { background: rgba(239,68,68,0.1); }
        .start-menu-apps-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
            padding: 12px 16px;
        }
        .start-menu-app-tile {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            padding: 10px 4px; border-radius: 8px; cursor: pointer; transition: background 0.2s;
        }
        .start-menu-app-tile:hover { background: rgba(34,197,94,0.1); }
        .start-menu-app-tile-icon { font-size: 24px; }
        .start-menu-app-tile-name { font-size: 0.65rem; color: #e2e8f0; text-align: center; }

        /* ===== 桌面区域 ===== */
        #desktopArea {
            flex: 1; position: relative; overflow: hidden;
        }
        .desktop-icons {
            position: absolute; top: 20px; left: 20px;
            display: grid; grid-template-columns: repeat(2, 90px); gap: 16px; z-index: 10;
        }
        .desktop-icon {
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            padding: 10px 6px; border-radius: 10px; cursor: pointer;
            transition: all 0.2s; text-align: center;
        }
        .desktop-icon:hover { background: rgba(34,197,94,0.1); }
        .desktop-icon:active { background: rgba(34,197,94,0.2); }
        .desktop-icon-img { font-size: 36px; line-height: 1; }
        .desktop-icon-label {
            font-size: 0.7rem; color: #e2e8f0; text-shadow: 0 1px 3px rgba(0,0,0,0.8); word-break: break-all;
        }

        /* ===== Dock 栏 ===== */
        .dock {
            position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; padding: 8px 16px;
            background: rgba(15,23,42,0.7); backdrop-filter: blur(20px);
            border: 1px solid rgba(34,197,94,0.1); border-radius: 16px; z-index: 20;
        }
        .dock-item {
            width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
            font-size: 28px; border-radius: 12px; cursor: pointer; transition: all 0.2s;
            background: rgba(34,197,94,0.05);
        }
        .dock-item:hover { background: rgba(34,197,94,0.15); transform: scale(1.15) translateY(-4px); }
        .dock-item:active { transform: scale(1.05); }

        /* ===== 右键菜单 ===== */
        .context-menu {
            position: absolute; background: rgba(15,23,42,0.95); backdrop-filter: blur(20px);
            border: 1px solid rgba(34,197,94,0.15); border-radius: 10px;
            padding: 6px 0; z-index: 1000; min-width: 160px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4); animation: contextIn 0.15s ease;
        }
        @keyframes contextIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .context-menu-item {
            padding: 8px 16px; font-size: 0.85rem; color: #e2e8f0; cursor: pointer;
            display: flex; align-items: center; gap: 8px; transition: background 0.15s;
        }
        .context-menu-item:hover { background: rgba(34,197,94,0.1); }
        .context-menu-divider { height: 1px; background: rgba(34,197,94,0.1); margin: 4px 0; }

        /* ===== 窗口 ===== */
        .os-window {
            position: absolute; display: flex; flex-direction: column;
            background: rgba(15,23,42,0.95); backdrop-filter: blur(20px);
            border: 1px solid rgba(34,197,94,0.12); border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4); overflow: hidden;
            min-width: 300px; min-height: 200px;
        }
        .window-titlebar {
            height: 38px; background: rgba(15,23,42,0.9);
            border-bottom: 1px solid rgba(34,197,94,0.08); display: flex;
            align-items: center; justify-content: space-between; padding: 0 10px;
            cursor: move; flex-shrink: 0; user-select: none;
        }
        .window-titlebar-left { display: flex; align-items: center; gap: 8px; }
        .window-titlebar-icon { font-size: 14px; }
        .window-titlebar-text { font-size: 0.8rem; color: #94a3b8; font-weight: 500; }
        .window-titlebar-buttons { display: flex; gap: 6px; }
        .win-btn {
            width: 14px; height: 14px; border-radius: 50%; border: none; cursor: pointer;
            font-size: 8px; display: flex; align-items: center; justify-content: center;
            color: transparent; transition: all 0.2s;
        }
        .win-btn:hover { color: #fff; }
        .win-btn-minimize { background: #eab308; }
        .win-btn-maximize { background: #22c55e; }
        .win-btn-close { background: #ef4444; }
        .window-content { flex: 1; overflow: auto; }
        .window-resize-handle {
            position: absolute; bottom: 0; right: 0; width: 16px; height: 16px;
            cursor: se-resize; z-index: 10;
        }

        /* ===== 文件管理器 ===== */
        .filemanager-layout { display: flex; height: 100%; }
        .filemanager-sidebar {
            width: 160px; background: rgba(10,14,26,0.5);
            border-right: 1px solid rgba(34,197,94,0.08); padding: 12px 0; flex-shrink: 0;
        }
        .fm-nav-item {
            padding: 8px 16px; cursor: pointer; font-size: 0.85rem; color: #94a3b8;
            display: flex; align-items: center; gap: 8px; transition: all 0.2s;
        }
        .fm-nav-item:hover { background: rgba(34,197,94,0.08); color: #e2e8f0; }
        .fm-nav-item.active { background: rgba(34,197,94,0.12); color: #22c55e; border-right: 2px solid #22c55e; }
        .filemanager-main { flex: 1; display: flex; flex-direction: column; }
        .fm-header { padding: 10px 16px; border-bottom: 1px solid rgba(34,197,94,0.08); display: flex; align-items: center; gap: 8px; }
        .fm-path { font-size: 0.8rem; color: #64748b; flex: 1; }
        .fm-btn {
            padding: 4px 10px; background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2);
            border-radius: 6px; color: #22c55e; font-size: 0.7rem; cursor: pointer; transition: all 0.2s;
        }
        .fm-btn:hover { background: rgba(34,197,94,0.2); }
        .fm-filelist { flex: 1; padding: 8px 0; overflow-y: auto; }
        .fm-file-header {
            display: flex; padding: 6px 16px; font-size: 0.75rem; color: #475569;
            border-bottom: 1px solid rgba(34,197,94,0.05); font-weight: 600;
        }
        .fm-file-row {
            display: flex; padding: 8px 16px; font-size: 0.85rem; cursor: pointer;
            transition: background 0.2s; align-items: center;
        }
        .fm-file-row:hover { background: rgba(34,197,94,0.06); }
        .fm-file-row.selected { background: rgba(34,197,94,0.12); }
        .fm-col-name { flex: 1; display: flex; align-items: center; gap: 8px; }
        .fm-col-size { width: 100px; color: #64748b; font-size: 0.8rem; }
        .fm-col-date { width: 120px; color: #64748b; font-size: 0.8rem; }

        /* ===== 终端 ===== */

        /* ===== 计算器 ===== */

        }
        .calc-display {

        .calc-result { font-size: 1.8rem; color: #e2e8f0; font-weight: 600; word-break: break-all; }
        .calc-buttons {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; flex: 1;
        }
        .calc-btn {
            background: rgba(15,23,42,0.6); border: 1px solid rgba(34,197,94,0.1);

            transition: all 0.15s; display: flex; align-items: center; justify-content: center;

            flex: 1; background: rgba(10,14,26,0.3); border: none;

            resize: none; font-family: inherit; line-height: 1.6;

        /* ===== 日历 ===== */

        .calendar-header {
            display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;

        /* ===== 设置 ===== */

        .settings-nav-item {

        .wallpaper-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .wallpaper-option {
            height: 80px; border-radius: 10px; cursor: pointer; border: 2px solid transparent;

        }

        .wallpaper-option.active { border-color: #22c55e; box-shadow: 0 0 0 2px rgba(34,197,94,0.3); }
        .settings-slider {
            width: 100%; -webkit-appearance: none; height: 6px; border-radius: 3px;
            background: rgba(34,197,94,0.1); outline: none; margin-top: 8px;
        }
        .settings-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
            background: #22c55e; cursor: pointer;
        }
        .network-status { display: flex; flex-direction: column; gap: 10px; }
        .network-item {
            display: flex; align-items: center; gap: 12px; padding: 12px;
            background: rgba(15,23,42,0.5); border: 1px solid rgba(34,197,94,0.08); border-radius: 10px;
        }
        .network-item.connected { border-color: rgba(34,197,94,0.2); }
        .network-icon { font-size: 24px; }
        .network-name { font-size: 0.85rem; color: #e2e8f0; }
        .network-detail { font-size: 0.75rem; color: #64748b; }
        .network-badge {

            background: rgba(100,116,139,0.15); color: #64748b;

        /* ===== 应用商店 ===== */
        .appstore-layout { padding: 20px; height: 100%; overflow-y: auto; }
        .appstore-header { margin-bottom: 20px; }
        .appstore-header h3 { font-size: 1.1rem; color: #e2e8f0; }
        .appstore-list { display: flex; flex-direction: column; gap: 10px; }
        .appstore-item {
            display: flex; align-items: center; gap: 14px; padding: 14px;
            background: rgba(15,23,42,0.5); border: 1px solid rgba(34,197,94,0.08);
            border-radius: 12px; transition: all 0.2s;
        }
        .appstore-item:hover { border-color: rgba(34,197,94,0.15); }

            font-size: 32px; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
            background: rgba(34,197,94,0.08); border-radius: 12px; flex-shrink: 0;
        }
        .appstore-item-info { flex: 1; }
        .appstore-item-name { font-size: 0.9rem; font-weight: 600; color: #e2e8f0; }
        .appstore-item-desc { font-size: 0.8rem; color: #64748b; }

        .appstore-install-btn {

        }

        .appstore-install-btn.installed {
            background: rgba(100,116,139,0.1); border-color: rgba(100,116,139,0.2); color: #64748b;

        /* ===== 杀毒 ===== */
        .antivirus-layout { padding: 24px; text-align: center; height: 100%; overflow-y: auto; }
        .antivirus-header { margin-bottom: 24px; }
        .antivirus-status {
            padding: 20px; background: rgba(15,23,42,0.5);
            border: 1px solid rgba(34,197,94,0.12); border-radius: 12px; margin-bottom: 20px;
        }
        .av-status-icon { font-size: 40px; margin-bottom: 8px; }
        .av-status-text { font-size: 1rem; font-weight: 600; color: #22c55e; }
        .av-status-detail { font-size: 0.8rem; color: #64748b; margin-top: 4px; }
        .av-scan-btn {
            padding: 12px 32px; background: linear-gradient(135deg, #22c55e, #16a34a);
            color: #fff; border: none; border-radius: 10px; font-size: 0.9rem;

        .av-progress-bar {

            overflow: hidden; margin-bottom: 8px;
        }
        .av-progress-fill {

            border-radius: 3px; width: 0%; transition: width 0.5s ease;
        }
        .av-progress-text { font-size: 0.8rem; color: #94a3b8; }

            padding: 8px 12px; font-size: 0.85rem; display: flex; align-items: center;
            gap: 8px; border-radius: 6px;
        }
        .av-result-item.safe { color: #22c55e; }
        .av-result-item.danger { color: #ef4444; }
        .av-toggle-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 18px; background: rgba(15,23,42,0.5);
            border: 1px solid rgba(34,197,94,0.1); border-radius: 12px; margin-bottom: 16px;
        }
        .av-toggle-label { color: #e2e8f0; font-size: 0.9rem; }
        .av-toggle-desc { color: #64748b; font-size: 0.75rem; margin-top: 2px; }
        .av-toggle-switch {
            width: 44px; height: 24px; background: rgba(100,116,139,0.3);

        /* ===== 任务管理器 ===== */

        .mobile-app-drawer {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10,14,26,0.98); z-index: 150;
            display: flex; flex-direction: column;
            animation: mobileAppSlideIn 0.3s ease;
        }
        .mobile-drawer-header {
            height: 44px; display: flex; align-items: center; justify-content: center;
            background: rgba(15,23,42,0.9); border-bottom: 1px solid rgba(34,197,94,0.1);
            flex-shrink: 0;
        }
        .mobile-drawer-title { font-size: 0.9rem; font-weight: 600; color: #e2e8f0; }
        .mobile-drawer-close {
            position: absolute; right: 12px; background: none; border: none;
            color: #94a3b8; font-size: 1.2rem; cursor: pointer;
        }
        .mobile-drawer-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px 8px;
            padding: 20px 16px; overflow-y: auto;
        }

        /* ===== Toast ===== */
        #toastContainer {
            position: fixed; top: 60px; right: 20px; z-index: 9999;
            display: flex; flex-direction: column; gap: 8px;
        }
        .toast {
            padding: 12px 20px; border-radius: 10px; font-size: 0.85rem;
            backdrop-filter: blur(20px); animation: toastIn 0.3s ease;
            max-width: 320px; box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }
        .toast-info { background: rgba(30,41,59,0.9); border: 1px solid rgba(34,197,94,0.2); color: #e2e8f0; }
        .toast-success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #22c55e; }
        .toast-error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; }
        .toast-fade-out { animation: toastOut 0.3s ease forwards; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes toastOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(20px); } }

        /* ===== 更新对话框 ===== */
        .update-dialog-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 9998;
        }
        .update-dialog {
            background: rgba(15,23,42,0.95); backdrop-filter: blur(20px);
            border: 1px solid rgba(34,197,94,0.15); border-radius: 16px;
            padding: 28px; max-width: 400px; width: 90%; text-align: center;
        }
        .update-dialog-header { margin-bottom: 16px; }
        .update-dialog-header h3 { margin-top: 8px; color: #e2e8f0; }
        .update-dialog-body { margin-bottom: 20px; font-size: 0.9rem; color: #94a3b8; }
        .update-dialog-actions { display: flex; flex-direction: column; gap: 8px; }
        .update-dialog-actions .settings-btn { width: 100%; }

        /* ===== 关机画面 ===== */
        .shutdown-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 9999;
        }
        .shutdown-screen { text-align: center; animation: shutdownFade 1s ease; }
        @keyframes shutdownFade { from { opacity: 0; } to { opacity: 1; } }

        /* ===== 警告弹窗 ===== */
        .warning-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 9999;
        }
        .warning-card {
            background: rgba(15,23,42,0.95); backdrop-filter: blur(20px);
            border: 1px solid rgba(239,68,68,0.3); border-radius: 16px;
            padding: 32px; max-width: 360px; width: 90%; text-align: center;
        }
        .warning-card .warning-icon { font-size: 48px; margin-bottom: 12px; }
        .warning-card h3 { color: #ef4444; margin-bottom: 8px; }
        .warning-card p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 20px; }

        /* ===== 滚动条 ===== */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(34,197,94,0.2); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(34,197,94,0.35); }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .activation-card { padding: 32px 24px; }
            .activation-title { font-size: 1.3rem; }
            .device-card { width: 160px; padding: 32px 20px; }
            .oobe-container { padding: 32px 24px; }
        }
    </style>
</head>
<body>

    <!-- Toast 容器 -->
    <div id="toastContainer"></div>

    <!-- ===== 开机动画 ===== -->
    <div id="bootScreen">
        <svg class="boot-logo" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="bootLogoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#22c55e"/>
                    <stop offset="100%" stop-color="#4ade80"/>
                </linearGradient>
            </defs>
            <circle cx="60" cy="45" r="28" fill="rgba(34,197,94,0.12)" stroke="url(#bootLogoGrad)" stroke-width="2.5"/>
            <path d="M42 42 Q50 28 60 38 Q70 28 78 42" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M38 50 Q48 36 60 46 Q72 36 82 50" fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
            <rect x="38" y="78" width="44" height="24" rx="4" fill="rgba(34,197,94,0.08)" stroke="url(#bootLogoGrad)" stroke-width="1.5"/>
            <line x1="48" y1="84" x2="72" y2="84" stroke="#22c55e" stroke-width="1.2" opacity="0.5"/>
            <line x1="48" y1="90" x2="64" y2="90" stroke="#22c55e" stroke-width="1.2" opacity="0.3"/>
            <circle cx="60" cy="104" r="3" fill="#22c55e" opacity="0.4"/>
        </svg>
        <div class="boot-title">QingningOS</div>
        <div class="boot-subtitle">Powered by Web</div>
        <div class="boot-progress-container">
            <div class="boot-progress-fill"></div>
        </div>
    </div>

    <!-- ===== 设备选择界面 ===== -->
    <div id="deviceSelectScreen">
        <div class="device-select-title">选择您的设备类型</div>
        <div class="device-cards">
            <div class="device-card" onclick="selectDevice('desktop')">
                <div class="device-card-icon">&#128187;</div>
                <div class="device-card-name">电脑端</div>
                <div class="device-card-desc">适合桌面和笔记本</div>
            </div>
            <div class="device-card" onclick="selectDevice('mobile')">
                <div class="device-card-icon">&#128241;</div>
                <div class="device-card-name">手机端</div>
                <div class="device-card-desc">适合手机和平板</div>
            </div>
        </div>
    </div>

    <!-- ===== 激活码界面 ===== -->
    <div id="activationScreen">
        <div class="activation-card">
            <svg class="activation-logo" viewBox="0 0 80 80" fill="none">
                <defs>
                    <linearGradient id="actLogoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#22c55e"/>
                        <stop offset="100%" stop-color="#4ade80"/>
                    </linearGradient>
                </defs>
                <circle cx="40" cy="32" r="18" fill="rgba(34,197,94,0.15)" stroke="url(#actLogoGrad)" stroke-width="2"/>
                <path d="M30 30 Q35 22 40 28 Q45 22 50 30" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round"/>
                <path d="M28 34 Q34 26 40 32 Q46 26 52 34" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
                <rect x="28" y="52" width="24" height="16" rx="3" fill="rgba(34,197,94,0.1)" stroke="url(#actLogoGrad)" stroke-width="1.5"/>
                <line x1="34" y1="56" x2="46" y2="56" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
                <line x1="34" y1="60" x2="42" y2="60" stroke="#22c55e" stroke-width="1" opacity="0.3"/>
                <circle cx="40" cy="68" r="2" fill="#22c55e" opacity="0.4"/>
            </svg>
            <div class="activation-title">青柠OS 网页体验系统</div>
            <div class="activation-subtitle">输入您的激活码开始使用 QingningOS</div>
            <div class="activation-input-group">
                <input type="text" class="activation-input" id="activationInput" placeholder="请输入激活码，例如 xt2024" autocomplete="off" spellcheck="false">
            </div>
            <div class="activation-perm-info" id="activationPermInfo"></div>
            <button class="activation-btn" id="activateBtn">激活</button>
            <div class="activation-note">激活码格式：xt + 数字（如 xt2024）</div>
            <div style="margin-top:16px;text-align:center;">
                <a href="profile.html" style="color:#22c55e;text-decoration:none;font-size:0.85rem;">没有激活码？前往个人主页获取</a>
            </div>
        </div>
    </div>

    <!-- ===== 账户验证弹窗容器 ===== -->
    <div id="authVerifyContainer"></div>

    <!-- ===== OOBE 界面 ===== -->
    <div id="oobeScreen">
        <div class="oobe-container" id="oobeContainer">
            <!-- OOBE 内容由 JS 动态生成 -->
        </div>
    </div>

    <!-- ===== OS 主界面 ===== -->
    <div id="osDesktop">
        <div id="desktopWallpaper"></div>

        <!-- ===== 桌面模式 ===== -->
        <div id="desktopUI">
            <!-- 状态栏 / 任务栏 -->
            <div class="taskbar">
                <div class="taskbar-left">
                    <svg class="taskbar-logo" viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="10" r="7" fill="rgba(34,197,94,0.15)" stroke="#22c55e" stroke-width="1.5"/>
                        <path d="M8 9 Q10 5 12 8 Q14 5 16 9" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
                        <rect x="8" y="17" width="8" height="5" rx="1.5" fill="rgba(34,197,94,0.1)" stroke="#22c55e" stroke-width="1"/>
                    </svg>
                    <button class="start-menu-btn" id="startMenuBtn" onclick="toggleStartMenu()">开始</button>
                </div>
                <div class="taskbar-center" id="taskbarWindows"></div>
                <div class="taskbar-right">
                    <span class="taskbar-icon" title="WiFi">&#128246;</span>
                    <span class="taskbar-icon" title="音量" id="taskbarVolume">&#128266;</span>
                    <span class="taskbar-icon" title="电池">&#128267;</span>
                    <span class="clock-time" id="taskbarClock">00:00:00</span>
                    <span class="taskbar-code activation-code-display">--</span>
                    <span class="trial-mode-badge" id="trialModeBadge" style="display:none;background:rgba(234,179,8,0.2);color:#eab308;font-size:0.7rem;padding:1px 6px;border-radius:3px;margin-left:4px;">体验模式</span>
                </div>
            </div>

            <!-- 开始菜单 -->
            <div id="startMenu">
                <div class="start-menu-user">
                    <div class="start-menu-avatar">&#128100;</div>
                    <div class="start-menu-user-info">
                        <div class="start-menu-username username-display">用户</div>
                        <div class="start-menu-usercode activation-code-display">--</div>
                    </div>
                </div>
                <div class="start-menu-apps-grid" id="startMenuApps"></div>
                <div class="start-menu-divider"></div>
                <div class="start-menu-items">
                    <div class="start-menu-item" onclick="openWindow('settings'); closeStartMenu();">
                        <span class="start-menu-item-icon">&#9881;</span> 设置
                    </div>
                    <div class="start-menu-item danger" onclick="shutdownOS()">
                        <span class="start-menu-item-icon">&#9211;</span> 关机
                    </div>
                    <div class="start-menu-item danger" onclick="restartOS()">
                        <span class="start-menu-item-icon">&#8635;</span> 重启
                    </div>
                </div>
            </div>

            <!-- 桌面区域 -->
            <div id="desktopArea">
                <!-- 桌面图标 -->
                <div class="desktop-icons" id="desktopIcons"></div>

                <!-- Dock 栏 -->
                <div class="dock" id="desktopDock"></div>
            </div>
        </div>

        <!-- ===== 手机模式 ===== -->
        <div id="mobileUI">
            <div class="mobile-statusbar">
                <div class="mobile-statusbar-left">
                    <span id="mobileClock">00:00</span>
                </div>
                <div class="mobile-statusbar-right">
                    <span style="font-size:10px;">&#128246;</span>
                    <span style="font-size:10px;">&#128267;</span>
                    <span class="activation-code-display" style="font-size:0.65rem;color:#22c55e;">--</span>
                    <span class="trial-mode-badge" id="mobileTrialModeBadge" style="display:none;background:rgba(234,179,8,0.2);color:#eab308;font-size:0.55rem;padding:1px 4px;border-radius:2px;">体验</span>
                </div>
            </div>
            <div id="mobileHomeScreen">
                <div class="mobile-icons-grid" id="mobileIconsGrid"></div>
                <div class="mobile-page-indicator" id="mobilePageIndicator"></div>
                <div class="mobile-dock" id="mobileDock"></div>
            </div>
        </div>
    </div>

    <script src="qingning-os-web.js"></script>
</body>
</html>
