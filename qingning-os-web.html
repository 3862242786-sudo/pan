<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>青柠OS - 网页体验系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
            background-color: #0a0e1a;
            color: #e2e8f0;
            line-height: 1.6;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* ===== 激活码界面 ===== */
        #activationScreen {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #0a0e1a 0%, #0d1117 30%, #0f1923 60%, #0a1628 100%);
            position: relative;
        }

        #activationScreen::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(34, 197, 94, 0.06) 0%, transparent 50%),
                        radial-gradient(circle at 70% 50%, rgba(34, 197, 94, 0.04) 0%, transparent 50%);
            animation: activateGlow 8s ease-in-out infinite alternate;
        }

        @keyframes activateGlow {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-5%, 5%); }
        }

        .activation-card {
            position: relative;
            z-index: 1;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(34, 197, 94, 0.15);
            border-radius: 20px;
            padding: 48px 40px;
            max-width: 420px;
            width: 90%;
            text-align: center;
        }

        .activation-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
        }

        .activation-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #22c55e;
            margin-bottom: 8px;
        }

        .activation-subtitle {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 28px;
        }

        .activation-input-group {
            margin-bottom: 20px;
        }

        .activation-input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(34, 197, 94, 0.2);
            border-radius: 12px;
            color: #e2e8f0;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .activation-input:focus {
            border-color: #22c55e;
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1);
        }

        .activation-input::placeholder {
            color: #475569;
        }

        .activation-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(34, 197, 94, 0.3);
        }

        .activation-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(34, 197, 94, 0.4);
        }

        .activation-btn:active {
            transform: translateY(0);
        }

        .activation-link {
            display: inline-block;
            margin-top: 16px;
            color: #22c55e;
            text-decoration: none;
            font-size: 0.9rem;
            transition: opacity 0.3s;
        }

        .activation-link:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        .activation-note {
            margin-top: 20px;
            color: #475569;
            font-size: 0.8rem;
        }

        /* ===== OS 桌面 ===== */
        #osDesktop {
            display: none;
            width: 100%;
            height: 100vh;
            position: relative;
        }

        /* ===== 桌面壁纸 ===== */
        #desktopWallpaper {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #0a0e1a 0%, #0d1117 30%, #0f1923 60%, #0a1628 100%);
            z-index: 0;
        }

        /* 壁纸装饰 */
        #desktopWallpaper::after {
            content: '';
            position: absolute;
            top: 20%;
            right: 15%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(34, 197, 94, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        /* ===== 桌面模式 UI ===== */
        #desktopUI {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* ===== 任务栏 ===== */
        .taskbar {
            height: 40px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(34, 197, 94, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            z-index: 500;
            flex-shrink: 0;
        }

        .taskbar-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .taskbar-logo {
            width: 24px;
            height: 24px;
        }

        .start-menu-btn {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            color: #22c55e;
            padding: 4px 14px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .start-menu-btn:hover {
            background: rgba(34, 197, 94, 0.2);
        }

        .taskbar-center {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .clock-time {
            font-size: 0.8rem;
            color: #e2e8f0;
            font-weight: 500;
        }

        .taskbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .taskbar-icon {
            font-size: 0.85rem;
            cursor: pointer;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .taskbar-icon:hover {
            opacity: 1;
        }

        .taskbar-code {
            font-size: 0.7rem;
            color: #22c55e;
            background: rgba(34, 197, 94, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .taskbar-settings-btn {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 0.85rem;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .taskbar-settings-btn:hover {
            color: #22c55e;
            background: rgba(34, 197, 94, 0.1);
        }

        #taskbarWindows {
            display: flex;
            align-items: center;
            gap: 4px;
            max-width: 300px;
            overflow-x: auto;
        }

        .taskbar-window-btn {
            background: rgba(34, 197, 94, 0.08);
            border: 1px solid rgba(34, 197, 94, 0.12);
            color: #94a3b8;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 0.7rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .taskbar-window-btn:hover, .taskbar-window-btn.minimized {
            background: rgba(34, 197, 94, 0.15);
            color: #e2e8f0;
        }

        .taskbar-window-icon {
            font-size: 0.75rem;
        }

        /* ===== 桌面区域 ===== */
        #desktopArea {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .desktop-icons {
            position: absolute;
            top: 20px;
            left: 20px;
            display: grid;
            grid-template-columns: repeat(2, 90px);
            gap: 16px;
            z-index: 10;
        }

        .desktop-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 10px 6px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .desktop-icon:hover {
            background: rgba(34, 197, 94, 0.1);
        }

        .desktop-icon:active {
            background: rgba(34, 197, 94, 0.2);
        }

        .desktop-icon-img {
            font-size: 36px;
            line-height: 1;
        }

        .desktop-icon-label {
            font-size: 0.7rem;
            color: #e2e8f0;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
            word-break: break-all;
        }

        /* ===== Dock 栏 ===== */
        .dock {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(34, 197, 94, 0.1);
            border-radius: 16px;
            z-index: 20;
        }

        .dock-item {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(34, 197, 94, 0.05);
        }

        .dock-item:hover {
            background: rgba(34, 197, 94, 0.15);
            transform: scale(1.15) translateY(-4px);
        }

        .dock-item:active {
            transform: scale(1.05);
        }

        /* ===== 开始菜单 ===== */
        #startMenu {
            display: none;
            position: absolute;
            top: 40px;
            left: 0;
            width: 280px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(34, 197, 94, 0.15);
            border-radius: 0 0 12px 12px;
            z-index: 600;
            padding: 12px 0;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .start-menu-user {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(34, 197, 94, 0.1);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .start-menu-avatar {
            width: 36px;
            height: 36px;
            background: rgba(34, 197, 94, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .start-menu-user-info {
            flex: 1;
        }

        .start-menu-username {
            font-size: 0.9rem;
            font-weight: 600;
            color: #e2e8f0;
        }

        .start-menu-usercode {
            font-size: 0.75rem;
            color: #22c55e;
        }

        .start-menu-items {
            padding: 8px 0;
        }

        .start-menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 20px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 0.85rem;
            color: #e2e8f0;
        }

        .start-menu-item:hover {
            background: rgba(34, 197, 94, 0.1);
        }

        .start-menu-item-icon {
            font-size: 18px;
            width: 24px;
            text-align: center;
        }

        .start-menu-divider {
            height: 1px;
            background: rgba(34, 197, 94, 0.1);
            margin: 4px 20px;
        }

        .start-menu-item.danger {
            color: #ef4444;
        }

        .start-menu-item.danger:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        /* ===== 窗口 ===== */
        .os-window {
            position: absolute;
            display: flex;
            flex-direction: column;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(34, 197, 94, 0.12);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            overflow: hidden;
            min-width: 300px;
            min-height: 200px;
        }

        .window-titlebar {
            height: 38px;
            background: rgba(15, 23, 42, 0.9);
            border-bottom: 1px solid rgba(34, 197, 94, 0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            cursor: move;
            flex-shrink: 0;
            user-select: none;
        }

        .window-titlebar-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .window-titlebar-icon {
            font-size: 14px;
        }

        .window-titlebar-text {
            font-size: 0.8rem;
            color: #94a3b8;
            font-weight: 500;
        }

        .window-titlebar-buttons {
            display: flex;
            gap: 6px;
        }

        .win-btn {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: transparent;
            transition: all 0.2s;
        }

        .win-btn:hover {
            color: #fff;
        }

        .win-btn-minimize {
            background: #eab308;
        }

        .win-btn-maximize {
            background: #22c55e;
        }

        .win-btn-close {
            background: #ef4444;
        }

        .window-content {
            flex: 1;
            overflow: auto;
        }

        /* ===== 文件管理器 ===== */
        .filemanager-layout {
            display: flex;
            height: 100%;
        }

        .filemanager-sidebar {
            width: 160px;
            background: rgba(10, 14, 26, 0.5);
            border-right: 1px solid rgba(34, 197, 94, 0.08);
            padding: 12px 0;
            flex-shrink: 0;
        }

        .fm-nav-item {
            padding: 8px 16px;
            cursor: pointer;
            font-size: 0.85rem;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .fm-nav-item:hover {
            background: rgba(34, 197, 94, 0.08);
            color: #e2e8f0;
        }

        .fm-nav-item.active {
            background: rgba(34, 197, 94, 0.12);
            color: #22c55e;
            border-right: 2px solid #22c55e;
        }

        .filemanager-main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .fm-header {
            padding: 10px 16px;
            border-bottom: 1px solid rgba(34, 197, 94, 0.08);
        }

        .fm-path {
            font-size: 0.8rem;
            color: #64748b;
        }

        .fm-filelist {
            flex: 1;
            padding: 8px 0;
        }

        .fm-file-header {
            display: flex;
            padding: 6px 16px;
            font-size: 0.75rem;
            color: #475569;
            border-bottom: 1px solid rgba(34, 197, 94, 0.05);
            font-weight: 600;
        }

        .fm-file-row {
            display: flex;
            padding: 8px 16px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s;
            align-items: center;
        }

        .fm-file-row:hover {
            background: rgba(34, 197, 94, 0.06);
        }

        .fm-col-name {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .fm-col-size {
            width: 100px;
            color: #64748b;
            font-size: 0.8rem;
        }

        .fm-col-date {
            width: 120px;
            color: #64748b;
            font-size: 0.8rem;
        }

        .fm-file-icon {
            font-size: 16px;
        }

        /* ===== 浏览器 ===== */
        .browser-layout {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .browser-toolbar {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            background: rgba(10, 14, 26, 0.5);
            border-bottom: 1px solid rgba(34, 197, 94, 0.08);
        }

        .browser-nav-btn {
            width: 30px;
            height: 30px;
            background: rgba(34, 197, 94, 0.08);
            border: none;
            border-radius: 6px;
            color: #94a3b8;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .browser-nav-btn:hover {
            background: rgba(34, 197, 94, 0.15);
            color: #e2e8f0;
        }

        .browser-urlbar {
            flex: 1;
            padding: 6px 12px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(34, 197, 94, 0.12);
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 0.8rem;
            outline: none;
        }

        .browser-urlbar:focus {
            border-color: #22c55e;
        }

        .browser-go-btn {
            padding: 6px 14px;
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.2);
            border-radius: 8px;
            color: #22c55e;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .browser-go-btn:hover {
            background: rgba(34, 197, 94, 0.25);
        }

        .browser-content {
            flex: 1;
            overflow: auto;
        }

        .browser-home {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 40px;
        }

        .browser-quick-link {
            padding: 10px 20px;
            background: rgba(34, 197, 94, 0.08);
            border: 1px solid rgba(34, 197, 94, 0.12);
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.85rem;
            color: #e2e8f0;
            transition: all 0.2s;
        }

        .browser-quick-link:hover {
            background: rgba(34, 197, 94, 0.15);
            transform: translateY(-2px);
        }

        /* ===== 终端 ===== */
        .terminal-layout {
            display: flex;
            flex-direction: column;
            height: 100%;
            background: #0a0e14;
            font-family: 'Fira Code', 'Consolas', 'Courier New', monospace;
        }

        .terminal-output {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            font-size: 0.82rem;
            line-height: 1.5;
        }

        .terminal-line {
            white-space: pre-wrap;
            word-break: break-all;
        }

        .terminal-welcome {
            color: #22c55e;
            opacity: 0.7;
        }

        .terminal-cmd {
            color: #e2e8f0;
        }

        .terminal-info {
            color: #22c55e;
        }

        .terminal-error {
            color: #ef4444;
        }

        .terminal-success {
            color: #22c55e;
            font-weight: bold;
        }

        .terminal-input-line {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-top: 1px solid rgba(34, 197, 94, 0.1);
            background: rgba(10, 14, 20, 0.8);
        }

        .terminal-prompt {
            color: #22c55e;
            font-size: 0.82rem;
            margin-right: 8px;
            white-space: nowrap;
        }

        .terminal-input {
            flex: 1;
            background: none;
            border: none;
            color: #e2e8f0;
            font-family: inherit;
            font-size: 0.82rem;
            outline: none;
            caret-color: #22c55e;
        }

        /* ===== 设置 ===== */
        .settings-layout {
            display: flex;
            height: 100%;
        }

        .settings-sidebar {
            width: 160px;
            background: rgba(10, 14, 26, 0.5);
            border-right: 1px solid rgba(34, 197, 94, 0.08);
            padding: 12px 0;
            flex-shrink: 0;
        }

        .settings-nav-item {
            padding: 10px 16px;
            cursor: pointer;
            font-size: 0.85rem;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .settings-nav-item:hover {
            background: rgba(34, 197, 94, 0.08);
            color: #e2e8f0;
        }

        .settings-nav-item.active {
            background: rgba(34, 197, 94, 0.12);
            color: #22c55e;
            border-right: 2px solid #22c55e;
        }

        .settings-main {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .settings-section {
            margin-bottom: 24px;
        }

        .settings-section-title {
            font-size: 1rem;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 16px;
        }

        .settings-note {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 12px;
        }

        .settings-info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(34, 197, 94, 0.06);
            font-size: 0.85rem;
        }

        .settings-info-row span:first-child {
            color: #94a3b8;
        }

        .settings-info-row span:last-child {
            color: #e2e8f0;
        }

        .settings-btn {
            padding: 10px 24px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .settings-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
        }

        .settings-btn.secondary {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .settings-btn.secondary:hover {
            background: rgba(34, 197, 94, 0.2);
        }

        /* ===== 壁纸选择 ===== */
        .wallpaper-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .wallpaper-option {
            height: 80px;
            border-radius: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 8px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .wallpaper-option span {
            font-size: 0.75rem;
            color: #e2e8f0;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
            position: relative;

        /* ===== Toast ===== */
        #toastContainer {
            position: fixed;

            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 0.85rem;
            backdrop-filter: blur(20px);
            animation: toastIn 0.3s ease;
            max-width: 320px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }

        .toast-info {
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid rgba(34, 197, 94, 0.2);
            color: #e2e8f0;
        }

        .toast-success {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #22c55e;
        }

        .toast-error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        .toast-fade-out {
            animation: toastOut 0.3s ease forwards;
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes toastOut {
            from { opacity: 1; transform: translateX(0); }
            to { opacity: 0; transform: translateX(20px); }
        }

            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;

            align-items: center;
            justify-content: center;

        .update-dialog {

            position: fixed;

            left: 0;
            right: 0;
            bottom: 0;

            justify-content: center;

        }

        }

        @keyframes shutdownFade {
            from { opacity: 0; }

        }

        /* ===== 滚动条 ===== */
        ::-webkit-scrollbar {
            width: 6px;

        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(34, 197, 94, 0.2);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(34, 197, 94, 0.35);
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .activation-card {
                padding: 32px 24px;
            }

                font-size: 1.3rem;
            }
        }
    </style>
