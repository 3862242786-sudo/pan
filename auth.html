<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 青柠网盘</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo"><svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg> 青柠网盘</a>
            <ul class="nav-links">
                <li><a href="index.html#files">文件列表</a></li>
                <li><a href="about.html">关于</a></li>
                <li><a href="index.html#contact">联系我</a></li>
            </ul>
            <button class="mobile-menu-btn" aria-label="菜单">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- 认证页面 -->
    <section class="auth-page">
        <div class="auth-container">
            <div class="auth-header">
                <h1><svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg> 青柠网盘</h1>
                <p>登录你的账户</p>
            </div>

            <!-- 登录表单 -->
            <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label><svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg> 邮箱</label>
                    <input type="email" id="loginEmail" placeholder="请输入邮箱" required>
                </div>
                <div class="form-group">
                    <label><svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> 密码</label>
                    <input type="password" id="loginPassword" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="auth-submit-btn">登 录</button>
                <div id="loginMessage" class="auth-message"></div>
                <div class="auth-links">
                    <a href="javascript:void(0)" onclick="showClosed('register')">没有账号？注册</a>
                    <a href="javascript:void(0)" onclick="showClosed('forgot')">忘记密码？立即找回</a>
                </div>
            </form>

            <!-- 服务关闭提示 -->
            <div id="closedNotice" style="display:none;text-align:center;padding:40px 20px;">
                <svg class="icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                <h2 style="margin:16px 0 8px;color:#1e293b;font-size:1.3rem;">此服务已关闭</h2>
                <p id="closedText" style="color:#64748b;font-size:0.95rem;margin-bottom:24px;">该功能暂未开放，请联系站长获取帮助。</p>
                <a href="javascript:void(0)" onclick="backToLogin()" style="color:#3b82f6;text-decoration:none;font-weight:500;">返回登录</a>
            </div>

            <!-- 返回首页 -->
            <div class="auth-footer">
                <a href="index.html"><svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg> 返回青柠网盘首页</a>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 青柠网盘. All rights reserved.</p>
            <p class="credit">王梓豪制作</p>
        </div>
    </footer>

    <script src="https://unpkg.com/@supabase/supabase-js@2.49.4"></script>
    <script src="auth2.js"></script>
    <script>
        function showClosed(type) {
            document.getElementById('loginForm').style.display = 'none';
            document.querySelector('.auth-header').style.display = 'none';
            document.getElementById('closedNotice').style.display = 'block';
            if (type === 'register') {
                document.getElementById('closedText').textContent = '注册功能已关闭，请联系站长获取账号。';
            } else {
                document.getElementById('closedText').textContent = '密码找回功能已关闭，请联系站长重置密码。';
            }
        }
        function backToLogin() {
            document.getElementById('loginForm').style.display = 'block';
            document.querySelector('.auth-header').style.display = 'block';
            document.getElementById('closedNotice').style.display = 'none';
        }
    </script>
</body>
</html>
