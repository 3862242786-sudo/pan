<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 青柠网盘</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo"><svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg> 青柠网盘</a>
            <ul class="nav-links">
                <li><a href="index.html#files">文件列表</a></li>
                <li><a href="about.html">关于</a></li>
                <li><a href="index.html#contact">联系我</a></li>
            </ul>
            <button class="mobile-menu-btn" aria-label="菜单">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- 认证页面 -->
    <section class="auth-page">
        <div class="auth-container">
            <div class="auth-header">
                <h1><svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg> 青柠网盘</h1>
                <p>登录你的账户</p>
            </div>

            <!-- 登录表单 -->
            <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label><svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg> 邮箱</label>
                    <input type="email" id="loginEmail" placeholder="请输入邮箱" required>
                </div>
                <div class="form-group">
                    <label><svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> 密码</label>
                    <input type="password" id="loginPassword" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="auth-submit-btn">登 录</button>
                <div id="loginMessage" class="auth-message"></div>
                <div class="auth-links">
                    <a href="javascript:void(0)" onclick="switchTab('register')">没有账号？注册</a>
                    <a href="javascript:void(0)" onclick="switchTab('forgot')">忘记密码？立即找回</a>
                </div>
                <div class="auth-links" style="margin-top:8px">
                    <a href="javascript:void(0)" onclick="switchTab('token')" style="color:#f59e0b">使用令牌登录</a>
                </div>
                <div class="auth-links" style="margin-top:8px">
                    <a href="javascript:void(0)" onclick="switchTab('qrcode')" style="color:#22c55e">扫码登录</a>
                </div>
            </form>

            <!-- 注册表单 -->
            <form id="registerForm" class="auth-form" style="display:none;" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label><svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg> 邮箱</label>
                    <input type="email" id="regEmail" placeholder="请输入邮箱" required>
                </div>
                <div class="form-group">
                    <label><svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> 密码</label>
                    <input type="password" id="regPassword" placeholder="请输入密码（至少6位）" required minlength="6">
                </div>
                <div class="form-group">
                    <label><svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> 确认密码</label>
                    <input type="password" id="regConfirmPassword" placeholder="请再次输入密码" required minlength="6">
                </div>
                <button type="submit" class="auth-submit-btn">注 册</button>
                <div id="registerMessage" class="auth-message"></div>
                <div class="auth-links">
                    <a href="javascript:void(0)" onclick="switchTab('login')">已有账号？返回登录</a>
                </div>
            </form>

            <!-- 找回密码表单 -->
            <form id="forgotForm" class="auth-form" style="display:none;" onsubmit="handleResetPassword(event)">
                <div class="form-group">
                    <label><svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg> 邮箱</label>
                    <input type="email" id="forgotEmail" placeholder="请输入注册时使用的邮箱" required>
                </div>
                <button type="submit" class="auth-submit-btn">发送重置链接</button>
                <div id="forgotMessage" class="auth-message"></div>
                <div class="auth-links">
                    <a href="javascript:void(0)" onclick="switchTab('login')">返回登录</a>
                </div>
            </form>

            <!-- 令牌登录表单 -->
            <form id="tokenForm" class="auth-form" style="display:none;" onsubmit="handleTokenLogin(event)">
                <div class="form-group">
                    <label><svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> 登录令牌</label>
                    <input type="text" id="tokenInput" placeholder="输入10位登录令牌" required maxlength="10" inputmode="numeric" pattern="[0-9]{10}">
                </div>
                <button type="submit" class="auth-submit-btn" style="background:linear-gradient(135deg,#f59e0b,#d97706)">令牌登录</button>
                <div id="tokenMessage" class="auth-message"></div>
                <div class="auth-links">
                    <a href="javascript:void(0)" onclick="switchTab('login')">返回密码登录</a>
                </div>
            </form>

            <!-- 扫码登录 -->
            <div id="qrLoginForm" class="auth-form" style="display:none;">
                <div style="text-align:center;padding:20px 0">
                    <p style="color:#94a3b8;font-size:14px;margin-bottom:16px">请使用青柠令牌APP扫描下方二维码</p>
                    <div id="qrcodeContainer" style="display:inline-block;padding:16px;background:#fff;border-radius:12px"></div>
                    <p style="color:#475569;font-size:12px;margin-top:12px">二维码每60秒自动刷新</p>
                </div>
                <div id="qrMessage" class="auth-message"></div>
                <div class="auth-links">
                    <a href="javascript:void(0)" onclick="switchTab('login')">返回密码登录</a>
                </div>
            </div>

            <!-- 返回首页 -->
            <div class="auth-footer">
                <a href="index.html"><svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg> 返回青柠网盘首页</a>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024-2026 青柠网盘. All rights reserved.</p>
            <p class="credit">王梓豪制作</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="auth2.js"></script>
</body>
</html>
