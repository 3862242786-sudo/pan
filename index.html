<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青柠网盘</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="logo">🍋 青柠网盘</a>
            <ul class="nav-links">
                <li><a href="#files">文件列表</a></li>
                <li><a href="upload.html" class="nav-login-btn">上传文件</a></li>
                <li><a href="about.html">关于</a></li>
                <li><a href="#contact">联系我</a></li>
                <li><a href="auth.html" id="navLoginBtn">登录</a></li>
                <li><a href="admin.html" class="nav-admin-btn" id="navAdminBtn" style="display:none">管理后台</a></li>
                <li><a href="javascript:void(0)" id="navLogoutBtn" style="display:none" onclick="handleLogout()">退出</a></li>
            </ul>
            <button class="mobile-menu-btn" aria-label="菜单">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- 主页横幅 -->
    <section class="hero">
        <div class="hero-content">
            <h1>🍋 欢迎来到青柠网盘</h1>
            <p>简单、快速、免费的文件分享服务</p>
            <div class="hero-stats">
                <div class="stat">
                    <span class="stat-num" id="fileCount">0</span>
                    <span class="stat-label">个文件</span>
                </div>
                <div class="stat">
                    <span class="stat-num">免费</span>
                    <span class="stat-label">永久开放</span>
                </div>
            </div>
        </div>
    </section>

    <!-- 搜索栏 -->
    <section class="search-section">
        <div class="container">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索文件...">
                <button onclick="searchFiles()">🔍 搜索</button>
            </div>
        </div>
    </section>

    <!-- 文件列表 -->
    <section id="files" class="section">
        <div class="container">
            <h2 class="section-title">📂 文件列表</h2>

            <!-- 文件列表（动态加载） -->
            <div class="file-list" id="fileList">
                <div class="loading-text">加载中...</div>
            </div>

            <div style="text-align:center;margin-top:20px;">
                <a href="upload.html" class="nav-login-btn" style="display:inline-block;padding:12px 32px;text-decoration:none;font-size:1rem;">📤 上传文件</a>
            </div>
        </div>
    </section>

    <!-- 关于 -->
    <section id="about" class="section section-gray">
        <div class="container">
            <h2 class="section-title">关于网盘</h2>
            <div class="about-grid">
                <div class="about-card">
                    <div class="about-icon">🚀</div>
                    <h3>高速下载</h3>
                    <p>基于GitHub Pages，全球CDN加速</p>
                </div>
                <div class="about-card">
                    <div class="about-icon">🔒</div>
                    <h3>安全可靠</h3>
                    <p>所有文件经过审核，安全无忧</p>
                </div>
                <div class="about-card">
                    <div class="about-icon">💰</div>
                    <h3>永久免费</h3>
                    <p>无需注册，无需付费，直接下载</p>
                </div>
            </div>
        </div>
    </section>

    <!-- 联系 -->
    <section id="contact" class="section">
        <div class="container">
            <h2 class="section-title">联系我</h2>
            <div class="contact-content">
                <div class="contact-info">
                    <div class="contact-item">
                        <span class="contact-icon">📧</span>
                        <span>有文件需求或问题欢迎联系</span>
                    </div>
                    <div class="contact-item">
                        <span class="contact-icon">💬</span>
                        <span>欢迎留言反馈</span>
                    </div>
                </div>
                <form class="contact-form" onsubmit="handleSubmit(event)">
                    <input type="text" placeholder="您的称呼" required>
                    <input type="email" placeholder="您的邮箱" required>
                    <textarea placeholder="留言内容（如需分享文件，请填写文件名和下载链接）" rows="4" required></textarea>
                    <button type="submit" class="submit-btn">发送留言</button>
                </form>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 青柠网盘. All rights reserved.</p>
            <p class="credit">王梓豪制作</p>
        </div>
    </footer>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="auth2.js"></script>
    <script src="script.js"></script>
    <script>
        // 检查登录状态，更新导航栏
        (function() {
            const isLoggedIn = localStorage.getItem('qn_logged_in');
            const isAdmin = localStorage.getItem('qn_is_admin');
            const loginBtn = document.getElementById('navLoginBtn');
            const adminBtn = document.getElementById('navAdminBtn');
            const logoutBtn = document.getElementById('navLogoutBtn');
            if (isLoggedIn) {
                loginBtn.style.display = 'none';
                logoutBtn.style.display = 'block';
                if (isAdmin === 'true') {
                    adminBtn.style.display = 'block';
                }
            }
        })();

        // 动态加载文件列表
        (async function() {
            const fileList = document.getElementById('fileList');
            try {
                const { data, error } = await supabaseClient.storage
                    .from('files')
                    .list('', { limit: 100, sortBy: { column: 'created_at', order: 'desc' } });

                if (error || !data || data.length === 0) {
                    fileList.innerHTML = '<div class="empty-text">📭 暂无文件，快去上传吧！</div>';
                    return;
                }

                let html = '';
                data.forEach(file => {
                    const { data: urlData } = supabaseClient.storage.from('files').getPublicUrl(file.name);
                    const size = file.metadata?.size ? formatSize(file.metadata.size) : '';
                    const date = new Date(file.created_at).toLocaleString('zh-CN');
                    const ext = file.name.split('.').pop().toLowerCase();
                    const icons = {
                        'pdf':'📕','doc':'📘','docx':'📘','xls':'📗','xlsx':'📗',
                        'ppt':'📙','pptx':'📙','txt':'📄','jpg':'🖼️','jpeg':'🖼️',
                        'png':'🖼️','gif':'🖼️','mp4':'🎬','mp3':'🎵','zip':'📦','rar':'📦'
                    };
                    const icon = icons[ext] || '📄';

                    html += '<div class="file-item">' +
                        '<div class="file-info">' +
                        '<span class="file-icon">' + icon + '</span>' +
                        '<div class="file-detail">' +
                        '<span class="file-name">' + file.name + '</span>' +
                        '<span class="file-meta">' + size + ' · ' + date + '</span>' +
                        '</div></div>' +
                        '<a href="' + urlData.publicUrl + '" target="_blank" class="file-download-btn">下载</a>' +
                        '</div>';
                });
                fileList.innerHTML = html;
            } catch(err) {
                fileList.innerHTML = '<div class="empty-text">📭 暂无文件</div>';
            }
        })();

        function formatSize(bytes) {
            if (!bytes) return '';
            const k = 1024;
            const sizes = ['B','KB','MB','GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
    </script>
</body>
</html>
