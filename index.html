<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青柠网盘</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="logo">🍋 青柠网盘</a>
            <ul class="nav-links">
                <li><a href="#files">文件列表</a></li>
                <li><a href="about.html">关于</a></li>
                <li><a href="#contact">联系我</a></li>
            </ul>
            <button class="mobile-menu-btn" aria-label="菜单">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- 主页横幅 -->
    <section class="hero">
        <div class="hero-content">
            <h1>🍋 欢迎来到青柠网盘</h1>
            <p>简单、快速、免费的文件分享服务</p>
            <div class="hero-stats">
                <div class="stat">
                    <span class="stat-num" id="fileCount">0</span>
                    <span class="stat-label">个文件</span>
                </div>
                <div class="stat">
                    <span class="stat-num">免费</span>
                    <span class="stat-label">永久开放</span>
                </div>
            </div>
        </div>
    </section>

    <!-- 搜索栏 -->
    <section class="search-section">
        <div class="container">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索文件...">
                <button onclick="searchFiles()">🔍 搜索</button>
            </div>
        </div>
    </section>

    <!-- 文件列表 -->
    <section id="files" class="section">
        <div class="container">
            <h2 class="section-title">📂 文件列表</h2>
            
            <!-- 分类标签 -->
            <div class="category-tabs">
                <button class="tab active" onclick="filterFiles('all')">全部</button>
                <button class="tab" onclick="filterFiles('document')">📄 文档</button>
                <button class="tab" onclick="filterFiles('image')">🖼️ 图片</button>
                <button class="tab" onclick="filterFiles('video')">🎬 视频</button>
                <button class="tab" onclick="filterFiles('other')">📦 其他</button>
            </div>

            <!-- 文件列表 -->
            <div class="file-list" id="fileList">
                <div class="empty-state">
                    <div class="empty-icon">📭</div>
                    <h3>暂无文件</h3>
                    <p>站长正在整理资源，敬请期待...</p>
                </div>
            </div>
        </div>
    </section>

    <!-- 关于 -->
    <section id="about" class="section section-gray">
        <div class="container">
            <h2 class="section-title">关于网盘</h2>
            <div class="about-grid">
                <div class="about-card">
                    <div class="about-icon">🚀</div>
                    <h3>高速下载</h3>
                    <p>基于GitHub Pages，全球CDN加速</p>
                </div>
                <div class="about-card">
                    <div class="about-icon">🔒</div>
                    <h3>安全可靠</h3>
                    <p>所有文件经过审核，安全无忧</p>
                </div>
                <div class="about-card">
                    <div class="about-icon">💰</div>
                    <h3>永久免费</h3>
                    <p>无需注册，无需付费，直接下载</p>
                </div>
            </div>
        </div>
    </section>

    <!-- 联系 -->
    <section id="contact" class="section">
        <div class="container">
            <h2 class="section-title">联系我</h2>
            <div class="contact-content">
                <div class="contact-info">
                    <div class="contact-item">
                        <span class="contact-icon">📧</span>
                        <span>有文件需求或问题欢迎联系</span>
                    </div>
                    <div class="contact-item">
                        <span class="contact-icon">💬</span>
                        <span>欢迎留言反馈</span>
                    </div>
                </div>
                <form class="contact-form" onsubmit="handleSubmit(event)">
                    <input type="text" placeholder="您的称呼" required>
                    <input type="email" placeholder="您的邮箱" required>
                    <textarea placeholder="留言内容（如需分享文件，请填写文件名和下载链接）" rows="4" required></textarea>
                    <button type="submit" class="submit-btn">发送留言</button>
                </form>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 青柠网盘. All rights reserved.</p>
            <p class="credit">王梓豪制作</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
