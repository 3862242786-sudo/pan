<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>青柠漂移 - QGE 3D Racing</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0b0f19;
      font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
      user-select: none;
    }
    canvas { display: block; }

    /* UI 覆盖层 */
    #ui-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    /* 速度表 */
    #speedometer {
      position: absolute;
      bottom: 24px; left: 24px;
      width: 160px; height: 160px;
      pointer-events: auto;
    }
    #speedometer svg { width: 100%; height: 100%; }
    .speed-text {
      font-size: 32px; font-weight: bold;
      fill: #e5e7eb;
      text-anchor: middle;
    }
    .speed-unit {
      font-size: 12px; fill: #9ca3af;
      text-anchor: middle;
    }
    .speed-needle {
      stroke: #ef4444; stroke-width: 3;
      stroke-linecap: round;
      transition: transform 0.1s linear;
    }
    .speed-arc-bg { stroke: #374151; stroke-width: 8; fill: none; }
    .speed-arc-fill { stroke: #22c55e; stroke-width: 8; fill: none; }

    /* 迷你地图 */
    #minimap {
      position: absolute;
      top: 24px; right: 24px;
      width: 180px; height: 180px;
      background: rgba(17, 24, 39, 0.85);
      border: 2px solid #374151;
      border-radius: 8px;
      pointer-events: auto;
    }
    #minimap canvas { width: 100%; height: 100%; border-radius: 6px; }
    .minimap-label {
      position: absolute;
      top: 4px; left: 50%;
      transform: translateX(-50%);
      font-size: 10px; color: #9ca3af;
      background: rgba(0,0,0,0.5);
      padding: 1px 6px; border-radius: 4px;
    }

    /* 漂移得分 */
    #drift-score {
      position: absolute;
      top: 24px; left: 50%;
      transform: translateX(-50%);
      text-align: center;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #drift-score.active { opacity: 1; }
    .drift-main {
      font-size: 48px; font-weight: 900;
      color: #f59e0b;
      text-shadow: 0 0 20px rgba(245, 158, 11, 0.5);
      letter-spacing: 2px;
    }
    .drift-combo {
      font-size: 20px; font-weight: bold;
      color: #ef4444;
      text-shadow: 0 0 10px rgba(239, 68, 68, 0.4);
    }
    .drift-label {
      font-size: 12px; color: #9ca3af;
    }

    /* 计时器 */
    #timer {
      position: absolute;
      top: 24px; left: 24px;
      font-size: 24px; font-weight: bold;
      color: #e5e7eb;
      background: rgba(17, 24, 39, 0.7);
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid #374151;
    }

    /* 控制提示 */
    #controls-hint {
      position: absolute;
      bottom: 24px; right: 24px;
      background: rgba(17, 24, 39, 0.85);
      border: 1px solid #374151;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 12px;
      color: #d1d5db;
      line-height: 1.8;
      pointer-events: auto;
    }
    #controls-hint kbd {
      background: #1f2937;
      border: 1px solid #4b5563;
      border-radius: 4px;
      padding: 2px 6px;
      font-family: monospace;
      font-size: 11px;
      color: #e5e7eb;
    }

    /* 调试面板 */
    #debug-panel {
      position: absolute;
      top: 80px; left: 24px;
      background: rgba(0, 0, 0, 0.85);
      border: 1px solid #4b5563;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 11px;
      color: #9ca3af;
      font-family: monospace;
      line-height: 1.6;
      display: none;
      pointer-events: auto;
      min-width: 200px;
    }
    #debug-panel.active { display: block; }
    #debug-panel .debug-row {
      display: flex; justify-content: space-between;
      gap: 16px;
    }
    #debug-panel .debug-val { color: #22c55e; }

    /* 相机模式提示 */
    #camera-hint {
      position: absolute;
      bottom: 200px; left: 50%;
      transform: translateX(-50%);
      font-size: 14px; color: #9ca3af;
      background: rgba(0,0,0,0.6);
      padding: 6px 14px;
      border-radius: 20px;
      opacity: 0;
      transition: opacity 0.5s;
    }
    #camera-hint.show { opacity: 1; }

    /* 启动画面 */
    #splash {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #0b0f19;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.8s;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    #splash h1 {
      font-size: 56px; font-weight: 900;
      color: #22c55e;
      text-shadow: 0 0 40px rgba(34, 197, 94, 0.4);
      margin-bottom: 8px;
      letter-spacing: 4px;
    }
    #splash h2 {
      font-size: 18px; color: #9ca3af;
      margin-bottom: 40px;
      letter-spacing: 2px;
    }
    #splash .start-btn {
      background: #22c55e;
      color: #0b0f19;
      font-size: 18px; font-weight: bold;
      padding: 14px 48px;
      border: none; border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      pointer-events: auto;
    }
    #splash .start-btn:hover {
      background: #16a34a;
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(34, 197, 94, 0.4);
    }
    #splash .loading {
      font-size: 14px; color: #6b7280;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <!-- 启动画面 -->
  <div id="splash">
    <h1>青柠漂移</h1>
    <h2>QINGNING DRIFT - QGE 3D RACING</h2>
    <button class="start-btn" id="startBtn">开始游戏</button>
    <div class="loading" id="loadingText">正在加载引擎...</div>
  </div>

  <!-- UI 覆盖层 -->
  <div id="ui-overlay">
    <div id="timer">00:00.00</div>

    <!-- 速度表 -->
    <div id="speedometer">
      <svg viewBox="0 0 160 160">
        <!-- 背景圆弧 -->
        <path class="speed-arc-bg" d="M 30 130 A 70 70 0 1 1 130 130"/>
        <!-- 填充圆弧 (动态) -->
        <path id="speedArc" class="speed-arc-fill" d="M 30 130 A 70 70 0 0 1 30 130" stroke-dasharray="0 330"/>
        <!-- 刻度 -->
        <g id="speedTicks"></g>
        <!-- 指针 -->
        <line id="speedNeedle" class="speed-needle" x1="80" y1="80" x2="80" y2="30"
              transform="rotate(-135 80 80)"/>
        <!-- 文字 -->
        <text x="80" y="115" class="speed-text" id="speedText">0</text>
        <text x="80" y="132" class="speed-unit">km/h</text>
      </svg>
    </div>

    <!-- 迷你地图 -->
    <div id="minimap">
      <div class="minimap-label">迷你地图</div>
      <canvas id="minimapCanvas" width="180" height="180"></canvas>
    </div>

    <!-- 漂移得分 -->
    <div id="drift-score">
      <div class="drift-label">漂移得分</div>
      <div class="drift-main" id="driftMain">0</div>
      <div class="drift-combo" id="driftCombo"></div>
    </div>

    <!-- 相机模式提示 -->
    <div id="camera-hint">跟随视角</div>

    <!-- 控制提示 -->
    <div id="controls-hint">
      <div><kbd>W</kbd> / <kbd>↑</kbd> 加速</div>
      <div><kbd>S</kbd> / <kbd>↓</kbd> 刹车/倒车</div>
      <div><kbd>A</kbd> / <kbd>←</kbd> 左转　<kbd>D</kbd> / <kbd>→</kbd> 右转</div>
      <div><kbd>空格</kbd> 手刹漂移</div>
      <div><kbd>Shift</kbd> 氮气加速</div>
      <div><kbd>C</kbd> 切换视角</div>
      <div><kbd>~</kbd> 调试面板</div>
    </div>

    <!-- 调试面板 -->
    <div id="debug-panel">
      <div style="color:#22c55e;font-weight:bold;margin-bottom:6px;">调试信息</div>
      <div class="debug-row"><span>速度</span><span class="debug-val" id="dbg-speed">0</span></div>
      <div class="debug-row"><span>转向角</span><span class="debug-val" id="dbg-steer">0</span></div>
      <div class="debug-row"><span>漂移因子</span><span class="debug-val" id="dbg-drift">0</span></div>
      <div class="debug-row"><span>横向速度</span><span class="debug-val" id="dbg-lat">0</span></div>
      <div class="debug-row"><span>位置 X</span><span class="debug-val" id="dbg-x">0</span></div>
      <div class="debug-row"><span>位置 Z</span><span class="debug-val" id="dbg-z">0</span></div>
      <div class="debug-row"><span>旋转</span><span class="debug-val" id="dbg-rot">0</span></div>
      <div class="debug-row"><span>相机模式</span><span class="debug-val" id="dbg-cam">跟随</span></div>
      <div class="debug-row"><span>FPS</span><span class="debug-val" id="dbg-fps">0</span></div>
    </div>
  </div>

  <!-- 游戏脚本 -->
  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

    // ============================================
    // 全局变量
    // ============================================
    let scene, camera, renderer;
    let car, carBody, wheels = [];
    let ground, gridHelper;
    let cones = [];
    let skidMarks = [];
    let particles = [];
    let cameraMode = 0; // 0=跟随, 1=车头, 2=环绕
    let orbitAngle = 0;
    let orbitDistance = 12;

    // 车辆物理状态
    const carState = {
      x: 0, z: 0,
      rotation: 0,        // 车身朝向 (弧度)
      speed: 0,           // 前进速度
      steerAngle: 0,      // 转向输入 (-1 ~ 1)
      driftFactor: 0,     // 漂移因子 (0 ~ 1)
      lateralVelocity: 0, // 横向滑动速度
      maxSpeed: 45,       // 最大速度 (m/s, 约 162 km/h)
      accel: 18,          // 加速度
      brakeForce: 25,     // 刹车力
      friction: 1.2,      // 自然摩擦
      maxSteer: 0.6,      // 最大转向角 (弧度)
      driftThreshold: 12, // 漂移速度阈值
      grip: 0.9,          // 正常抓地力
      driftGrip: 0.15,    // 漂移时抓地力
      boostMultiplier: 1.5,
    };

    // 输入状态
    const input = {
      accelerate: false,
      brake: false,
      left: false,
      right: false,
      handbrake: false,
      boost: false,
    };

    // 游戏状态
    const gameState = {
      startTime: 0,
      totalDriftScore: 0,
      currentDriftScore: 0,
      driftCombo: 1,
      isDrifting: false,
      driftTimer: 0,
      lastSkidTime: 0,
      cameraHintTimer: 0,
      debugVisible: false,
      fps: 0,
      frameCount: 0,
      lastFpsTime: 0,
    };

    const WORLD_SIZE = 500;
    const SKID_MAX = 200;
    const PARTICLE_MAX = 300;

    // ============================================
    // 初始化 Three.js
    // ============================================
    function initThree() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x87ceeb);
      scene.fog = new THREE.Fog(0x87ceeb, 80, 250);

      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      // 灯光
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
      scene.add(ambientLight);

      const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
      dirLight.position.set(50, 80, 30);
      dirLight.castShadow = true;
      dirLight.shadow.mapSize.width = 2048;
      dirLight.shadow.mapSize.height = 2048;
      dirLight.shadow.camera.near = 0.5;
      dirLight.shadow.camera.far = 200;
      dirLight.shadow.camera.left = -100;
      dirLight.shadow.camera.right = 100;
      dirLight.shadow.camera.top = 100;
      dirLight.shadow.camera.bottom = -100;
      scene.add(dirLight);

      // 半球光
      const hemiLight = new THREE.HemisphereLight(0x87ceeb, 0x444444, 0.4);
      scene.add(hemiLight);
    }

    // ============================================
    // 创建地面
    // ============================================
    function createGround() {
      // 主地面
      const groundGeo = new THREE.PlaneGeometry(WORLD_SIZE, WORLD_SIZE);
      const groundMat = new THREE.MeshStandardMaterial({
        color: 0x333333,
        roughness: 0.9,
        metalness: 0.1,
      });
      ground = new THREE.Mesh(groundGeo, groundMat);
      ground.rotation.x = -Math.PI / 2;
      ground.receiveShadow = true;
      scene.add(ground);

      // 网格辅助线
      gridHelper = new THREE.GridHelper(WORLD_SIZE, 20, 0x555555, 0x444444);
      gridHelper.position.y = 0.02;
      scene.add(gridHelper);

      // 道路标线 (白色线条)
      const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff, opacity: 0.6, transparent: true });
      for (let i = -200; i <= 200; i += 50) {
        // 横向线
        const hLine = new THREE.Mesh(new THREE.PlaneGeometry(WORLD_SIZE, 0.8), lineMat);
        hLine.rotation.x = -Math.PI / 2;
        hLine.position.set(0, 0.03, i);
        scene.add(hLine);

        // 纵向线
        const vLine = new THREE.Mesh(new THREE.PlaneGeometry(0.8, WORLD_SIZE), lineMat);
        vLine.rotation.x = -Math.PI / 2;
        vLine.position.set(i, 0.03, 0);
        scene.add(vLine);
      }

      // 中心圆环标记 (漂移区域)
      const ringGeo = new THREE.RingGeometry(18, 20, 64);
      const ringMat = new THREE.MeshBasicMaterial({ color: 0x22c55e, opacity: 0.3, transparent: true, side: THREE.DoubleSide });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.rotation.x = -Math.PI / 2;
      ring.position.y = 0.04;
      scene.add(ring);

      // 第二个圆环
      const ring2 = new THREE.Mesh(new THREE.RingGeometry(38, 40, 64), ringMat.clone());
      ring2.rotation.x = -Math.PI / 2;
      ring2.position.y = 0.04;
      scene.add(ring2);
    }

    // ============================================
    // 创建车辆
    // ============================================
    function createCar() {
      car = new THREE.Group();

      // 车身底盘
      const bodyGeo = new THREE.BoxGeometry(1.8, 0.5, 4.0);
      const bodyMat = new THREE.MeshStandardMaterial({
        color: 0x22c55e,
        roughness: 0.3,
        metalness: 0.4,
      });
      carBody = new THREE.Mesh(bodyGeo, bodyMat);
      carBody.position.y = 0.55;
      carBody.castShadow = true;
      carBody.receiveShadow = true;
      car.add(carBody);

      // 车厢 (驾驶舱)
      const cabinGeo = new THREE.BoxGeometry(1.4, 0.45, 2.0);
      const cabinMat = new THREE.MeshStandardMaterial({
        color: 0x1f2937,
        roughness: 0.1,
        metalness: 0.7,
      });
      const cabin = new THREE.Mesh(cabinGeo, cabinMat);
      cabin.position.set(0, 1.0, -0.2);
      cabin.castShadow = true;
      car.add(cabin);

      // 前大灯
      const headlightGeo = new THREE.SphereGeometry(0.15, 16, 16);
      const headlightMat = new THREE.MeshStandardMaterial({
        color: 0xffffcc,
        emissive: 0xffffaa,
        emissiveIntensity: 0.8,
      });
      const hlLeft = new THREE.Mesh(headlightGeo, headlightMat);
      hlLeft.position.set(-0.6, 0.55, 2.0);
      car.add(hlLeft);
      const hlRight = new THREE.Mesh(headlightGeo, headlightMat);
      hlRight.position.set(0.6, 0.55, 2.0);
      car.add(hlRight);

      // 前大灯聚光灯
      const spotL = new THREE.SpotLight(0xffffcc, 2, 40, 0.5, 0.5, 1);
      spotL.position.set(-0.6, 0.55, 2.0);
      spotL.target.position.set(-0.6, 0, 10);
      car.add(spotL);
      car.add(spotL.target);
      const spotR = new THREE.SpotLight(0xffffcc, 2, 40, 0.5, 0.5, 1);
      spotR.position.set(0.6, 0.55, 2.0);
      spotR.target.position.set(0.6, 0, 10);
      car.add(spotR);
      car.add(spotR.target);

      // 尾灯
      const taillightMat = new THREE.MeshStandardMaterial({
        color: 0xff0000,
        emissive: 0xff0000,
        emissiveIntensity: 0.6,
      });
      const tlLeft = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), taillightMat);
      tlLeft.position.set(-0.6, 0.55, -2.0);
      car.add(tlLeft);
      const tlRight = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), taillightMat);
      tlRight.position.set(0.6, 0.55, -2.0);
      car.add(tlRight);

      // 车轮
      const wheelGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.25, 24);
      const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
      const wheelPositions = [
        { x: -0.9, z: 1.3 },  // 左前
        { x: 0.9, z: 1.3 },   // 右前
        { x: -0.9, z: -1.3 }, // 左后
        { x: 0.9, z: -1.3 },  // 右后
      ];
      wheelPositions.forEach((pos, i) => {
        const wheel = new THREE.Mesh(wheelGeo, wheelMat);
        wheel.rotation.z = Math.PI / 2;
        wheel.position.set(pos.x, 0.35, pos.z);
        wheel.castShadow = true;
        car.add(wheel);
        wheels.push(wheel);
      });

      // 尾翼
      const wingGeo = new THREE.BoxGeometry(1.6, 0.08, 0.4);
      const wingMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.5, metalness: 0.5 });
      const wing = new THREE.Mesh(wingGeo, wingMat);
      wing.position.set(0, 1.15, -1.6);
      car.add(wing);
      // 尾翼支架
      const strutGeo = new THREE.BoxGeometry(0.06, 0.3, 0.06);
      const strutL = new THREE.Mesh(strutGeo, wingMat);
      strutL.position.set(-0.5, 1.0, -1.6);
      car.add(strutL);
      const strutR = new THREE.Mesh(strutGeo, wingMat);
      strutR.position.set(0.5, 1.0, -1.6);
      car.add(strutR);

      scene.add(car);
    }

    // ============================================
    // 创建锥桶障碍物
    // ============================================
    function createCones() {
      const coneGeo = new THREE.ConeGeometry(0.4, 1.0, 16);
      const coneMat = new THREE.MeshStandardMaterial({
        color: 0xff6600,
        roughness: 0.7,
      });

      // 直线绕桩赛道
      for (let i = 0; i < 10; i++) {
        const side = i % 2 === 0 ? -1 : 1;
        const cone = new THREE.Mesh(coneGeo, coneMat);
        cone.position.set(side * 4, 0.5, 30 + i * 8);
        cone.castShadow = true;
        scene.add(cone);
        cones.push(cone);
      }

      // 圆形漂移区锥桶
      for (let i = 0; i < 12; i++) {
        const angle = (i / 12) * Math.PI * 2;
        const r = 30;
        const cone = new THREE.Mesh(coneGeo, coneMat);
        cone.position.set(Math.cos(angle) * r, 0.5, Math.sin(angle) * r);
        cone.castShadow = true;
        scene.add(cone);
        cones.push(cone);
      }

      // 随机散布的锥桶
      for (let i = 0; i < 20; i++) {
        const x = (Math.random() - 0.5) * 200;
        const z = (Math.random() - 0.5) * 200;
        if (Math.abs(x) < 10 && Math.abs(z) < 10) continue; // 避开出生点
        const cone = new THREE.Mesh(coneGeo, coneMat);
        cone.position.set(x, 0.5, z);
        cone.castShadow = true;
        scene.add(cone);
        cones.push(cone);
      }
    }

    // ============================================
    // 创建 skid mark (轮胎印)
    // ============================================
    function createSkidMark(x, z, rotation, width) {
      if (skidMarks.length >= SKID_MAX) {
        const old = skidMarks.shift();
        scene.remove(old);
        old.geometry.dispose();
        old.material.dispose();
      }

      const geo = new THREE.PlaneGeometry(width, 1.2);
      const mat = new THREE.MeshBasicMaterial({
        color: 0x111111,
        transparent: true,
        opacity: 0.5,
        depthWrite: false,
      });
      const mark = new THREE.Mesh(geo, mat);
      mark.rotation.x = -Math.PI / 2;
      mark.rotation.z = rotation;
      mark.position.set(x, 0.05, z);
      scene.add(mark);
      skidMarks.push(mark);

      // 渐隐效果
      mark.userData.life = 1.0;
      mark.userData.fadeRate = 0.002 + Math.random() * 0.003;
    }

    // ============================================
    // 创建粒子 (烟雾/尘土)
    // ============================================
    function createParticle(x, y, z, vx, vy, vz, size, color, life) {
      if (particles.length >= PARTICLE_MAX) {
        const old = particles.shift();
        scene.remove(old);
        old.geometry.dispose();
        old.material.dispose();
      }

      const geo = new THREE.PlaneGeometry(size, size);
      const mat = new THREE.MeshBasicMaterial({
        color: color,
        transparent: true,
        opacity: 0.6,
        depthWrite: false,
        side: THREE.DoubleSide,
      });
      const p = new THREE.Mesh(geo, mat);
      p.position.set(x, y, z);
      p.lookAt(camera.position);
      scene.add(p);

      p.userData = {
        vx, vy, vz,
        life: life || 1.0,
        maxLife: life || 1.0,
        rotSpeed: (Math.random() - 0.5) * 4,
      };
      particles.push(p);
    }

    function spawnDriftParticles(x, z, rotation, intensity) {
      const count = Math.floor(intensity * 3) + 1;
      for (let i = 0; i < count; i++) {
        const offsetAngle = rotation + Math.PI + (Math.random() - 0.5) * 0.8;
        const speed = 2 + Math.random() * 4;
        const vx = Math.sin(offsetAngle) * speed;
        const vz = Math.cos(offsetAngle) * speed;
        const size = 0.3 + Math.random() * 0.8;
        const gray = 0.6 + Math.random() * 0.3;
        const color = new THREE.Color(gray, gray, gray);
        createParticle(
          x + (Math.random() - 0.5) * 1.5,
          0.2 + Math.random() * 0.5,
          z + (Math.random() - 0.5) * 1.5,
          vx, 1 + Math.random() * 2, vz,
          size, color, 0.8 + Math.random() * 0.5
        );
      }
    }

    function spawnBoostParticles(x, z, rotation) {
      for (let i = 0; i < 2; i++) {
        const offsetAngle = rotation + Math.PI + (Math.random() - 0.5) * 0.3;
        const vx = Math.sin(offsetAngle) * (3 + Math.random() * 3);
        const vz = Math.cos(offsetAngle) * (3 + Math.random() * 3);
        const size = 0.2 + Math.random() * 0.4;
        const color = new THREE.Color(0.2, 0.8, 1.0);
        createParticle(
          x + (Math.random() - 0.5),
          0.3,
          z + (Math.random() - 0.5),
          vx, 0.5, vz,
          size, color, 0.4
        );
      }
    }

    // ============================================
    // 输入处理
    // ============================================
    function setupInput() {
      window.addEventListener('keydown', (e) => {
        switch (e.code) {
          case 'KeyW': case 'ArrowUp': input.accelerate = true; break;
          case 'KeyS': case 'ArrowDown': input.brake = true; break;
          case 'KeyA': case 'ArrowLeft': input.left = true; break;
          case 'KeyD': case 'ArrowRight': input.right = true; break;
          case 'Space': input.handbrake = true; e.preventDefault(); break;
          case 'ShiftLeft': case 'ShiftRight': input.boost = true; break;
          case 'KeyC': cycleCamera(); break;
          case 'Backquote': case 'IntlBackslash': toggleDebug(); break;
        }
      });

      window.addEventListener('keyup', (e) => {
        switch (e.code) {
          case 'KeyW': case 'ArrowUp': input.accelerate = false; break;
          case 'KeyS': case 'ArrowDown': input.brake = false; break;
          case 'KeyA': case 'ArrowLeft': input.left = false; break;
          case 'KeyD': case 'ArrowRight': input.right = false; break;
          case 'Space': input.handbrake = false; break;
          case 'ShiftLeft': case 'ShiftRight': input.boost = false; break;
        }
      });

      // 鼠标控制环绕视角
      let mouseDown = false;
      renderer.domElement.addEventListener('mousedown', () => { mouseDown = true; });
      renderer.domElement.addEventListener('mouseup', () => { mouseDown = false; });
      renderer.domElement.addEventListener('mousemove', (e) => {
        if (cameraMode === 2 && mouseDown) {
          orbitAngle -= e.movementX * 0.01;
          orbitDistance = Math.max(5, Math.min(30, orbitDistance - e.movementY * 0.05));
        }
      });
      renderer.domElement.addEventListener('wheel', (e) => {
        if (cameraMode === 2) {
          orbitDistance = Math.max(5, Math.min(30, orbitDistance + e.deltaY * 0.01));
        }
      });

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    }

    function cycleCamera() {
      cameraMode = (cameraMode + 1) % 3;
      const names = ['跟随视角', '车头视角', '环绕视角'];
      const hint = document.getElementById('camera-hint');
      hint.textContent = names[cameraMode];
      hint.classList.add('show');
      gameState.cameraHintTimer = 2.0;
    }

    function toggleDebug() {
      gameState.debugVisible = !gameState.debugVisible;
      document.getElementById('debug-panel').classList.toggle('active', gameState.debugVisible);
    }

    // ============================================
    // 物理更新
    // ============================================
    function updatePhysics(dt) {
      const cs = carState;

      // 转向输入
      let steerInput = 0;
      if (input.left) steerInput -= 1;
      if (input.right) steerInput += 1;

      // 加速/刹车
      const boostMult = input.boost ? cs.boostMultiplier : 1.0;
      if (input.accelerate) {
        cs.speed += cs.accel * boostMult * dt;
      }
      if (input.brake) {
        cs.speed -= cs.brakeForce * dt;
      }

      // 自然摩擦减速
      cs.speed *= (1 - cs.friction * dt);

      // 速度限制
      const maxSpd = cs.maxSpeed * boostMult;
      cs.speed = Math.max(-maxSpd * 0.3, Math.min(maxSpd, cs.speed));

      // 转向角 (低速更灵敏, 高速降低响应)
      const speedFactor = Math.abs(cs.speed) / cs.maxSpeed;
      const steerResponse = cs.maxSteer * (1 - speedFactor * 0.5);
      const targetSteer = steerInput * steerResponse;
      cs.steerAngle += (targetSteer - cs.steerAngle) * Math.min(1, 8 * dt);

      // 漂移判定
      const isDrifting = input.handbrake ||
        (Math.abs(cs.speed) > cs.driftThreshold && Math.abs(cs.steerAngle) > 0.25 && speedFactor > 0.3);

      if (isDrifting) {
        cs.driftFactor = Math.min(cs.driftFactor + dt * 2, 1);
      } else {
        cs.driftFactor = Math.max(cs.driftFactor - dt * 3, 0);
      }

      // 抓地力计算
      const currentGrip = THREE.MathUtils.lerp(cs.grip, cs.driftGrip, cs.driftFactor);

      // 横向滑动速度
      const targetLateral = cs.driftFactor * cs.speed * Math.sin(cs.steerAngle) * 0.5;
      cs.lateralVelocity += (targetLateral - cs.lateralVelocity) * (1 - currentGrip) * dt * 5;
      cs.lateralVelocity *= (1 - 0.5 * dt); // 横向衰减

      // 车身旋转 (转向影响)
      const turnRate = cs.steerAngle * cs.speed * dt * 0.15;
      cs.rotation += turnRate;

      // 速度方向 (考虑漂移时的侧滑)
      const forwardAngle = cs.rotation;
      const driftAngle = cs.driftFactor * cs.steerAngle * 0.8;
      const moveAngle = forwardAngle + driftAngle;

      const vx = Math.sin(moveAngle) * cs.speed + Math.cos(forwardAngle) * cs.lateralVelocity;
      const vz = Math.cos(moveAngle) * cs.speed - Math.sin(forwardAngle) * cs.lateralVelocity;

      cs.x += vx * dt;
      cs.z += vz * dt;

      // 世界边界限制
      const bound = WORLD_SIZE / 2 - 2;
      if (cs.x < -bound) { cs.x = -bound; cs.speed *= 0.5; }
      if (cs.x > bound) { cs.x = bound; cs.speed *= 0.5; }
      if (cs.z < -bound) { cs.z = -bound; cs.speed *= 0.5; }
      if (cs.z > bound) { cs.z = bound; cs.speed *= 0.5; }

      // 更新车辆显示
      car.position.set(cs.x, 0, cs.z);
      // 车身朝向 + 漂移时的侧倾
      car.rotation.y = cs.rotation;
      car.rotation.z = -cs.driftFactor * cs.steerAngle * 0.3; // 侧倾
      car.rotation.x = cs.driftFactor * 0.1; // 俯仰

      // 前轮转向可视化
      wheels[0].rotation.y = cs.steerAngle * 1.5;
      wheels[1].rotation.y = cs.steerAngle * 1.5;
      // 车轮滚动
      const wheelRoll = cs.speed * dt * 3;
      wheels.forEach(w => { w.rotation.x += wheelRoll; });

      // 漂移效果
      if (cs.driftFactor > 0.3 && Math.abs(cs.speed) > 5) {
        const now = performance.now();
        if (now - gameState.lastSkidTime > 50) {
          // 后轮轮胎印
          const rearOffset = 1.3;
          const sideOffset = 0.9;
          const sin = Math.sin(cs.rotation);
          const cos = Math.cos(cs.rotation);
          createSkidMark(
            cs.x + (-sideOffset * cos - rearOffset * sin),
            cs.z + (-sideOffset * sin + rearOffset * cos),
            cs.rotation, 0.3
          );
          createSkidMark(
            cs.x + (sideOffset * cos - rearOffset * sin),
            cs.z + (sideOffset * sin + rearOffset * cos),
            cs.rotation, 0.3
          );
          gameState.lastSkidTime = now;
        }

        // 烟雾粒子
        spawnDriftParticles(cs.x, cs.z, cs.rotation, cs.driftFactor);

        // 漂移得分
        if (!gameState.isDrifting) {
          gameState.isDrifting = true;
          gameState.driftTimer = 0;
          gameState.currentDriftScore = 0;
        }
        gameState.driftTimer += dt;
        const speedBonus = Math.abs(cs.speed) * 0.5;
        const driftBonus = cs.driftFactor * 20;
        gameState.currentDriftScore += (speedBonus + driftBonus) * dt;

        // 连击倍率
        if (gameState.driftTimer > 2) gameState.driftCombo = 2;
        if (gameState.driftTimer > 5) gameState.driftCombo = 3;
        if (gameState.driftTimer > 10) gameState.driftCombo = 5;
      } else {
        if (gameState.isDrifting) {
          // 漂移结束,结算得分
          gameState.totalDriftScore += Math.floor(gameState.currentDriftScore * gameState.driftCombo);
          gameState.isDrifting = false;
          gameState.driftTimer = 0;
          gameState.driftCombo = 1;
          gameState.currentDriftScore = 0;
        }
      }

      // 氮气加速粒子
      if (input.boost && Math.abs(cs.speed) > 5) {
        spawnBoostParticles(cs.x, cs.z, cs.rotation);
      }
    }

    // ============================================
    // 更新粒子
    // ============================================
    function updateParticles(dt) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.userData.life -= dt;
        if (p.userData.life <= 0) {
          scene.remove(p);
          p.geometry.dispose();
          p.material.dispose();
          particles.splice(i, 1);
          continue;
        }
        const t = p.userData.life / p.userData.maxLife;
        p.material.opacity = t * 0.5;
        p.position.x += p.userData.vx * dt;
        p.position.y += p.userData.vy * dt;
        p.position.z += p.userData.vz * dt;
        p.userData.vy += 1.0 * dt; // 上升
        p.scale.setScalar(1 + (1 - t) * 2);
        p.rotation.z += p.userData.rotSpeed * dt;
        p.lookAt(camera.position);
      }
    }

    // ============================================
    // 更新 skid marks 渐隐
    // ============================================
    function updateSkidMarks(dt) {
      for (let i = skidMarks.length - 1; i >= 0; i--) {
        const mark = skidMarks[i];
        mark.userData.life -= mark.userData.fadeRate;
        if (mark.userData.life <= 0) {
          scene.remove(mark);
          mark.geometry.dispose();
          mark.material.dispose();
          skidMarks.splice(i, 1);
        } else {
          mark.material.opacity = mark.userData.life * 0.5;
        }
      }
    }

    // ============================================
    // 更新相机
    // ============================================
    function updateCamera(dt) {
      const cs = carState;
      const sin = Math.sin(cs.rotation);
      const cos = Math.cos(cs.rotation);

      let targetPos, lookAt;

      if (cameraMode === 0) {
        // 跟随视角
        const dist = 8 + Math.abs(cs.speed) * 0.15;
        const height = 4 + Math.abs(cs.speed) * 0.05;
        targetPos = new THREE.Vector3(
          cs.x - sin * dist,
          height,
          cs.z - cos * dist
        );
        lookAt = new THREE.Vector3(cs.x, 1, cs.z);
      } else if (cameraMode === 1) {
        // 车头视角
        const hoodDist = 1.5;
        const hoodHeight = 1.2;
        targetPos = new THREE.Vector3(
          cs.x + sin * hoodDist,
          hoodHeight,
          cs.z + cos * hoodDist
        );
        lookAt = new THREE.Vector3(
          cs.x + sin * 10,
          1,
          cs.z + cos * 10
        );
      } else {
        // 环绕视角
        targetPos = new THREE.Vector3(
          cs.x + Math.sin(orbitAngle) * orbitDistance,
          6,
          cs.z + Math.cos(orbitAngle) * orbitDistance
        );
        lookAt = new THREE.Vector3(cs.x, 1, cs.z);
      }

      // 平滑插值
      const lerpFactor = Math.min(1, (cameraMode === 1 ? 12 : 4) * dt);
      camera.position.lerp(targetPos, lerpFactor);
      camera.lookAt(lookAt);
    }

    // ============================================
    // 更新 UI
    // ============================================
    function updateUI(dt) {
      const cs = carState;
      const gs = gameState;

      // 速度表
      const kmh = Math.abs(Math.round(cs.speed * 3.6));
      document.getElementById('speedText').textContent = kmh;

      // 指针角度 (-135 ~ 135 度)
      const maxKmh = Math.round(cs.maxSpeed * 3.6 * 1.5);
      const needleAngle = -135 + (kmh / maxKmh) * 270;
      document.getElementById('speedNeedle').setAttribute('transform', `rotate(${needleAngle} 80 80)`);

      // 圆弧填充
      const arcLength = 330; // 近似圆弧长度
      const dash = Math.min(arcLength, (kmh / maxKmh) * arcLength);
      const arc = document.getElementById('speedArc');
      arc.setAttribute('stroke-dasharray', `${dash} ${arcLength}`);
      // 颜色根据速度变化
      if (kmh > 120) arc.setAttribute('stroke', '#ef4444');
      else if (kmh > 80) arc.setAttribute('stroke', '#f59e0b');
      else arc.setAttribute('stroke', '#22c55e');

      // 计时器
      const elapsed = (performance.now() - gs.startTime) / 1000;
      const mins = Math.floor(elapsed / 60).toString().padStart(2, '0');
      const secs = Math.floor(elapsed % 60).toString().padStart(2, '0');
      const ms = Math.floor((elapsed % 1) * 100).toString().padStart(2, '0');
      document.getElementById('timer').textContent = `${mins}:${secs}.${ms}`;

      // 漂移得分
      const driftEl = document.getElementById('drift-score');
      if (gs.isDrifting || gs.currentDriftScore > 0) {
        driftEl.classList.add('active');
        const displayScore = Math.floor(gs.currentDriftScore * gs.driftCombo);
        document.getElementById('driftMain').textContent = displayScore;
        if (gs.driftCombo > 1) {
          document.getElementById('driftCombo').textContent = `x${gs.driftCombo} 连击!`;
        } else {
          document.getElementById('driftCombo').textContent = '';
        }
      } else {
        driftEl.classList.remove('active');
      }

      // 相机提示自动隐藏
      if (gs.cameraHintTimer > 0) {
        gs.cameraHintTimer -= dt;
        if (gs.cameraHintTimer <= 0) {
          document.getElementById('camera-hint').classList.remove('show');
        }
      }

      // 调试面板
      if (gs.debugVisible) {
        document.getElementById('dbg-speed').textContent = cs.speed.toFixed(2);
        document.getElementById('dbg-steer').textContent = cs.steerAngle.toFixed(3);
        document.getElementById('dbg-drift').textContent = cs.driftFactor.toFixed(3);
        document.getElementById('dbg-lat').textContent = cs.lateralVelocity.toFixed(2);
        document.getElementById('dbg-x').textContent = cs.x.toFixed(1);
        document.getElementById('dbg-z').textContent = cs.z.toFixed(1);
        document.getElementById('dbg-rot').textContent = ((cs.rotation * 180 / Math.PI) % 360).toFixed(1);
        const camNames = ['跟随', '车头', '环绕'];
        document.getElementById('dbg-cam').textContent = camNames[cameraMode];
        document.getElementById('dbg-fps').textContent = gs.fps;
      }

      // 迷你地图
      updateMinimap();
    }

    // ============================================
    // 更新迷你地图
    // ============================================
    function updateMinimap() {
      const canvas = document.getElementById('minimapCanvas');
      const ctx = canvas.getContext('2d');
      const w = canvas.width, h = canvas.height;

      ctx.fillStyle = '#111827';
      ctx.fillRect(0, 0, w, h);

      const scale = w / WORLD_SIZE;
      const cx = w / 2, cy = h / 2;

      // 绘制锥桶
      ctx.fillStyle = '#ff6600';
      cones.forEach(cone => {
        const px = cx + cone.position.x * scale;
        const py = cy + cone.position.z * scale;
        ctx.beginPath();
        ctx.arc(px, py, 2, 0, Math.PI * 2);
        ctx.fill();
      });

      // 绘制车辆
      const carX = cx + carState.x * scale;
      const carY = cy + carState.z * scale;

      ctx.save();
      ctx.translate(carX, carY);
      ctx.rotate(-carState.rotation);

      // 车身
      ctx.fillStyle = '#22c55e';
      ctx.fillRect(-4, -8, 8, 16);
      // 车头方向指示
      ctx.fillStyle = '#ffffaa';
      ctx.fillRect(-3, 6, 2, 4);
      ctx.fillRect(1, 6, 2, 4);

      ctx.restore();

      // 绘制边界
      ctx.strokeStyle = '#374151';
      ctx.strokeRect(cx - WORLD_SIZE/2 * scale, cy - WORLD_SIZE/2 * scale, WORLD_SIZE * scale, WORLD_SIZE * scale);
    }

    // ============================================
    // 速度表刻度
    // ============================================
    function initSpeedometer() {
      const container = document.getElementById('speedTicks');
      const maxKmh = Math.round(carState.maxSpeed * 3.6 * 1.5);
      for (let i = 0; i <= 10; i++) {
        const angle = -135 + (i / 10) * 270;
        const rad = (angle - 90) * Math.PI / 180;
        const r1 = 58, r2 = 66;
        const x1 = 80 + Math.cos(rad) * r1;
        const y1 = 80 + Math.sin(rad) * r1;
        const x2 = 80 + Math.cos(rad) * r2;
        const y2 = 80 + Math.sin(rad) * r2;

        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', x1);
        line.setAttribute('y1', y1);
        line.setAttribute('x2', x2);
        line.setAttribute('y2', y2);
        line.setAttribute('stroke', '#6b7280');
        line.setAttribute('stroke-width', '2');
        container.appendChild(line);

        // 数字
        const val = Math.round((i / 10) * maxKmh);
        const tx = 80 + Math.cos(rad) * (r2 + 10);
        const ty = 80 + Math.sin(rad) * (r2 + 10);
        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', tx);
        text.setAttribute('y', ty + 3);
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('fill', '#9ca3af');
        text.setAttribute('font-size', '9');
        text.textContent = val;
        container.appendChild(text);
      }
    }

    // ============================================
    // 主循环
    // ============================================
    let lastTime = 0;
    function animate(time) {
      requestAnimationFrame(animate);

      const dt = Math.min((time - lastTime) / 1000, 0.05); // 限制最大 dt
      lastTime = time;

      if (dt <= 0) return;

      // FPS 计算
      gameState.frameCount++;
      if (time - gameState.lastFpsTime >= 1000) {
        gameState.fps = gameState.frameCount;
        gameState.frameCount = 0;
        gameState.lastFpsTime = time;
      }

      updatePhysics(dt);
      updateParticles(dt);
      updateSkidMarks(dt);
      updateCamera(dt);
      updateUI(dt);

      renderer.render(scene, camera);
    }

    // ============================================
    // 启动
    // ============================================
    function startGame() {
      document.getElementById('splash').classList.add('hidden');
      gameState.startTime = performance.now();
      lastTime = performance.now();
      requestAnimationFrame(animate);
    }

    // 初始化
    initThree();
    createGround();
    createCar();
    createCones();
    initSpeedometer();
    setupInput();

    document.getElementById('loadingText').textContent = '点击开始按钮进入游戏';
    document.getElementById('startBtn').addEventListener('click', startGame);

    // 初始渲染一帧
    renderer.render(scene, camera);
  </script>
</body>
</html>
