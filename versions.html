<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史版本 - 青柠网盘</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        .version-list{max-width:640px;margin:0 auto;display:flex;flex-direction:column;gap:12px}
        .version-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:20px 24px;transition:all .2s}
        .version-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);transform:translateY(-2px)}
        .version-card.latest{border-color:#3b82f6;background:#f0f7ff}
        .version-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
        .version-num{font-size:18px;font-weight:700;color:#1e293b}
        .version-date{font-size:13px;color:#94a3b8}
        .version-badge{display:inline-block;font-size:11px;font-weight:600;color:#fff;background:#3b82f6;padding:2px 10px;border-radius:20px;margin-left:8px}
        .version-note{font-size:13px;color:#64748b;margin-bottom:10px}
        .version-log{font-size:12px;color:#94a3b8;line-height:1.8;white-space:pre-line;background:#f8fafc;padding:12px;border-radius:8px;margin-bottom:12px}
        .version-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 20px;background:#3b82f6;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;transition:all .15s}
        .version-btn:hover{background:#2563eb}
        .version-btn:active{transform:scale(.97)}
        .back-link{display:inline-flex;align-items:center;gap:6px;color:#64748b;text-decoration:none;font-size:14px;margin-bottom:24px}
        .back-link:hover{color:#3b82f6}
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo"><svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg> 青柠网盘</a>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="upload.html">上传文件</a></li>
                <li><a href="versions.html" style="color:#3b82f6;font-weight:600">历史版本</a></li>
                <li><a href="auth.html">登录</a></li>
            </ul>
            <button class="mobile-menu-btn" aria-label="菜单"><span></span><span></span><span></span></button>
        </div>
    </nav>

    <section class="section" style="padding-top:40px">
        <div class="container">
            <a href="index.html" class="back-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                返回首页
            </a>
            <h2 class="section-title">历史版本</h2>
            <p style="color:#64748b;margin-bottom:32px">所有已发布的版本记录，点击下载对应版本的安装包</p>
            <div class="version-list" id="versionList"></div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024-2026 青柠网盘. All rights reserved.</p>
        </div>
    </footer>

    <script>
        fetch('apk-releases/versions.json')
            .then(r=>r.json())
            .then(data=>{
                const list=document.getElementById('versionList');
                const versions=data.history||[];
                list.innerHTML=versions.map((v,i)=>`
                    <div class="version-card ${i===0?'latest':''}">
                        <div class="version-header">
                            <div>
                                <span class="version-num">v${v.version}</span>
                                ${i===0?'<span class="version-badge">最新</span>':''}
                            </div>
                            <span class="version-date">${v.date||''}</span>
                        </div>
                        <div class="version-note">${v.note||''}</div>
                        <div class="version-log">${v.updateLog||'暂无更新说明'}</div>
                        <a href="${v.downloadUrl}" class="version-btn">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                            下载 v${v.version}
                        </a>
                    </div>
                `).join('');
            })
            .catch(()=>{document.getElementById('versionList').innerHTML='<p style="color:#94a3b8;text-align:center">加载失败，请刷新重试</p>'});
    </script>
</body>
</html>
